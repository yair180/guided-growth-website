<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Execution board, compare views</title>
<style>
  :root { color-scheme: light dark;
    --bg:#f4f6f9; --bar:#fff; --ink:#1c2430; --muted:#6a7484; --line:#e2e6ee; --blue:#2456c7; --chipbg:#fff; }
  @media (prefers-color-scheme: dark) { :root {
    --bg:#0e1319; --bar:#141a22; --ink:#eef2f8; --muted:#8b97a8; --line:#26303c; --blue:#8db2ff; --chipbg:#1a222d; } }
  * { box-sizing:border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  body { display:flex; flex-direction:column; }
  .bar { flex:none; display:flex; align-items:center; gap:10px; padding:10px 16px; background:var(--bar);
    border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .bar .lbl { font-size:11px; font-weight:750; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-right:4px; }
  .chip { font:inherit; font-size:13px; font-weight:600; color:var(--muted); background:var(--chipbg);
    border:1px solid var(--line); border-radius:999px; padding:6px 15px; cursor:pointer; }
  .chip:hover { border-color:var(--blue); color:var(--blue); }
  .chip.on { background:var(--blue); color:#fff; border-color:var(--blue); }
  .bar .sub { margin-left:auto; font-size:12px; color:var(--muted); }
  .bar .sub a { color:var(--blue); text-decoration:none; }
  .frame { flex:1; min-height:0; }
  iframe { width:100%; height:100%; border:0; display:block; background:var(--bg); }
</style>
<div class="bar">
  <span class="lbl">View</span>
  <button class="chip" data-v="cards">Cards</button>
  <button class="chip" data-v="timeline">Timeline</button>
  <button class="chip" data-v="table">Table</button>
  <button class="chip" data-v="lanes">Lanes</button>
  <span class="sub" id="sub"></span>
</div>
<div class="frame"><iframe id="view" title="execution board view"></iframe></div>
<script>
  var VIEWS = ["cards","timeline","table","lanes"];
  var iframe = document.getElementById("view"), sub = document.getElementById("sub");
  function show(v) {
    if (VIEWS.indexOf(v) < 0) v = "cards";
    iframe.src = "/internal/exec-" + v + "/";
    document.querySelectorAll(".chip").forEach(function(c){ c.classList.toggle("on", c.dataset.v === v); });
    sub.innerHTML = 'open on its own: <a href="/internal/exec-' + v + '/" target="_blank">/internal/exec-' + v + '/</a>';
    try { location.hash = v; } catch (e) {}
  }
  document.querySelectorAll(".chip").forEach(function(c){ c.addEventListener("click", function(){ show(c.dataset.v); }); });
  show((location.hash || "#cards").slice(1));
</script>
