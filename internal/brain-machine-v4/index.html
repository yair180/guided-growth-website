<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Machine — Signal</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  :root {
    --bg:#f7f8fa; --panel:#fff; --panel2:#f0f2f6; --ink:#1c2430; --ink2:#39434f; --muted:#6a7484; --faint:#98a1b0;
    --line:#e4e8ef; --line2:#eef1f6; --blue:#2456c7;
    --green:#1c7a4d; --green-bg:#e3f6ec; --amber:#a15c00; --amber-bg:#fdf0d6; --red:#b42318; --red-bg:#fdece9; --gray:#9aa3b2;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) { :root:not([data-theme]) {
    --bg:#10151d; --panel:#161c26; --panel2:#1a2129; --ink:#edf2f8; --ink2:#c7d0dc; --muted:#8b97a8; --faint:#5b6676;
    --line:#2a3441; --line2:#1b2430; --blue:#8db2ff;
    --green:#5fd493; --green-bg:#12331f; --amber:#f2bd63; --amber-bg:#3a2c10; --red:#ff8f88; --red-bg:#3a1a17; --gray:#5f6b7b;
  } }
  html[data-theme="dark"] {
    --bg:#10151d; --panel:#161c26; --panel2:#1a2129; --ink:#edf2f8; --ink2:#c7d0dc; --muted:#8b97a8; --faint:#5b6676;
    --line:#2a3441; --line2:#1b2430; --blue:#8db2ff;
    --green:#5fd493; --green-bg:#12331f; --amber:#f2bd63; --amber-bg:#3a2c10; --red:#ff8f88; --red-bg:#3a1a17; --gray:#5f6b7b;
  }
  html[data-theme="light"] {
    --bg:#f7f8fa; --panel:#fff; --panel2:#f0f2f6; --ink:#1c2430; --ink2:#39434f; --muted:#6a7484; --faint:#98a1b0;
    --line:#e4e8ef; --line2:#eef1f6; --blue:#2456c7;
    --green:#1c7a4d; --green-bg:#e3f6ec; --amber:#a15c00; --amber-bg:#fdf0d6; --red:#b42318; --red-bg:#fdece9; --gray:#9aa3b2;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing:antialiased; }
  .wrap { max-width:820px; margin:0 auto; padding:10px 12px 26px; }

  /* ---- ticker: compact secondary box vitals ---- */
  .ticker { display:flex; align-items:center; gap:9px; font-size:11.5px; color:var(--muted); padding:2px 0 9px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .tk-dot { width:7px; height:7px; border-radius:50%; background:var(--gray); flex:none; }
  .tk-dot.fresh { background:var(--green); } .tk-dot.lagging { background:var(--amber); animation:pulse 1.6s infinite; }
  .tk-dot.paused { background:var(--gray); } .tk-dot.down { background:var(--red); animation:pulse 1.4s infinite; }
  .tk-box { color:var(--ink2); font-weight:650; }
  .tk-vitals { display:inline-flex; flex-wrap:wrap; gap:2px 11px; font-variant-numeric:tabular-nums; }
  .tk-vitals b { color:var(--ink2); font-weight:600; } .tk-vitals .warn { color:var(--amber); } .tk-vitals .crit { color:var(--red); }
  .tk-svc { margin-left:auto; display:inline-flex; align-items:center; gap:6px; color:var(--red); font-weight:600; }
  .tk-svc .sdot { width:6px; height:6px; border-radius:50%; background:var(--red); flex:none; animation:pulse 1.4s infinite; }

  .banner { display:none; margin:10px 0 0; padding:9px 12px; border-radius:8px; font-size:12.5px; line-height:1.45; }
  .banner.show { display:block; }
  .banner.paused { background:var(--line2); color:var(--muted); border:1px solid var(--line); }

  /* ---- spotlight: pinned live zone ---- */
  .spotlight { margin-top:14px; border-top:2px solid var(--line); background:var(--panel2); border-radius:10px; padding:12px 14px 6px; position:sticky; top:0; z-index:5; }
  .spotlight.live { border-top-color:var(--amber); }
  .sp-head { display:flex; align-items:center; gap:8px; }
  .sp-pulse { width:8px; height:8px; border-radius:50%; background:var(--gray); flex:none; }
  .spotlight.live .sp-pulse { background:var(--amber); animation:pulse 1.2s infinite; }
  .sp-head h1 { margin:0; font-size:11.5px; font-weight:750; letter-spacing:.09em; text-transform:uppercase; color:var(--ink2); }
  .sp-count { font-size:11px; color:var(--faint); font-family:var(--mono); }
  .sp-body { margin-top:8px; }
  .sp-empty { color:var(--faint); font-size:12.5px; padding:10px 2px 12px; line-height:1.5; }

  /* ---- tape header ---- */
  .tape-head { display:flex; align-items:baseline; gap:10px; margin:20px 0 2px; flex-wrap:wrap; }
  .tape-head .tt { font-size:11.5px; font-weight:750; letter-spacing:.08em; text-transform:uppercase; color:var(--ink2); }
  .tape-stats { font-size:11.5px; color:var(--muted); display:inline-flex; flex-wrap:wrap; gap:2px 10px; font-variant-numeric:tabular-nums; }
  .tape-stats .g { color:var(--green); } .tape-stats .r { color:var(--red); }

  /* ---- the rail / stream ---- */
  .rail { margin-top:6px; border-left:2px solid var(--line); margin-left:3px; }
  .tp-row { position:relative; display:flex; gap:12px; padding:11px 4px 11px 16px; border-bottom:1px solid var(--line2); }
  .tp-row:last-child { border-bottom:none; }
  .tp-row::before { content:''; position:absolute; left:-7px; top:16px; width:9px; height:9px; border-radius:50%; background:var(--gray); border:2px solid var(--bg); }
  .tp-row.v-green::before { background:var(--green); } .tp-row.v-red::before { background:var(--red); }
  .tp-row.v-deciding::before, .tp-row.v-split::before { background:var(--amber); }
  .tp-row.live::before { animation:pulse 1.2s infinite; }
  .tp-time { flex:none; width:64px; font-family:var(--mono); font-size:11px; color:var(--faint); padding-top:2px; font-variant-numeric:tabular-nums; }
  .tp-main { min-width:0; flex:1; cursor:pointer; }

  /* a committee panel (decisions, and expanded execution items) */
  .cm-top { display:flex; align-items:flex-start; gap:10px; }
  .verdict { flex:none; font-family:var(--mono); font-size:10px; font-weight:750; letter-spacing:.04em; padding:3px 7px; border-radius:5px; white-space:nowrap; margin-top:1px; }
  .verdict.green { background:var(--green-bg); color:var(--green); }
  .verdict.red { background:var(--red-bg); color:var(--red); }
  .verdict.deciding { background:var(--amber-bg); color:var(--amber); animation:breathe 1.7s ease-in-out infinite; }
  .verdict.split, .verdict.mixed { background:var(--amber-bg); color:var(--amber); }
  .verdict.pending { background:var(--line2); color:var(--muted); border:1px solid var(--line); }
  .verdict.sm { font-size:9.5px; padding:2px 6px; }
  .cbody { min-width:0; flex:1; }
  .ctopic { font-size:14.5px; font-weight:600; line-height:1.36; color:var(--ink); overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
  .cm.compact .ctopic { font-size:13.5px; -webkit-line-clamp:1; }
  .cm.open .ctopic { display:block; -webkit-line-clamp:unset; }
  .cmeta { margin-top:5px; font-size:11px; color:var(--muted); display:flex; flex-wrap:wrap; gap:2px 10px; font-variant-numeric:tabular-nums; }
  .cmeta .src { color:var(--faint); } .cmeta .res { color:var(--faint); font-family:var(--mono); }
  .caret { flex:none; color:var(--faint); font-size:15px; line-height:1.3; transition:transform .18s ease; margin-top:1px; }
  .cm.open .caret, .grp.open .caret { transform:rotate(90deg); }
  .lights { display:flex; flex-wrap:wrap; gap:8px 15px; align-items:center; margin-top:10px; }
  .cmem { display:inline-flex; align-items:center; gap:7px; font-size:12px; }
  .mlight { width:9px; height:9px; border-radius:50%; flex:none; background:var(--gray); }
  .mlight.green { background:var(--green); } .mlight.red { background:var(--red); } .mlight.thinking { background:var(--amber); animation:pulse 1.4s infinite; }
  .mrole { color:var(--muted); font-weight:500; }
  .rounds { margin-top:12px; border-top:1px dashed var(--line); padding-top:11px; display:none; }
  .cm.open .rounds { display:block; }
  .round { margin-bottom:12px; } .round:last-child { margin-bottom:0; }
  .rlabel { font-size:10.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); font-weight:700; margin-bottom:7px; font-family:var(--mono); }
  .rlabel .cur { color:var(--blue); }
  .rmem-head { display:inline-flex; align-items:center; gap:8px; font-size:12.5px; cursor:pointer; padding:2px 0; }
  .rmem-head .mrole { color:var(--ink2); font-weight:600; }
  .rmem-head .vtag { font-size:10px; font-weight:700; letter-spacing:.03em; text-transform:uppercase; font-family:var(--mono); }
  .rmem-head .vtag.green { color:var(--green); } .rmem-head .vtag.red { color:var(--red); } .rmem-head .vtag.thinking { color:var(--amber); }
  .mcomment { display:none; margin:5px 0 4px 17px; padding:9px 11px; background:var(--bg); border:1px solid var(--line); border-radius:8px; font-size:12.5px; line-height:1.5; color:var(--ink2); white-space:pre-wrap; word-break:break-word; max-height:260px; overflow:auto; }
  .rmem.open .mcomment { display:block; }
  .rmem .tcaret { color:var(--faint); font-size:12px; transition:transform .15s; display:inline-block; }
  .rmem.open .tcaret { transform:rotate(90deg); }

  /* execution rollup group (rendered inline inside a tp-row) */
  .grp-top { display:flex; align-items:center; gap:10px; }
  .grp-name { font-size:13.5px; font-weight:650; color:var(--ink); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .grp-counts { margin-left:auto; display:inline-flex; gap:9px; font-size:11.5px; color:var(--muted); white-space:nowrap; font-family:var(--mono); font-variant-numeric:tabular-nums; }
  .grp-counts .g { color:var(--green); } .grp-counts .r { color:var(--red); } .grp-counts .a { color:var(--amber); }
  .grp-sub { margin-top:3px; font-size:11px; color:var(--faint); }
  .grp-items { display:none; margin-top:10px; border-top:1px dashed var(--line); padding-top:2px; } .grp.open .grp-items { display:block; }
  .grp-items .cm { border-bottom:1px solid var(--line2); padding:10px 2px; cursor:pointer; }
  .grp-items .cm:last-child { border-bottom:none; }

  .empty { color:var(--muted); font-size:13px; padding:16px 4px; }

  @keyframes pulse { 50% { opacity:.32; } }
  @keyframes breathe { 50% { opacity:.55; } }
  @media (max-width:560px) {
    .ctopic { font-size:13.5px; }
    .tp-time { width:48px; font-size:10px; }
    .tp-row { gap:8px; padding-left:12px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="ticker">
    <span class="tk-dot" id="fdot"></span>
    <span class="tk-box" id="boxline">connecting to the brain box</span>
    <span class="tk-vitals" id="vitals"></span>
    <span class="tk-svc" id="svc" hidden><span class="sdot"></span><span id="svctext"></span></span>
  </div>
  <div class="banner" id="banner"></div>

  <section class="spotlight" id="spotlight">
    <div class="sp-head">
      <span class="sp-pulse" id="sppulse"></span>
      <h1>Live</h1>
      <span class="sp-count" id="spcount"></span>
    </div>
    <div class="sp-body" id="spbody"></div>
  </section>

  <div class="tape-head">
    <span class="tt">History</span>
    <span class="tape-stats" id="tapestats"></span>
  </div>
  <div class="rail" id="stream"></div>
</div>
<script>
  const urlTheme = new URLSearchParams(location.search).get('theme');
  if (urlTheme === 'dark' || urlTheme === 'light') document.documentElement.dataset.theme = urlTheme;
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.type === 'gg-theme' && (d.theme === 'dark' || d.theme === 'light')) document.documentElement.dataset.theme = d.theme;
  });

  const POLL_MS = 6000;
  let timer = null, lastHeight = 0;
  const openState = {};

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function rel(sec) {
    if (sec < 10) return 'just now';
    if (sec < 60) return `${sec}s ago`;
    const m = Math.round(sec / 60); if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60); return `${h}h ${m % 60}m ago`;
  }
  function relStarted(iso) {
    const t = iso ? Date.parse(iso) : NaN; if (Number.isNaN(t)) return '';
    const sec = Math.max(0, Math.round((Date.now() - t) / 1000));
    if (sec < 60) return 'just now'; const m = Math.round(sec / 60);
    if (m < 60) return `${m}m ago`; const h = Math.floor(m / 60); return `${h}h ${m % 60}m ago`;
  }
  function ageSeconds(ts) { const t = ts ? Date.parse(ts) : NaN; return Number.isNaN(t) ? Infinity : Math.round((Date.now() - t) / 1000); }
  function tsOf(c) { const t = Date.parse(c.updated || c.created || ''); return Number.isNaN(t) ? 0 : t; }
  function fmtClock(ms) {
    if (!ms) return '--:--:--';
    return new Date(ms).toLocaleTimeString([], { hour12:false });
  }
  function fmtBytes(n) {
    if (n == null || isNaN(n)) return '';
    if (n < 1024) return n + ' B';
    if (n < 1048576) return Math.round(n / 1024) + ' KB';
    return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + ' MB';
  }
  function fmtCost(u) { if (u == null || isNaN(u) || u === 0) return ''; return u < 0.01 ? '<$0.01' : '$' + Number(u).toFixed(2); }
  function fmtTokens(n) { if (n == null || isNaN(n) || n === 0) return ''; if (n < 1000) return n + ' tok'; if (n < 1e6) return Math.round(n / 1000) + 'K tok'; return (n / 1e6).toFixed(1) + 'M tok'; }

  function memberClass(m) { return m.status !== 'done' ? 'thinking' : (m.verdict === 'green' ? 'green' : m.verdict === 'red' ? 'red' : ''); }
  function memberTag(m) { return m.status !== 'done' ? 'thinking' : (m.verdict || ''); }
  function verdictKey(c) {
    if (c.verdict === 'green' || c.verdict === 'red' || c.verdict === 'split') return c.verdict;
    if (c.status === 'deciding' || c.verdict === 'deciding') return 'deciding';
    return 'pending';
  }
  function verdictLabel(k) { return { green:'GREEN', red:'RED', split:'SPLIT', deciding:'DECIDING', pending:'QUEUED' }[k] || 'QUEUED'; }
  function isLive(c) {
    if (c.status === 'deciding' || c.verdict === 'deciding') return true;
    const rounds = Array.isArray(c.rounds) ? c.rounds : [];
    const cur = rounds[rounds.length - 1];
    if (cur && Array.isArray(cur.members) && cur.members.some(m => m.status !== 'done')) return true;
    return false;
  }

  function postHeight() {
    const h = Math.ceil(document.documentElement.scrollHeight);
    if (Math.abs(h - lastHeight) < 2) return;
    lastHeight = h;
    try { parent.postMessage({ type: 'gg-embed-height', height: h }, '*'); } catch (e) {}
  }

  function memberLightsHtml(members) {
    return members.map(m => `<span class="cmem"><span class="mlight ${memberClass(m)}"></span><span class="mrole">${esc(m.role)}</span></span>`).join('');
  }
  function roundsHtml(c) {
    const rounds = Array.isArray(c.rounds) ? c.rounds : [];
    return rounds.map((r, i) => {
      const cur = i === rounds.length - 1;
      const members = Array.isArray(r.members) ? r.members : [];
      const mem = members.map((m, j) => {
        const key = `${c.id}:${r.n}:${j}`;
        const has = m.comment && String(m.comment).trim();
        return `<div class="rmem${openState[key] ? ' open' : ''}" data-mkey="${esc(key)}">` +
          `<span class="rmem-head"${has ? '' : ' style="cursor:default"'}>` +
          `<span class="mlight ${memberClass(m)}"></span><span class="mrole">${esc(m.role)}</span>` +
          `<span class="vtag ${memberClass(m)}">${esc(memberTag(m))}</span>` +
          (has ? `<span class="tcaret">&rsaquo;</span>` : '') + `</span>` +
          (has ? `<div class="mcomment">${esc(m.comment)}</div>` : '') + `</div>`;
      }).join('');
      return `<div class="round"><div class="rlabel">Round ${esc(r.n)}${cur ? ' <span class="cur">(current)</span>' : ''}</div>${mem}</div>`;
    }).join('');
  }
  function committeeHtml(c, compact) {
    const k = verdictKey(c);
    const rounds = Array.isArray(c.rounds) ? c.rounds : [];
    const cur = rounds[rounds.length - 1];
    const members = cur && Array.isArray(cur.members) ? cur.members : [];
    const open = !!openState[c.id];
    const res = [fmtTokens(c.tokens), fmtBytes(c.disk_bytes), fmtCost(c.cost_usd)].filter(Boolean).join(' · ');
    const meta = [
      rounds.length ? `round ${rounds.length}` : 'queued',
      `${members.length} member${members.length === 1 ? '' : 's'}`,
      relStarted(c.created),
      c.source && c.source !== 'brain-box' ? c.source : '',
    ].filter(Boolean);
    return `<div class="cm${compact ? ' compact' : ''}${open ? ' open' : ''}" data-cid="${esc(c.id)}">` +
      `<div class="cm-top"><span class="verdict ${k}${compact ? ' sm' : ''}">${verdictLabel(k)}</span>` +
        `<div class="cbody"><div class="ctopic">${esc(c.topic)}</div>` +
          `<div class="cmeta">${meta.map((x, i) => `<span${i === 3 ? ' class="src"' : ''}>${esc(x)}</span>`).join('')}${res ? `<span class="res">${esc(res)}</span>` : ''}</div>` +
          (!open && members.length ? `<div class="lights">${memberLightsHtml(members)}</div>` : '') +
        `</div><span class="caret">&rsaquo;</span></div>` +
      `<div class="rounds">${roundsHtml(c)}</div></div>`;
  }

  function renderTicker(s) {
    const age = ageSeconds(s.ts);
    const fdot = document.getElementById('fdot');
    const banner = document.getElementById('banner');
    if (age < 60) { fdot.className = 'tk-dot fresh'; banner.className = 'banner'; }
    else if (age < 300) { fdot.className = 'tk-dot lagging'; banner.className = 'banner'; }
    else { fdot.className = 'tk-dot paused'; banner.className = 'banner paused show'; banner.textContent = `The brain box has not reported for ${rel(age)}. It is likely paused for cost or offline. Committees below are from the ledger and stay accurate.`; }
    document.getElementById('boxline').textContent = `${s.box || 'box'} · ${s.uptime || ''} · ${age < 300 ? 'updated ' + rel(age) : 'last seen ' + rel(age)}`;

    const svc = s.services || {}, entries = Object.entries(svc);
    const down = entries.filter(([, v]) => !v).map(([k]) => k);
    const svcEl = document.getElementById('svc');
    if (down.length) { svcEl.hidden = false; document.getElementById('svctext').textContent = `${down.join(', ')} down`; svcEl.title = entries.map(([k, v]) => `${k}: ${v ? 'up' : 'DOWN'}`).join('\n'); }
    else svcEl.hidden = true;

    const load0 = Array.isArray(s.load) && s.load.length ? Number(s.load[0]) : 0;
    const cores = Number(s.cores) || 1;
    const memPct = (s.mem && Number(s.mem.pct)) || 0;
    const diskPct = parseInt(s.disk_pct, 10) || 0;
    const agents = Number(s.live_agent_count) || 0;
    const monitorUp = svc.monitor === true;
    const at = agents > 0 ? `<b>${agents}</b> agent${agents === 1 ? '' : 's'} working` : (monitorUp ? 'agents idle' : 'agents unknown');
    document.getElementById('vitals').innerHTML =
      `<span class="${load0 / cores >= 1.8 ? 'crit' : load0 / cores >= 0.9 ? 'warn' : ''}">load <b>${load0.toFixed(2)}</b>/${cores}</span>` +
      `<span class="${memPct >= 85 ? 'crit' : memPct >= 70 ? 'warn' : ''}">mem <b>${memPct}%</b></span>` +
      `<span class="${diskPct >= 90 ? 'crit' : diskPct >= 80 ? 'warn' : ''}">disk <b>${esc(s.disk_pct || '?')}</b></span>` +
      `<span>${at}</span>`;
  }
  function renderTickerDown() {
    document.getElementById('fdot').className = 'tk-dot down';
    document.getElementById('boxline').textContent = 'the brain box is not reporting';
    document.getElementById('svc').hidden = true;
    document.getElementById('vitals').innerHTML = '';
  }

  function renderSpotlight(liveItems) {
    const spot = document.getElementById('spotlight');
    const body = document.getElementById('spbody');
    const count = document.getElementById('spcount');
    if (!liveItems.length) {
      spot.classList.remove('live');
      count.textContent = '';
      body.innerHTML = `<div class="sp-empty">Nothing deliberating right now. Live panels surface here the moment a committee starts.</div>`;
      return;
    }
    spot.classList.add('live');
    count.textContent = `${liveItems.length} in progress`;
    body.innerHTML = liveItems.map(c => {
      const ts = tsOf(c);
      return `<div class="tp-row live v-${verdictKey(c)}"><div class="tp-time" title="${esc(c.created || '')}">${fmtClock(ts)}</div>` +
        `<div class="tp-main">${committeeHtml(c, false)}</div></div>`;
    }).join('');
  }

  function groupExecution(list) {
    const groups = {};
    list.forEach(c => { const g = c.gating || 'ungrouped'; (groups[g] = groups[g] || []).push(c); });
    return Object.entries(groups).map(([g, items]) => {
      let green = 0, red = 0, live = 0, ts = 0;
      items.forEach(c => { const k = verdictKey(c); if (k === 'green') green++; else if (k === 'red') red++; else if (isLive(c)) live++; ts = Math.max(ts, tsOf(c)); });
      return { gating: g, items, green, red, live, ts };
    });
  }
  function groupHtml(grp) {
    const gid = 'grp:' + grp.gating;
    const open = !!openState[gid];
    const counts = [grp.green ? `<span class="g">${grp.green} pass</span>` : '', grp.red ? `<span class="r">${grp.red} fail</span>` : '', grp.live ? `<span class="a">${grp.live} live</span>` : ''].filter(Boolean).join('');
    return `<div class="grp${open ? ' open' : ''}" data-gid="${esc(gid)}">` +
      `<div class="grp-top"><span class="grp-name">${esc(grp.gating)}</span><span class="grp-counts">${counts}</span><span class="caret">&rsaquo;</span></div>` +
      `<div class="grp-sub">${grp.items.length} check${grp.items.length === 1 ? '' : 's'} on record</div>` +
      `<div class="grp-items">${grp.items.slice().sort((a, b) => tsOf(b) - tsOf(a)).map(c => committeeHtml(c, true)).join('')}</div></div>`;
  }

  function renderTape(decisions, execution, execStats) {
    const s = execStats || {};
    const bits = [];
    if (s.total) bits.push(`<span><b>${s.total}</b> total</span>`);
    if (s.today) bits.push(`<span><b>${s.today}</b> today</span>`);
    if (s.green) bits.push(`<span class="g">${s.green} pass</span>`);
    if (s.red) bits.push(`<span class="r">${s.red} fail</span>`);
    if (s.tokens) bits.push(`<span>${fmtTokens(s.tokens)}</span>`);
    if (s.disk) bits.push(`<span>${fmtBytes(s.disk)} disk</span>`);
    document.getElementById('tapestats').innerHTML = bits.join('');

    const decHistory = decisions.filter(c => !isLive(c)).map(c => ({ kind: 'decision', c, ts: tsOf(c) }));
    const execGroups = groupExecution(execution).map(g => ({ kind: 'group', g, ts: g.ts }));
    const merged = decHistory.concat(execGroups).sort((a, b) => b.ts - a.ts);

    const host = document.getElementById('stream');
    if (!merged.length) { host.innerHTML = '<div class="empty">No signal history yet. Panels appear here once a committee runs or concludes.</div>'; return; }
    host.innerHTML = merged.map(e => {
      const v = e.kind === 'decision' ? verdictKey(e.c) : (e.g.red ? 'red' : e.g.green ? 'green' : e.g.live ? 'deciding' : 'pending');
      const inner = e.kind === 'decision' ? committeeHtml(e.c, false) : groupHtml(e.g);
      const timeSrc = e.kind === 'decision' ? (e.c.updated || e.c.created) : null;
      return `<div class="tp-row v-${v}"><div class="tp-time" title="${esc(timeSrc || '')}">${fmtClock(e.ts)}</div>` +
        `<div class="tp-main">${inner}</div></div>`;
    }).join('');
  }

  function bindAll() {
    document.querySelectorAll('.grp').forEach(el => {
      el.querySelector('.grp-top').addEventListener('click', (ev) => {
        ev.stopPropagation();
        const id = el.dataset.gid; openState[id] = !openState[id]; el.classList.toggle('open'); postHeight();
      });
    });
    document.querySelectorAll('.cm').forEach(el => {
      el.addEventListener('click', (ev) => {
        if (ev.target.closest('.rmem-head')) return;
        const id = el.dataset.cid; openState[id] = !openState[id]; el.classList.toggle('open'); postHeight();
      });
    });
    document.querySelectorAll('.rmem-head').forEach(h => {
      h.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const row = h.closest('.rmem'); if (!row.querySelector('.mcomment')) return;
        openState[row.dataset.mkey] = !openState[row.dataset.mkey]; row.classList.toggle('open'); postHeight();
      });
    });
  }

  async function fetchJson(url) {
    const r = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, { cache: 'no-store' });
    if (!r.ok) throw new Error(String(r.status));
    return r.json();
  }
  async function tick() {
    const [bs, cf] = await Promise.allSettled([fetchJson('/brain-status'), fetchJson('/committee-feed')]);
    if (bs.status === 'fulfilled' && bs.value && bs.value.box) renderTicker(bs.value); else renderTickerDown();
    if (cf.status === 'fulfilled' && cf.value) {
      const decisions = Array.isArray(cf.value.decisions) ? cf.value.decisions : [];
      const execution = Array.isArray(cf.value.execution) ? cf.value.execution : [];
      const liveDecisions = decisions.filter(isLive);
      const liveExecution = execution.filter(isLive);
      const live = liveDecisions.concat(liveExecution).sort((a, b) => tsOf(b) - tsOf(a));
      renderSpotlight(live);
      renderTape(decisions, execution, cf.value.stats && cf.value.stats.execution);
    } else {
      renderSpotlight([]);
      document.getElementById('stream').innerHTML = '<div class="empty">Committee ledger unavailable, reconnecting.</div>';
    }
    bindAll();
    postHeight();
  }
  function schedule() { clearTimeout(timer); if (!document.hidden) timer = setTimeout(loop, POLL_MS); }
  async function loop() { await tick(); schedule(); }
  document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(timer); else loop(); });
  window.addEventListener('resize', postHeight);
  loop();
</script>
</body>
</html>
