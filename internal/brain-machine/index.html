const planState=v=>statusName(v)==='green'?'done':statusName(v)==='judged-bad'||/block|wait|need/i.test(String(v||''))?'blocked':'active';const stepState=step=>{const value=`${step.state} ${step.source?.actor||''}`.toLowerCase();if(statusName(step.state)==='green')return['DONE','done'];if(/wait|block|need|approval/.test(value)||(/human/.test(value)&&!/done|complete/.test(value)))return['WAITING ON YAIR','waiting'];if(/live|doing|running|progress|deciding|active/.test(value))return['LIVE','live'];return['TODO','todo']};const linkRows=value=>{const rows=[];arr(value?.links).forEach(link=>rows.push({label:link.label||'artifact',href:link.href||link.url}));if(value?.links&&!Array.isArray(value.links)){if(value.links.artifact)rows.push({label:'artifact',href:value.links.artifact});arr(value.links.stamps).forEach((href,index)=>rows.push({label:`stamp ${index+1}`,href}))}for(const [key,label] of [['gitlab_url','GitLab MD'],['md_url','GitLab MD'],['artifact_url','artifact'],['artifact','artifact'],['mr_url','merge request'],['commit_url','commit'],['issue_url','issue'],['url','link'],['href','link']])if(value?.[key])rows.push({label,href:value[key]});return rows.filter((row,index,all)=>row.href&&all.findIndex(other=>other.href===row.href)===index)};const usageText=value=>{const bits=[];if(value?.cost_usd!=null||value?.cost!=null)bits.push(`$${value.cost_usd??value.cost}`);if(value?.tokens!=null)bits.push(`${value.tokens} tokens`);if(value?.usage!=null)bits.push(typeof value.usage==='object'?JSON.stringify(value.usage):String(value.usage));return bits.join(' · ')};const ids=value=>arr(value).map(item=>typeof item==='object'?(item.id||item.session||item.name):item).filter(Boolean).map(String);function attachments(step,plan){const source=step.source||{},committeeIds=[...ids(source.committees),...ids(source.committee_ids),...ids(source.committee_id?[source.committee_id]:[])],workerIds=[...ids(source.workers),...ids(source.worker_ids),...ids(source.worker_id?[source.worker_id]:[])];const matches=(item,wanted)=>wanted.some(id=>[item.id,item.source?.id,item.session,item.title].filter(Boolean).map(String).includes(id));const committees=entries.filter(item=>item.type==='committee'&&(matches(item,committeeIds)||item.source?.step_id===source.id||item.source?.node_id===source.id));const workers=entries.filter(item=>item.type==='worker'&&(matches(item,workerIds)||item.source?.step_id===source.id||item.source?.node_id===source.id||item.source?.parent_id===source.id));if(!workers.length&&stepState(step)[1]==='live')entries.filter(item=>item.type==='worker'&&(item.source?.plan_id===plan.source.id||item.source?.plan===plan.title)).slice(0,3).forEach(item=>workers.push(item));return{committees,workers}}
function renderPlans(){const plans=entries.filter(item=>item.type==='plan').sort((a,b)=>stamp(b.time)-stamp(a.time));planSteps=plans.flatMap(stepItems);const waiting=planSteps.filter(step=>stepState(step)[1]==='waiting');$('planCount').textContent=`${plans.length} plan${plans.length===1?'':'s'}`;if(!plans.length){$('plans').innerHTML='<div class="empty">No plans are reported. The sample execution plans remain visible until a non-empty feed arrives.</div>';return}const topics=new Map();plans.forEach(plan=>{const topic=plan.source.topic||plan.source.workstream||plan.source.bucket||plan.source.category||(plan.sample?'Unassigned topic':pending());if(!topics.has(topic))topics.set(topic,[]);topics.get(topic).push(plan)});const waitingBar=`<div class="plan-waiting"><strong>Waiting on Yair</strong><span>${waiting.length?`${waiting.length} step${waiting.length===1?'':'s'} across all plans`:'Nothing is waiting for Yair.'}</span></div>`;$('plans').innerHTML=waitingBar+[...topics].map(([topic,topicPlans])=>`<section class="topic"><header class="topic-head"><h3>${typeof topic==='string'?esc(topic):topic}</h3><span class="subcopy">${topicPlans.length} plan${topicPlans.length===1?'':'s'}</span></header><div class="topic-plans">${topicPlans.map(plan=>{const steps=stepItems(plan),counts=planCounts(plan.source),planLinks=linkRows(plan.source),planCost=usageText(plan.source),state=planState(plan.state);return`<details class="plan"><summary class="plan-summary"><span><span class="plan-title"><strong>${esc(plan.title)}</strong><span class="status ${state==='done'?'green':state==='blocked'?'judged-bad':'deciding'}">${state}</span></span><span class="plan-copy">${esc(definition(plan))}</span></span><span class="plan-meta"><strong>${counts.done}/${counts.total||0} steps</strong><span>updated ${esc(rel(plan.time))}</span><span>usage ${planCost?esc(planCost):plan.sample?'':pending()}</span>${planLinks[0]?`<a class="plan-link" href="${esc(planLinks[0].href)}" target="_blank" rel="noreferrer">${esc(planLinks[0].label)}</a>`:''}${!plan.sample&&!plan.source.gitlab_url?`<span>GitLab MD ${pending()}</span>`:''}</span></summary><div class="steps">${steps.length?steps.map(step=>{const [stateLabel,stateClass]=stepState(step),attached=attachments(step,plan),stepLinks=linkRows(step.source),usage=usageText(step.source),pendingStepLinks=step.sample?'':[['mr_url','merge request'],['commit_url','commit'],['issue_url','issue']].filter(([key])=>!step.source[key]).map(([,label])=>`<span>${label} ${pending()}</span>`).join('');if(!attached.committees.length&&step.source.committee)entries.filter(item=>item.type==='committee'&&item.source?.plan===plan.title).slice(0,1).forEach(item=>attached.committees.push(item));return`<details class="step-card" style="--depth:${step.depth}"><summary class="step-summary"><span class="step-index">${step.order}</span><span class="step-title"><strong>${esc(step.title)}</strong><span>${esc(definition(step))}</span></span><span class="step-state ${stateClass}">${stateLabel}</span></summary><div class="step-body"><div class="step-facts"><span>updated ${esc(rel(step.time))}</span>${usage?`<span>usage ${esc(usage)}</span>`:''}</div><div class="artifact-links">${stateClass==='live'?(()=>{const live=attached.workers[0]||attached.committees[0];return live?`<a href="#live-${esc(live.id)}" data-live-target="${esc(live.id)}">Open in Live</a>`:''})():''}${stepLinks.map(link=>`<a href="${esc(link.href)}" target="_blank" rel="noreferrer">${esc(link.label)}</a>`).join('')}${pendingStepLinks}</div><div class="attachments">${attached.committees.map(item=>`<div class="attachment"><span class="type">committee</span><button type="button" data-open="${esc(item.id)}">${esc(item.title)}</button><span class="push">${status(item.state)}</span></div>`).join('')}${attached.workers.map(item=>`<div class="attachment"><span class="type">worker</span><button type="button" data-open="${esc(item.id)}">${esc(item.title)}</button><span class="push">${status(item.state)}</span></div>`).join('')}${!attached.committees.length&&!attached.workers.length?'<span class="no-attachments">No committee or worker attachment was reported for this step.</span>':''}</div></div></details>`}).join(''):'<span class="subcopy">No steps reported.</span>'}</div></details>`}).join('')}</div></section>`).join('')}
function facts(rows){return`<dl class="facts">${rows.map(([k,v])=>`<div><dt>${esc(k)}</dt><dd>${v||'Unavailable'}</dd></div>`).join('')}</dl>`}function links(item,provided){const rows=provided??arr(item.source?.links).map(link=>`<a href="${esc(link.href||'#')}" target="_blank" rel="noreferrer">${esc(link.label||link.href||'Open link')}</a>`);return`<section class="block links"><h3>Links</h3>${rows.length?rows.join(' '):`<p><strong>Links:</strong> ${pending()}</p>`}</section>`}
function detail(item){const x=item.source||{};const currentAction=current(item);let detailLinks;let body=`<div class="intro"><p>${esc(definition(item))}</p>${currentAction?`<p><strong>Current:</strong> ${esc(currentAction)}</p>`:''}</div>${facts([['Status',status(item.state)],['Model',chip(item.model,item.effort)],['Session',esc(item.session||'Unavailable')],['Timestamp',esc(item.time||'Unavailable')],['Elapsed',esc(duration(x.started||x.created||item.time))],['Parent',esc(parent(item))]])}`;if(item.type==='committee'){const rec=item.record||item.committee||x||item;const rounds=arr(rec.rounds);const latestRound=rounds[rounds.length-1]||{};const members=arr(rec.members||x.members||x.responses||x.participants||latestRound.members);const dissent=arr(rec.dissent);const committeeLinks=rec.links||{};const lensName=m=>{const lane=laneName(m.model);if(lane)return lane;const lens=String(m.lens||m.name||m.role||'').trim();return lens?lens.charAt(0).toUpperCase()+lens.slice(1):'Member'};const memberVerdict=m=>m.verdict||m.status||m.state;const statusValue=(values,fallback)=>{const aggregate=aggregateStatus(values);return values.filter(Boolean).length?aggregate:fallback||aggregate};const objList=(list,label,color)=>{const values=arr(list);return values.length?`<div style="margin-top:6px"><em style="color:${color}">${label}</em><ul style="margin:4px 0 0;padding-left:16px">${values.map(value=>`<li>${esc(typeof value==='object'?(value.text||value.message||JSON.stringify(value)):value)}</li>`).join('')}</ul></div>`:''};const blockingFor=m=>m.blocking||m.blocking_objections||m.objections;const memberBlock=m=>{const verdict=memberVerdict(m);const blocking=blockingFor(m);const notes=m.non_blocking||m.nonBlocking;const stampUrl=m.stamp_url||m.stamp_path;return`<article class="member"><div class="member-head"><strong>${esc(lensName(m))}</strong>${verdict?status(verdict):''}${chip(baseModel(m.model),m.effort||item.effort)}</div><p style="margin:6px 0 0"><strong>Verdict:</strong> ${verdict?status(verdict):pending()}</p>${objList(blocking,'Blocking objections',"var(--bad)")||`<p style="margin:6px 0 0"><strong>Blocking objections:</strong> ${pending()}</p>`}${objList(notes,'Notes',"var(--muted)")||`<p style="margin:6px 0 0"><strong>Notes:</strong> ${pending()}</p>`}${m.comment?`<p><strong>Comment:</strong> ${esc(m.comment)}</p>`:`<p><strong>Comment:</strong> ${pending()}</p>`}${stampUrl?`<p class="links"><strong>Stamp:</strong> <a href="${esc(stampUrl)}">stamp</a></p>`:`<p class="links"><strong>Stamp:</strong> ${pending()}</p>`}</article>`};const roundBlock=(round,index)=>{const roundMembers=arr(round.members);const changed=round.what_changed||round.changed||round.changes||round.summary||round.synthesis;const verdicts=roundMembers.map(memberVerdict).filter(Boolean);const aggregate=statusValue(verdicts,round.verdict||round.status);return`<article class="member"><div class="member-head"><strong>Round ${esc(round.n||round.number||index+1)}</strong>${status(aggregateLabel(aggregate))}</div><p><strong>Verdicts:</strong> ${roundMembers.length?roundMembers.map(member=>`${esc(lensName(member))}: ${memberVerdict(member)?status(memberVerdict(member)):pending()}`).join(' · '):pending()}</p><p><strong>What changed:</strong> ${changed?esc(changed):pending()}</p></article>`};const committeeVerdicts=[...members,...arr(latestRound.members)].map(memberVerdict).filter(Boolean);const committeeState=statusValue(committeeVerdicts,rec.verdict||rec.status||item.state);const synthesis=[rec.synthesis,x.synthesis].find(value=>value&&!/^(deciding|thinking|in[ _-]?progress|green|clean|judged[ _-]?bad|could[ _-]?not[ _-]?judge|done|complete)$/i.test(String(value).trim()));const linkRows=[];if(committeeLinks.artifact||rec.artifact_url)linkRows.push(`<a href="${esc(committeeLinks.artifact||rec.artifact_url)}">artifact</a>`);arr(committeeLinks.stamps).forEach((stampUrl,index)=>linkRows.push(`<a href="${esc(stampUrl)}">stamp ${index+1}</a>`));if(rec.stamp_url)linkRows.push(`<a href="${esc(rec.stamp_url)}">stamp</a>`);body+=`<section class="block"><h3>Committee</h3>${facts([['Grade',esc(rec.grade||'unknown')],['Round',esc(String(rec.round||latestRound.n||rounds.length||1))],['Verdict',status(aggregateLabel(committeeState))],['Artifact',esc(rec.target_artifact||parent(item))]])}${dissent.length?`<p style="margin:8px 0 0;color:var(--bad)"><strong>Dissenting:</strong> ${dissent.map(value=>esc(lensName({lens:value}))).join(', ')}</p>`:'<p style="margin:8px 0 0;color:var(--muted)">No dissent reported.</p>'}</section><section class="block"><h3>Members and verdicts</h3>${members.length?members.map(memberBlock).join(''):`<p><strong>Members:</strong> ${pending()}</p>`}</section><section class="block"><h3>Rounds</h3>${rounds.length?rounds.map(roundBlock).join(''):`<p><strong>Rounds:</strong> ${pending()}</p>`}</section><section class="block"><h3>Synthesis</h3><p><strong>Synthesis:</strong> ${synthesis?esc(synthesis):pending()}</p></section>`;detailLinks=linkRows}else if(item.type==='plan'){const counts=planCounts(x);body+=`<section class="block"><h3>Rollup</h3><p>${counts.done} of ${counts.total||'unknown'} child nodes are complete. ${esc(x.current_step||x.phase||current(item))}</p></section><section class="block"><h3>Plan nodes</h3>${stepItems(item).map(step=>`<article class="member"><div class="member-head"><strong>${esc(step.title)}</strong>${status(step.state)}</div><p>${esc(definition(step))}</p></article>`).join('')||'<p>No plan nodes reported.</p>'}</section>`}else{body+=`<section class="block"><h3>Assignment</h3><p>${esc(x.assignment||x.action||item.title)}</p></section><section class="block"><h3>Latest output</h3><p>${esc(x.output||x.current_output||x.message||current(item))}</p></section>`}return body+links(item,detailLinks)}
function openDetail(item,opener){if(activeId===item.id){closeDetail();return}activeId=item.id;lastFocus=opener||document.activeElement;$('drawerKicker').textContent=item.type;$('drawerTitle').textContent=item.title;$('drawerBody').innerHTML=detail(item);$('drawer').classList.add('open');$('backdrop').classList.add('open');$('drawer').setAttribute('aria-hidden','false');$('close').focus()}function closeDetail(){activeId=null;$('drawer').classList.remove('open');$('backdrop').classList.remove('open');$('drawer').setAttribute('aria-hidden','true');lastFocus?.focus?.()}
function render(){makeData();renderNeeds();renderLive();renderPlans();const cost=feeds.status?.cost??feeds.status?.cost_usd??feeds.status?.today_cost;$('cost').textContent=cost==null?'':`Today $${cost}`}
function setTab(name){const selected=name==='plan'?'plan':'live';localStorage.setItem('brain-machine-tab',selected);document.querySelectorAll('.tab').forEach(tab=>tab.setAttribute('aria-selected',String(tab.dataset.tab===selected)));$('liveView').hidden=selected!=='live';$('planView').hidden=selected!=='plan'}
function hasContent(key,data){if(!data||typeof data!=='object')return false;if(key==='status')return Object.keys(data).length>0;if(key==='workers')return arr(data.running).length+arr(data.recent).length>0;if(key==='committees')return arr(data.decisions).length+arr(data.execution).length>0;if(key==='plans')return arr(data.plans).length>0;return false}async function fetchJson(url){const response=await fetch(`${url}?_=${Date.now()}`,{cache:'no-store'});if(!response.ok)throw Error(String(response.status));return response.json()}async function refresh(){const sources=[['status','/brain-status'],['committees','/committee-feed'],['workers','/builder-feed'],['plans','/exec-plan-feed']];await Promise.all(sources.map(async([key,url])=>{try{const data=await fetchJson(url);if(hasContent(key,data))feeds[key]=data;failed.delete(url)}catch(error){failed.add(url)}}));render();$('feedState').textContent=failed.size?'Sample + live':'Live connected';$('notice').textContent=failed.size?'Some feeds are unavailable. Showing the last non-empty data, with sample data as fallback.':''}
document.addEventListener('click',event=>{const tab=event.target.closest('[data-tab]');if(tab){setTab(tab.dataset.tab);return}const liveTarget=event.target.closest('[data-live-target]');if(liveTarget){event.preventDefault();setTab('live');requestAnimationFrame(()=>document.getElementById(`live-${liveTarget.dataset.liveTarget}`)?.scrollIntoView({behavior:'smooth',block:'center',inline:'center'}));return}const open=event.target.closest('[data-open]');if(open){const item=entries.find(x=>x.id===open.dataset.open);if(item)openDetail(item,open);return}if(event.target.closest('#close')||event.target===$('backdrop'))closeDetail()});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeDetail()});$('theme').addEventListener('click',()=>{const dark=document.documentElement.dataset.theme==='dark'||(!document.documentElement.dataset.theme&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.dataset.theme=dark?'light':'dark'});$('refresh').addEventListener('click',refresh);setTab(localStorage.getItem('brain-machine-tab')||'live');render();refresh();setInterval(refresh,5000);
})();
