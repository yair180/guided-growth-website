<body>
<main class="shell">
  <header class="topbar"><div class="brand"><span>GUIDED GROWTH / MACHINE</span><i class="live-dot"></i><span id="liveCount" class="live-count">Loading live state</span></div><div class="header-center"><select class="scope" aria-label="Scope"><option>All machine</option></select><input id="search" class="search" type="search" placeholder="Search plans, workers, decisions, sessions…" aria-label="Search activity"></div><div class="header-right"><button id="problems" class="quiet-button" type="button">Problems</button><span class="tokens" id="tokensToday">Cost loading</span><button id="pause" class="quiet-button" type="button">Pause live</button><button id="theme" class="icon-button" type="button" aria-label="Toggle theme">◐</button><button class="icon-button" type="button" aria-label="Settings">⚙</button></div></header>
  <div id="notices" class="notice"></div>
  <section class="needs" aria-label="Needs you"><div id="needsList" class="needs-list"></div></section>
  <section class="section" aria-labelledby="liveHeading"><div class="section-top"><h2 id="liveHeading" class="eyebrow">Live now</h2><span id="liveNote" class="section-note">Current machine activity</span></div><div id="liveGrid" class="live-grid"></div></section>
  <section class="section lower-grid"><div><div class="section-top"><h2 class="eyebrow">Everything happening</h2><span id="boardCount" class="section-note"></span></div><div class="board-controls"><span class="view-label">Grouped</span><div class="filter-group"><button class="filter" type="button" data-type="worker" aria-pressed="true">Workers</button><button class="filter" type="button" data-type="committee" aria-pressed="true">Committees</button><button class="filter" type="button" data-type="plan" aria-pressed="true">Plans</button></div><div class="filter-group"><button class="filter" type="button" data-state="all" aria-pressed="true">All</button><button class="filter" type="button" data-state="live" aria-pressed="false">Live</button><button class="filter" type="button" data-state="needs-you" aria-pressed="false">Needs you</button><button class="filter" type="button" data-state="done" aria-pressed="false">Done</button></div><span class="spacer"></span><button id="expand" class="text-button" type="button">Expand all</button><button id="collapse" class="text-button" type="button">Collapse all</button></div><div id="board" class="board-stack"></div></div>
  <aside id="telemetry" class="telemetry" aria-label="Machine telemetry"></aside></section>
  <section class="history" aria-labelledby="historyHeading"><div class="section-top"><h2 id="historyHeading" class="eyebrow">Done and history</h2><button id="newActivity" class="text-button" type="button" hidden>New activity</button></div><div id="timeline" class="history-list"></div></section>
</main>
<div id="backdrop" class="backdrop"></div><aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" aria-hidden="true"><header class="drawer-head"><div><p id="drawerKicker" class="drawer-kicker">Detail</p><h2 id="drawerTitle" class="drawer-title">Item detail</h2></div><button id="closeDrawer" class="close" type="button" aria-label="Close detail">×</button></header><div id="drawerBody" class="drawer-body"></div></aside><div id="announcements" class="live-region" aria-live="polite"></div>
