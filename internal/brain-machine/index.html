<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Command Center</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  :root {
    --bg:#f7f8fa; --panel:#fff; --wash:#f0f2f6; --ink:#1c2430; --ink2:#39434f; --muted:#6a7484; --faint:#98a1b0;
    --line:#e4e8ef; --line2:#eef1f6; --blue:#2456c7;
    --green:#1c7a4d; --green-bg:#e3f6ec; --amber:#a15c00; --amber-bg:#fdf0d6; --red:#b42318; --red-bg:#fdece9; --gray:#9aa3b2;
    --cool:#276a9b; --cool-bg:#e3f1fa; --hot:#a83c23; --hot-bg:#fbe6df;
    --mono:ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) { :root:not([data-theme]) {
    --bg:#10151d; --panel:#161c26; --wash:#131a24; --ink:#edf2f8; --ink2:#c7d0dc; --muted:#8b97a8; --faint:#5b6676;
    --line:#2a3441; --line2:#1b2430; --blue:#8db2ff;
    --green:#5fd493; --green-bg:#12331f; --amber:#f2bd63; --amber-bg:#3a2c10; --red:#ff8f88; --red-bg:#3a1a17; --gray:#5f6b7b;
    --cool:#75c9ff; --cool-bg:#102d42; --hot:#ffae91; --hot-bg:#412018;
  } }
  html[data-theme="dark"] {
    --bg:#10151d; --panel:#161c26; --wash:#131a24; --ink:#edf2f8; --ink2:#c7d0dc; --muted:#8b97a8; --faint:#5b6676;
    --line:#2a3441; --line2:#1b2430; --blue:#8db2ff;
    --green:#5fd493; --green-bg:#12331f; --amber:#f2bd63; --amber-bg:#3a2c10; --red:#ff8f88; --red-bg:#3a1a17; --gray:#5f6b7b;
    --cool:#75c9ff; --cool-bg:#102d42; --hot:#ffae91; --hot-bg:#412018;
  }
  html[data-theme="light"] {
    --bg:#f7f8fa; --panel:#fff; --wash:#f0f2f6; --ink:#1c2430; --ink2:#39434f; --muted:#6a7484; --faint:#98a1b0;
    --line:#e4e8ef; --line2:#eef1f6; --blue:#2456c7;
    --green:#1c7a4d; --green-bg:#e3f6ec; --amber:#a15c00; --amber-bg:#fdf0d6; --red:#b42318; --red-bg:#fdece9; --gray:#9aa3b2;
    --cool:#276a9b; --cool-bg:#e3f1fa; --hot:#a83c23; --hot-bg:#fbe6df;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.45 var(--sans); -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1440px; margin:0 auto; padding:10px 14px 28px; }
  .topstrip { display:flex; flex-wrap:wrap; align-items:center; gap:5px 15px; padding:0 2px 9px; border-bottom:1px solid var(--line); font-size:11.5px; }
  .fdot, .dot { width:8px; height:8px; border-radius:50%; background:var(--gray); flex:none; }
  .fdot.fresh, .dot.live, .dot.ok { background:var(--green); }
  .fdot.lagging, .dot.waiting { background:var(--amber); animation:pulse 1.6s infinite; }
  .fdot.paused { background:var(--gray); } .fdot.down, .dot.bad { background:var(--red); animation:pulse 1.4s infinite; }
  .topstrip .box { color:var(--ink2); font-weight:650; }
  .topstrip .sub { color:var(--muted); }
  .vitals { margin-left:auto; display:flex; flex-wrap:wrap; gap:3px 13px; color:var(--muted); font:11.5px var(--mono); }
  .vitals b { color:var(--ink2); font-weight:600; } .warn { color:var(--amber); } .crit { color:var(--red); }
  .need-number { display:inline-flex; align-items:baseline; gap:5px; padding:2px 8px; border-radius:6px; background:var(--line2); color:var(--muted); font:11px var(--mono); }
  .need-number b { color:var(--ink2); font-size:15px; } .need-number.hot { background:var(--red-bg); color:var(--red); } .need-number.hot b { color:var(--red); }
  .zone { margin-top:12px; border:1px solid var(--line); border-radius:9px; background:var(--panel); overflow:hidden; }
  .zone.needs { background:var(--wash); } .zone.needs.active { border-color:var(--amber); box-shadow:0 0 0 1px color-mix(in srgb, var(--amber) 18%, transparent); }
  .zone-head { min-height:37px; padding:8px 11px; display:flex; align-items:center; gap:8px; border-bottom:1px solid var(--line); }
  .zone-title { font-size:10px; font-weight:750; letter-spacing:.09em; text-transform:uppercase; color:var(--ink2); }
  .zone-count { color:var(--muted); font:11px var(--mono); }
  .zone-note { margin-left:auto; color:var(--faint); font-size:10.5px; }
  .zone-body { min-width:0; }
  .empty, .unavailable { padding:10px 12px; color:var(--muted); font-size:12px; }
  .unavailable { color:var(--faint); font-style:italic; }
  .row { border-bottom:1px solid var(--line); } .row:last-child { border-bottom:0; }
  .row-line { display:flex; align-items:center; gap:8px; min-width:0; padding:7px 10px; cursor:pointer; }
  .row-line:hover { background:color-mix(in srgb, var(--wash) 78%, transparent); }
  .row-body { flex:1; min-width:0; display:flex; align-items:center; gap:7px; }
  .row-main { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink2); font-size:12px; font-weight:600; }
  .row-sub { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:10.5px; }
  .row-detail { display:none; padding:2px 11px 10px 28px; } .row.open > .row-detail { display:block; }
  .row.open > .row-line .caret, .phase.open > .phase-line .caret, .step.open > .step-line .caret, .member.open > .member-line .caret { transform:rotate(90deg); }
  .caret { margin-left:auto; color:var(--faint); font-size:14px; transition:transform .15s ease; flex:none; }
  .type, .actor, .status, .committee-badge, .session, .model-chip { flex:none; white-space:nowrap; }
  .type { padding:2px 5px; border-radius:4px; background:var(--line2); color:var(--blue); font-size:8.5px; font-weight:750; letter-spacing:.05em; }
  .type.committee { color:var(--amber); background:var(--amber-bg); } .type.plan { color:var(--green); background:var(--green-bg); }
  .session { padding:1px 5px; border-radius:4px; color:var(--blue); background:var(--line2); font:10px var(--mono); overflow:hidden; text-overflow:ellipsis; max-width:180px; }
  .model-chip { padding:2px 6px; border-radius:5px; background:var(--line2); color:var(--ink2); font:9.5px var(--mono); }
  .model-chip.low { color:var(--cool); background:var(--cool-bg); } .model-chip.high { color:var(--hot); background:var(--hot-bg); }
  .status { padding:2px 5px; border-radius:4px; font-size:8.5px; font-weight:750; letter-spacing:.04em; text-transform:uppercase; }
  .status.green { color:var(--green); background:var(--green-bg); } .status.red { color:var(--red); background:var(--red-bg); }
  .status.amber { color:var(--amber); background:var(--amber-bg); } .status.gray { color:var(--muted); background:var(--line2); }
  .actor { padding:2px 5px; color:var(--muted); background:var(--line2); border-radius:4px; font:9px var(--mono); text-transform:uppercase; }
  .actor.human { color:var(--amber); background:var(--amber-bg); } .actor.mix { color:var(--blue); }
  .committee-badge { padding:1px 5px; color:var(--amber); border:1px dashed var(--amber); border-radius:4px; font-size:8.5px; font-weight:700; }
  .detail-copy { color:var(--ink2); font-size:12px; line-height:1.55; white-space:pre-wrap; word-break:break-word; }
  .detail-meta { display:flex; flex-wrap:wrap; gap:5px 8px; margin:0 0 7px; color:var(--muted); font:10.5px var(--mono); }
  .member { border-top:1px solid var(--line2); } .member-line, .step-line, .phase-line { display:flex; align-items:center; gap:7px; min-width:0; cursor:pointer; }
  .member-line { padding:6px 0; } .member-name { color:var(--ink2); font-size:11.5px; font-weight:600; } .member-does { min-width:0; flex:1; color:var(--muted); font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .member-full, .step-detail { display:none; margin:0 0 8px 16px; padding:8px 10px; background:var(--bg); border:1px solid var(--line); border-radius:7px; color:var(--ink2); font-size:11.5px; white-space:pre-wrap; word-break:break-word; }
  .member.open .member-full, .step.open .step-detail { display:block; }
  .plan { border-bottom:1px solid var(--line); } .plan:last-child { border-bottom:0; }
  .plan-line { display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; } .plan-line:hover, .phase-line:hover, .step-line:hover { background:color-mix(in srgb, var(--wash) 78%, transparent); }
  .plan-main { flex:1; min-width:0; } .plan-name { color:var(--ink2); font-size:12px; font-weight:650; } .plan-summary { margin-top:1px; color:var(--muted); font-size:10.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .plan-detail { display:none; border-top:1px solid var(--line); padding:7px 10px 10px; } .plan.open > .plan-detail { display:block; }
  .plan-tools { display:flex; justify-content:flex-end; gap:5px; margin-bottom:6px; }
  .tool { border:1px solid var(--line); border-radius:5px; background:var(--panel); color:var(--muted); padding:2px 6px; font:9.5px var(--sans); cursor:pointer; }
  .tool:hover { border-color:var(--blue); color:var(--blue); }
  .phase { border:1px solid var(--line); border-radius:7px; margin-top:6px; overflow:hidden; } .phase-line { padding:7px 8px; } .phase-name { flex:1; min-width:0; color:var(--ink2); font-size:11.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .phase-detail { display:none; border-top:1px solid var(--line2); padding:0 7px 6px; } .phase.open .phase-detail { display:block; }
  .step { border-bottom:1px solid var(--line2); } .step:last-child { border-bottom:0; } .step-line { padding:6px 1px; } .step-name { min-width:0; flex:1; color:var(--ink2); font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .done-zone { max-height:490px; overflow:auto; } .done-controls { display:flex; flex-wrap:wrap; gap:5px; padding:7px 10px; border-bottom:1px solid var(--line); background:var(--wash); position:sticky; top:0; z-index:2; }
  .filter { border:1px solid var(--line); border-radius:999px; background:var(--panel); color:var(--muted); padding:3px 8px; font:10px var(--sans); cursor:pointer; } .filter.active { background:var(--blue); color:var(--panel); border-color:var(--blue); }
  .filter-count { font-family:var(--mono); } .search { min-width:120px; margin-left:auto; padding:3px 7px; border:1px solid var(--line); border-radius:5px; color:var(--ink); background:var(--panel); font:10px var(--sans); }
  .group-label { padding:9px 10px 3px; color:var(--faint); font-size:9px; font-weight:750; letter-spacing:.07em; text-transform:uppercase; }
  .fleet { display:flex; flex-wrap:wrap; gap:5px; padding:8px 10px; } .fleet-card { display:flex; align-items:center; gap:5px; max-width:100%; padding:3px 6px; border:1px solid var(--line); border-radius:5px; background:var(--wash); color:var(--muted); font:10px var(--mono); } .fleet-name { color:var(--ink2); font-weight:600; } .fleet-action { max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .feed-note { padding:6px 10px; border-top:1px solid var(--line2); color:var(--faint); font-size:10px; }
  @keyframes pulse { 50% { opacity:.32; } }
  @media (max-width:760px) { .vitals { margin-left:0; width:100%; } .row-body { flex-wrap:wrap; gap:4px 7px; } .row-main { width:100%; } .plan-line { align-items:flex-start; } .plan-line .model-chip { display:none; } .session { max-width:110px; } .search { margin-left:0; } }
</style>
</head>
<body>
<main class="wrap">
  <div class="topstrip">
    <span class="fdot" id="fdot"></span>
    <span id="boxline"><span class="box">box unavailable</span> <span class="sub">waiting for vitals</span></span>
    <span class="need-number" id="needNumber"><b>0</b> need Yair</span>
    <span class="vitals" id="vitals"></span>
  </div>

  <section class="zone needs" id="needsZone">
    <div class="zone-head"><span class="zone-title">Needs You</span><span class="zone-count" id="needsCount">0 calls</span><span class="zone-note">Yair decisions and recovered hangs</span></div>
    <div class="zone-body" id="needs"></div>
  </section>

  <section class="zone">
    <div class="zone-head"><span class="zone-title">Live</span><span class="zone-count" id="liveCount">idle</span><span class="zone-note" id="liveNote"></span></div>
    <div class="zone-body" id="live"></div>
  </section>

  <section class="zone">
    <div class="zone-head"><span class="zone-title">Planned</span><span class="zone-count" id="plansCount">0 plans</span><span class="zone-note">read only</span></div>
    <div class="zone-body" id="plans"></div>
  </section>

  <section class="zone">
    <div class="zone-head"><span class="zone-title">Done</span><span class="zone-count" id="doneCount">0 items</span><span class="zone-note">bounded history</span></div>
    <div class="done-zone">
      <div class="done-controls">
        <button class="filter active" data-filter="all" type="button">All <span class="filter-count" data-count="all">0</span></button>
        <button class="filter" data-filter="green" type="button">Passed <span class="filter-count" data-count="green">0</span></button>
        <button class="filter" data-filter="red" type="button">Real defects <span class="filter-count" data-count="red">0</span></button>
        <button class="filter" data-filter="nojudge" type="button">Could-not-judge <span class="filter-count" data-count="nojudge">0</span></button>
        <button class="filter" data-filter="died" type="button">Died <span class="filter-count" data-count="died">0</span></button>
        <button class="filter" id="groupToggle" type="button">Group by session</button>
        <input class="search" id="doneSearch" type="search" placeholder="search history" aria-label="Search history">
      </div>
      <div id="done"></div>
    </div>
  </section>

  <section class="zone">
    <div class="zone-head"><span class="zone-title">Fleet</span><span class="zone-note">sessions seen on the board</span></div>
    <div class="fleet" id="fleet"></div>
  </section>
</main>
<script>
  const urlTheme = new URLSearchParams(location.search).get('theme');
  if (urlTheme === 'dark' || urlTheme === 'light') document.documentElement.dataset.theme = urlTheme;
  window.addEventListener('message', (event) => {
    const data = event.data;
    if (data && data.type === 'gg-theme' && (data.theme === 'dark' || data.theme === 'light')) document.documentElement.dataset.theme = data.theme;
  });

  const POLL_MS = 6000;
  const STALL_SECONDS = 20 * 60;
  let timer = null, lastHeight = 0, doneFilter = 'all', groupBySession = false, doneItems = [];
  const openState = {}, lastHtml = {};
  const feeds = { brain:false, committees:false, workers:false, plans:false };

  function esc(value) { return String(value == null ? '' : value).replace(/[&<>"']/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[char])); }
  function rel(seconds) { if (seconds < 10) return 'just now'; if (seconds < 60) return `${seconds}s ago`; const minutes = Math.round(seconds / 60); if (minutes < 60) return `${minutes}m ago`; const hours = Math.floor(minutes / 60); return `${hours}h ${minutes % 60}m ago`; }
  function ageSeconds(time) { const stamp = time ? Date.parse(time) : NaN; return Number.isNaN(stamp) ? Infinity : Math.max(0, Math.round((Date.now() - stamp) / 1000)); }
  function relTime(time) { const age = ageSeconds(time); return age === Infinity ? 'time unknown' : rel(age); }
  function fmtTokens(value) { const number = Number(value); if (!Number.isFinite(number) || number <= 0) return ''; if (number < 1000) return `${number} tok`; if (number < 1e6) return `${Math.round(number / 1000)}K tok`; return `${(number / 1e6).toFixed(1)}M tok`; }
  function setHtmlCached(id, html) { if (lastHtml[id] === html) return; lastHtml[id] = html; document.getElementById(id).innerHTML = html; }
  function postHeight() { const height = Math.ceil(document.documentElement.scrollHeight); if (Math.abs(height - lastHeight) < 2) return; lastHeight = height; try { parent.postMessage({ type:'gg-embed-height', height }, '*'); } catch (error) {} }
  function idOf(item, fallback) { return String(item && (item.id || item.session || item.name || item.label) || fallback); }
  function statusClass(value) { const status = String(value || '').toLowerCase(); if (/green|done|passed|complete|ok/.test(status)) return 'green'; if (/bad|failed|red|died|stalled|error/.test(status)) return 'red'; if (/live|running|deciding|executing|progress/.test(status)) return 'amber'; return 'gray'; }
  function workerClass(worker) { return worker.state === 'done' ? 'green' : worker.state === 'stalled' ? 'died' : worker.state === 'failed' ? 'red' : 'amber'; }
  function committeeClass(committee) { const verdict = String(committee.judgement || committee.verdict || committee.status || '').toLowerCase(); if (verdict === 'judged_bad') return 'red'; if (verdict === 'could_not_judge') return 'nojudge'; if (verdict === 'died') return 'died'; if (verdict === 'green' || verdict === 'done') return 'green'; if (verdict === 'deciding') return 'amber'; return 'gray'; }
  function modelChip(model, effort) { if (!model) return ''; const level = String(effort || '').toLowerCase(); const heat = /high|xhigh|max|ultra/.test(level) ? ' high' : /low|minimal/.test(level) ? ' low' : ''; return `<span class="model-chip${heat}">${esc(model)}${effort ? ` @ ${esc(effort)}` : ''}</span>`; }
  function sessionChip(session) { return session ? `<span class="session">${esc(session)}</span>` : ''; }
  function actorChip(actor) { const value = String(actor || 'ai').toLowerCase(); return `<span class="actor ${esc(value)}">${esc(value)}</span>`; }
  function statusChip(value, fallback) { const label = value || fallback || 'unknown'; return `<span class="status ${statusClass(label)}">${esc(label)}</span>`; }
  function hasText(value) { return value != null && String(value).trim() !== ''; }
  function committeeMembers(committee) { const rounds = Array.isArray(committee.rounds) ? committee.rounds : []; const latest = rounds[rounds.length - 1]; return latest && Array.isArray(latest.members) ? latest.members : []; }
  function isCommitteeStalled(committee) { return String(committee.status).toLowerCase() === 'deciding' && ageSeconds(committee.updated) > STALL_SECONDS; }
  function isPlanNodeLive(node, plan) { const status = String(node.status || node.progress || '').toLowerCase(); return /live|running|executing|progress|doing/.test(status) || (String(plan.status).toLowerCase() === 'live' && String(plan.phase).toLowerCase() === 'executing' && /doing|current|active/.test(String(node.progress || ''))); }
  function allNodes(plan) { const nodes = []; const visit = (node, phaseName, depth) => { if (!node || typeof node !== 'object') return; nodes.push({ node, phaseName, depth }); (Array.isArray(node.steps) ? node.steps : []).forEach(child => visit(child, phaseName, depth + 1)); }; (Array.isArray(plan.stages) ? plan.stages : []).forEach(stage => visit(stage, stage.name || 'Untitled phase', 0)); return nodes; }
  function leafAction(plan) { const first = allNodes(plan)[0]; return first ? (first.node.action || first.node.name || '') : ''; }
  function planSummary(plan) { return plan.description || leafAction(plan) || 'No plan summary reported.'; }
  function actorRollup(plan) { const nodes = allNodes(plan); const total = nodes.length || 1; const human = nodes.filter(entry => String(entry.node.actor).toLowerCase() === 'human').length; const mixed = nodes.filter(entry => String(entry.node.actor).toLowerCase() === 'mix').length; const ai = Math.max(0, total - human - mixed); return `${ai} ai · ${human} human${mixed ? ` · ${mixed} mix` : ''}`; }
  function strategicGate(committee) { const text = `${committee.name || ''} ${committee.description || ''} ${committee.type || ''}`.toLowerCase(); return /strateg(?:ic|y).{0,32}gate|gate.{0,32}strateg(?:ic|y)|\bgate\b.{0,32}(direction|priority|decision)|(?:direction|priority|decision).{0,32}\bgate\b/.test(text); }
  function needsYair(committees, plans) {
    const rows = [];
    committees.forEach(committee => {
      if (String(committee.judgement || '').toLowerCase() === 'died') rows.push({ key:`need:committee:died:${idOf(committee, 'committee')}`, type:'COMMITTEE', kind:'committee', item:committee, name:committee.name || 'Committee', why:'The reaper caught a hang. This is a save to review, not a failure.' });
      else if (strategicGate(committee)) rows.push({ key:`need:committee:gate:${idOf(committee, 'committee')}`, type:'COMMITTEE', kind:'committee', item:committee, name:committee.name || 'Strategic gate', why:committee.description || 'A strategic gate needs Yair’s call.' });
    });
    plans.forEach(plan => allNodes(plan).forEach(entry => {
      const node = entry.node, human = String(node.actor || '').toLowerCase() === 'human', todo = String(node.progress || node.status || 'todo').toLowerCase() === 'todo';
      const committeeGate = node.committee === true || String(node.committee || '').toLowerCase() === 'true';
      if (human && todo && (committeeGate || String(entry.phaseName).toLowerCase() === 'human decisions')) rows.push({ key:`need:plan:${idOf(plan, 'plan')}:${entry.depth}:${node.name || node.action || ''}`, type:'PLAN', kind:'plan-node', plan, entry, name:node.name || node.action || 'Human decision', why:node.action || (committeeGate ? 'Committee gate requires a decision.' : 'Human decision is waiting.') });
    }));
    return rows;
  }

  function committeeDetail(committee) {
    const members = committeeMembers(committee);
    const memberHtml = members.length ? members.map((member, index) => {
      const key = `member:${idOf(committee, 'committee')}:${index}`; const comment = member.comment || ''; const open = openState[key] ? ' open' : '';
      return `<div class="member${open}" data-open="${esc(key)}"><div class="member-line"><span class="dot ${statusClass(member.verdict || member.status)}"></span><span class="member-name">${esc(member.role || member.model || 'member')}</span>${modelChip(member.role, member.effort)}<span class="member-does">${esc(member.does || '')}</span>${statusChip(member.verdict || member.status, 'waiting')}${hasText(comment) ? '<span class="caret">›</span>' : ''}</div>${hasText(comment) ? `<div class="member-full">${esc(comment)}</div>` : ''}</div>`;
    }).join('') : '<div class="empty">No committee members reported yet.</div>';
    return `<div class="detail-meta">${committee.session ? `session ${esc(committee.session)}` : ''}${committee.created ? ` · started ${esc(relTime(committee.created))}` : ''}${committee.updated ? ` · updated ${esc(relTime(committee.updated))}` : ''}</div>${committee.description ? `<div class="detail-copy">${esc(committee.description)}</div>` : ''}<div class="detail-meta" style="margin-top:8px">members</div>${memberHtml}`;
  }
  function workerDetail(worker) { return `<div class="detail-meta">${worker.session ? `session ${esc(worker.session)}` : ''}${worker.host ? ` · host ${esc(worker.host)}` : ''}${worker.started ? ` · elapsed ${esc(relTime(worker.started))}` : ''}${worker.updated ? ` · updated ${esc(relTime(worker.updated))}` : ''}</div><div class="detail-copy">${esc(worker.label || 'Worker task')}</div>`; }
  function planNodeDetail(plan, entry) { const node = entry.node; return `<div class="detail-meta">plan ${esc(plan.name || plan.id || 'plan')} · phase ${esc(entry.phaseName)}</div><div class="detail-copy">${esc(node.action || node.name || 'No action reported.')}</div>${node.committee_reason ? `<div class="detail-meta" style="margin-top:7px">committee reason: ${esc(node.committee_reason)}</div>` : ''}`; }
  function genericRow(options) { const open = openState[options.key] ? ' open' : ''; return `<div class="row${open}" data-open="${esc(options.key)}"><div class="row-line"><span class="dot ${options.dot || 'gray'}"></span><span class="type ${String(options.type || '').toLowerCase()}">${esc(options.type)}</span><div class="row-body"><span class="row-main" title="${esc(options.name)}">${esc(options.name)}</span>${options.model || ''}${options.session || ''}${options.status || ''}</div><span class="caret">›</span></div><div class="row-detail">${options.detail || ''}</div></div>`; }

  function liveRows(committees, workers, plans) {
    const rows = [];

  }
  function stepHtml(node, plan, phaseName, path) { const key = `step:${idOf(plan, 'plan')}:${path}`; const open = openState[key] ? ' open' : ''; const children = Array.isArray(node.steps) ? node.steps : []; const action = node.action || node.name || 'Unnamed step'; return `<div class="step${open}" data-open="${esc(key)}"><div class="step-line"><span class="dot ${statusClass(node.status || node.progress)}"></span>${actorChip(node.actor)}<span class="step-name" title="${esc(action)}">${esc(node.name || action)}</span>${String(node.actor || 'ai').toLowerCase() !== 'human' ? modelChip(node.model, node.effort) : ''}${node.committee ? '<span class="committee-badge">committee</span>' : ''}${statusChip(node.status || node.progress, 'todo')}${(node.action || node.committee_reason || children.length) ? '<span class="caret">›</span>' : ''}</div><div class="step-detail"><div class="detail-meta">phase ${esc(phaseName)}</div><div class="detail-copy">${esc(node.action || node.name || '')}</div>${node.committee_reason ? `<div class="detail-meta" style="margin-top:7px">committee reason: ${esc(node.committee_reason)}</div>` : ''}${children.length ? `<div style="margin-top:7px">${children.map((child, index) => stepHtml(child, plan, phaseName, `${path}.${index}`)).join('')}</div>` : ''}</div></div>`; }
  function phaseHtml(stage, plan, index) { const key = `phase:${idOf(plan, 'plan')}:${index}`; const open = openState[key] ? ' open' : ''; const status = stage.status || stage.progress || plan.phase || plan.status; const action = stage.action || stage.name || 'Untitled phase'; const steps = Array.isArray(stage.steps) ? stage.steps : []; return `<div class="phase${open}" data-open="${esc(key)}"><div class="phase-line"><span class="dot ${statusClass(status)}"></span><span class="phase-name">${esc(stage.name || action)}</span>${actorChip(stage.actor)}${statusChip(status)}<span class="caret">›</span></div><div class="phase-detail">${stage.action ? `<div class="detail-copy" style="padding:7px 1px">${esc(stage.action)}</div>` : ''}${steps.length ? steps.map((step, stepIndex) => stepHtml(step, plan, stage.name || action, `${index}.${stepIndex}`)).join('') : '<div class="empty">No steps reported for this phase.</div>'}</div></div>`; }
  function planHtml(plan) { const key = `plan:${idOf(plan, 'plan')}`; const open = openState[key] ? ' open' : ''; const stages = Array.isArray(plan.stages) ? plan.stages : []; return `<div class="plan${open}" data-open="${esc(key)}"><div class="plan-line"><span class="dot ${statusClass(plan.status)}"></span><div class="plan-main"><div class="plan-name">${esc(plan.name || plan.id || 'Untitled plan')}</div><div class="plan-summary">${esc(planSummary(plan))}</div></div>${modelChip(plan.author_model, plan.author_effort)}<span class="session">${esc(actorRollup(plan))}</span>${statusChip(plan.status)}<span class="caret">›</span></div><div class="plan-detail"><div class="plan-tools"><button class="tool" type="button" data-plan-action="expand" data-plan="${esc(idOf(plan, 'plan'))}">Expand all</button><button class="tool" type="button" data-plan-action="collapse" data-plan="${esc(idOf(plan, 'plan'))}">Collapse all</button></div>${stages.length ? stages.map((stage, index) => phaseHtml(stage, plan, index)).join('') : '<div class="empty">No phases reported for this plan.</div>'}</div></div>`; }
  function historyItem(type, item, plan) {
    if (type === 'committee') return { key:`done:committee:${idOf(item, 'committee')}`, category:committeeClass(item), session:item.session, updated:item.updated, name:item.name || 'Committee', html:genericRow({ key:`done:committee:${idOf(item, 'committee')}`, type:'COMMITTEE', dot:statusClass(committeeClass(item)), name:item.name || 'Committee', session:sessionChip(item.session), status:statusChip(item.judgement || item.verdict || item.status), detail:committeeDetail(item) }) };

    return { key:`done:plan:${idOf(plan, 'plan')}`, category:String(plan.status).toLowerCase() === 'stalled' ? 'died' : 'green', session:plan.session, updated:plan.updated, name:plan.name || plan.id || 'Plan', html:genericRow({ key:`done:plan:${idOf(plan, 'plan')}`, type:'PLAN', dot:String(plan.status).toLowerCase() === 'stalled' ? 'bad' : 'ok', name:plan.name || plan.id || 'Plan', model:modelChip(plan.author_model, plan.author_effort), session:sessionChip(plan.session), status:statusChip(plan.status), detail:`<div class="detail-copy">${esc(planSummary(plan))}</div>` }) };
  }
  function renderDone() { const query = (document.getElementById('doneSearch').value || '').trim().toLowerCase(); const filtered = doneItems.filter(item => (doneFilter === 'all' || item.category === doneFilter) && (!query || `${item.name} ${item.session || ''}`.toLowerCase().includes(query))); if (!filtered.length) { setHtmlCached('done', `<div class="empty">${doneItems.length ? 'No history matches this filter.' : 'No resolved work on the board yet.'}</div>`); return; } let html = ''; if (groupBySession) { const groups = {}; filtered.forEach(item => { const session = item.session || 'unassigned'; (groups[session] = groups[session] || []).push(item); }); html = Object.entries(groups).sort((left, right) => String(right[1][0].updated || '').localeCompare(String(left[1][0].updated || ''))).map(([session, items]) => `<div class="group-label">${esc(session)} · ${items.length}</div>${items.map(item => item.html).join('')}`).join(''); } else html = filtered.map(item => item.html).join(''); setHtmlCached('done', html); }
  function updateDoneCounts() { const counts = { all:doneItems.length, green:0, red:0, nojudge:0, died:0 }; doneItems.forEach(item => { if (counts[item.category] != null) counts[item.category]++; }); document.querySelectorAll('[data-count]').forEach(element => { element.textContent = counts[element.dataset.count] || 0; }); document.getElementById('doneCount').textContent = `${doneItems.length} items`; }
  function feedUnavailable(name) { return `<div class="unavailable">${esc(name)} feed unavailable. Other zones remain live.</div>`; }
  function renderVitals(status, liveCount, tokenCount, needsCount, fleetCount) {
    const dot = document.getElementById('fdot'); const vitals = document.getElementById('vitals'); const need = document.getElementById('needNumber');
    need.className = `need-number${needsCount ? ' hot' : ''}`; need.innerHTML = `<b>${needsCount}</b> need Yair`;
    if (!status || !status.box) { dot.className = 'fdot down'; document.getElementById('boxline').innerHTML = '<span class="box">box unavailable</span> <span class="sub">vitals feed unavailable</span>'; vitals.innerHTML = `<span><b>${liveCount}</b> worker + committee live</span>${tokenCount ? `<span><b>${fmtTokens(tokenCount)}</b> today</span>` : ''}`; return; }
    const age = ageSeconds(status.ts); dot.className = `fdot ${age < 60 ? 'fresh' : age < 300 ? 'lagging' : 'paused'}`;
    document.getElementById('boxline').innerHTML = `<span class="box">${esc(status.box)}</span> <span class="sub">· ${esc(status.uptime || 'uptime unknown')} · ${age < 300 ? 'updated' : 'last seen'} ${esc(rel(age))}</span>`;
    const load = Array.isArray(status.load) ? Number(status.load[0]) : Number(status.load); const cores = Number(status.cores) || 1; const disk = parseFloat(status.disk_pct); const fleet = status.fleet_count || status.fleet || status.live_agent_count || fleetCount;
    vitals.innerHTML = `<span class="${load / cores >= 1.8 ? 'crit' : load / cores >= .9 ? 'warn' : ''}">load <b>${Number.isFinite(load) ? load.toFixed(2) : '?'}</b>/${cores}</span><span class="${disk >= 90 ? 'crit' : disk >= 80 ? 'warn' : ''}">disk <b>${esc(status.disk_pct || '?')}</b></span><span><b>${liveCount}</b> worker + committee live</span>${fleet ? `<span><b>${esc(fleet)}</b> fleet</span>` : ''}${tokenCount ? `<span><b>${fmtTokens(tokenCount)}</b> today</span>` : ''}`;
  }
  function renderFleet(committees, workers, plans) { const sessions = new Map(); const add = (session, updated, action, live) => { if (!session) return; const prior = sessions.get(session); if (!prior || String(updated || '') > String(prior.updated || '')) sessions.set(session, { updated, action, live }); }; committees.forEach(item => add(item.session, item.updated, item.name, item.status === 'deciding' && !isCommitteeStalled(item))); workers.forEach(item => add(item.session, item.updated, item.label, item.state === 'running')); plans.forEach(item => add(item.session, item.updated, item.name, item.status === 'live')); const cards = Array.from(sessions.entries()).sort((left, right) => String(right[1].updated || '').localeCompare(String(left[1].updated || ''))).map(([session, item]) => `<div class="fleet-card"><span class="dot ${item.live ? 'live' : 'gray'}"></span><span class="fleet-name">${esc(session)}</span><span>${item.live ? 'live' : 'idle'}</span><span class="fleet-action">${esc(item.action || 'activity unknown')} · ${esc(relTime(item.updated))}</span></div>`); setHtmlCached('fleet', cards.length ? cards.join('') : '<div class="empty">No sessions have appeared across the feeds yet.</div>'); }
  function tokensFrom(committees, feed) { const direct = committees.reduce((sum, committee) => sum + Number(committee.stats && committee.stats.tokens || 0), 0); if (direct) return direct; const walk = value => { if (!value || typeof value !== 'object') return 0; return Object.entries(value).reduce((sum, [key, item]) => sum + (key === 'tokens' && Number.isFinite(Number(item)) ? Number(item) : walk(item)), 0); }; return walk(feed && feed.stats); }
  function renderBoard(data) {
    const committees = data.committees; const workers = data.workers; const plans = data.plans;
    const calls = needsYair(committees, plans); const live = liveRows(committees, workers, plans); const tokenCount = tokensFrom(committees, data.committeeFeed);
    const liveWorkersAndCommittees = workers.filter(worker => worker.state === 'running').length + committees.filter(committee => committee.status === 'deciding' && !isCommitteeStalled(committee)).length;
    renderVitals(data.brain, liveWorkersAndCommittees, tokenCount, calls.length, new Set([...committees, ...workers, ...plans].map(item => item.session).filter(Boolean)).size);
    document.getElementById('needsZone').classList.toggle('active', calls.length > 0); document.getElementById('needsCount').textContent = calls.length ? `${calls.length} calls` : 'quiet'; setHtmlCached('needs', !feeds.committees && !feeds.plans ? feedUnavailable('Committee and plan') : calls.length ? calls.map(needRow).join('') : '<div class="empty">No strategic gate, human committee decision, or recovered committee hang needs Yair right now.</div>');
    document.getElementById('liveCount').textContent = live.length ? `${live.length} live` : 'idle'; document.getElementById('liveNote').textContent = feeds.committees || feeds.workers || feeds.plans ? '' : 'feeds unavailable'; setHtmlCached('live', !feeds.committees && !feeds.workers && !feeds.plans ? feedUnavailable('Live') : live.length ? live.map(item => item.html).join('') : '<div class="empty">Nothing is running now.</div>');
    const activePlans = plans.filter(plan => ['planned', 'live'].includes(String(plan.status).toLowerCase())).sort((left, right) => (String(right.status).toLowerCase() === 'live') - (String(left.status).toLowerCase() === 'live') || String(right.updated || '').localeCompare(String(left.updated || ''))); document.getElementById('plansCount').textContent = `${activePlans.length} plans`; setHtmlCached('plans', !feeds.plans ? feedUnavailable('Plan') : activePlans.length ? activePlans.map(planHtml).join('') : '<div class="empty">No planned or live execution plans reported.</div>');
    doneItems = [].concat(committees.filter(committee => committee.status === 'done' || ['green', 'judged_bad', 'could_not_judge', 'died'].includes(String(committee.judgement).toLowerCase()) || isCommitteeStalled(committee)).map(committee => historyItem('committee', committee)), workers.filter(worker => ['done', 'failed', 'stalled'].includes(String(worker.state).toLowerCase())).map(worker => historyItem('worker', worker)), plans.filter(plan => ['done', 'stalled'].includes(String(plan.status).toLowerCase())).map(plan => historyItem('plan', null, plan))).sort((left, right) => String(right.updated || '').localeCompare(String(left.updated || ''))); updateDoneCounts(); renderDone(); renderFleet(committees, workers, plans); postHeight();
  }
  function expandPlan(planId, open) { Object.keys(openState).forEach(key => { if (key === `plan:${planId}` || key.startsWith(`phase:${planId}:`) || key.startsWith(`step:${planId}:`)) openState[key] = open; }); openState[`plan:${planId}`] = true; document.querySelectorAll(`[data-open^="phase:${CSS.escape(planId)}:"], [data-open^="step:${CSS.escape(planId)}:"]`).forEach(element => element.classList.toggle('open', open)); postHeight(); }
  function bindOnce() {
    document.addEventListener('click', event => {
      const planTool = event.target.closest('[data-plan-action]'); if (planTool) { event.stopPropagation(); expandPlan(planTool.dataset.plan, planTool.dataset.planAction === 'expand'); return; }
      const toggle = event.target.closest('[data-open]'); if (toggle) { const key = toggle.dataset.open; openState[key] = !openState[key]; toggle.classList.toggle('open'); postHeight(); }
    });

    document.getElementById('groupToggle').addEventListener('click', event => { groupBySession = !groupBySession; event.currentTarget.classList.toggle('active', groupBySession); renderDone(); postHeight(); });
    document.getElementById('doneSearch').addEventListener('input', () => { renderDone(); postHeight(); });
  }
  async function fetchJson(url) { const response = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, { cache:'no-store' }); if (!response.ok) throw new Error(String(response.status)); return response.json(); }
  async function tick() {
    const results = await Promise.allSettled([fetchJson('/brain-status'), fetchJson('/committee-feed'), fetchJson('/builder-feed'), fetchJson('/exec-plan-feed')]);
    const [brainResult, committeeResult, workerResult, planResult] = results;
    feeds.brain = brainResult.status === 'fulfilled'; feeds.committees = committeeResult.status === 'fulfilled'; feeds.workers = workerResult.status === 'fulfilled'; feeds.plans = planResult.status === 'fulfilled';
    const committeeFeed = feeds.committees ? committeeResult.value || {} : {}; const workerFeed = feeds.workers ? workerResult.value || {} : {}; const planFeed = feeds.plans ? planResult.value || {} : {};
    renderBoard({ brain:feeds.brain ? brainResult.value : null, committeeFeed, committees:Array.isArray(committeeFeed.records) ? committeeFeed.records : Array.isArray(committeeFeed.committees) ? committeeFeed.committees : Array.isArray(committeeFeed) ? committeeFeed : [], workers:[].concat(Array.isArray(workerFeed.running) ? workerFeed.running : [], Array.isArray(workerFeed.recent) ? workerFeed.recent : []), plans:Array.isArray(planFeed.plans) ? planFeed.plans : Array.isArray(planFeed) ? planFeed : [] });
  }
  function schedule() { clearTimeout(timer); if (!document.hidden) timer = setTimeout(loop, POLL_MS); }
  async function loop() { await tick(); schedule(); }
  document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(timer); else loop(); });
  window.addEventListener('resize', postHeight);
  bindOnce(); renderBoard({ brain:null, committeeFeed:{}, committees:[], workers:[], plans:[] }); loop();
</script>
