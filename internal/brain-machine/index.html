:10px;border-left:2px solid var(--border)}.substep{margin-top:6px;color:var(--secondary);font-size:13px;line-height:19px}.source{border:1px solid var(--border);border-radius:6px;background:var(--inset);padding:16px}.source h3{margin:0 0 6px;font-size:17px;line-height:24px}.source p{margin:0;color:var(--secondary);font-size:14px;line-height:22px}.source .source-state{margin-top:10px;color:var(--muted);font-size:12px;font-weight:600}.drawer-empty{padding:80px 12px;color:var(--secondary);text-align:center}.drawer-empty h2{margin:0 0 8px;color:var(--text);font-size:22px}.drawer-empty p{margin:0}

<body>
<main class="app">
  <header class="topbar"><div><p class="eyebrow">Live operational timeline</p><h1>Brain machine</h1></div><div class="feed-status" id="status" role="status">Loading feeds</div></header>
  <section class="needs" aria-labelledby="needsTitle"><div class="needs-head"><h2 id="needsTitle">Needs you</h2><span class="needs-count" id="needsCount">0 decisions awaiting you</span></div><div class="needs-list" id="needsList"></div></section>
  <nav class="controls" aria-label="Timeline controls"><label class="search"><span aria-hidden="true">⌕</span><input id="search" type="search" autocomplete="off" placeholder="Search the timeline" aria-label="Search the timeline"></label><div class="filter-group" aria-label="Type filters"><button class="filter" data-type="worker" aria-pressed="true">Worker</button><button class="filter" data-type="committee" aria-pressed="true">Committee</button><button class="filter" data-type="plan" aria-pressed="true">Plan</button></div><div class="filter-group" aria-label="State filter"><button class="filter" data-state="all" aria-pressed="true">All</button><button class="filter" data-state="live" aria-pressed="false">Live</button><button class="filter" data-state="done" aria-pressed="false">Done</button><button class="filter" data-state="needs-you" aria-pressed="false">Needs you</button></div><span class="control-spacer"></span><button class="action" id="expand" type="button">Expand all</button><button class="action" id="collapse" type="button">Collapse all</button></nav>
  <section class="timeline-section" aria-labelledby="timelineTitle"><div class="section-heading"><h2 id="timelineTitle">Timeline</h2><span class="count" id="timelineCount"></span></div><div id="notices" aria-live="polite"></div><div class="grid-head" aria-hidden="true"><div>Type</div><div>Title</div><div class="session-head">Session</div><div>Model</div><div>State</div><div>Time</div><div></div></div><div class="timeline" id="timeline"></div></section>
</main>
<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" aria-label="Timeline item detail" aria-hidden="true" role="dialog" aria-modal="true"><header class="drawer-head"><div><p class="kicker" id="drawerKicker">Detail</p><h2 id="drawerTitle">Select an item</h2></div><button class="close" id="closeDrawer" type="button" aria-label="Close detail">×</button></header><div class="drawer-body" id="drawerBody"><div class="drawer-empty"><h2>Timeline detail</h2><p>Choose an item to open its full context.</p></div></div></aside>
<script>
(() => {
  const feeds = { status:null, committees:null, workers:null, plans:null };
  const failed = new Set(); let entries = []; let needs = []; let activeId = null; let hasPainted = false;
  const filterState = { types:new Set(['worker','committee','plan']), state:'all', query:'' };
  const $ = id => document.getElementById(id);
  const esc = value => String(value ?? '').replace(/[&<>'"]/g, character => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[character]));
  const asArray = value => Array.isArray(value) ? value : [];
  const dateMs = value => { const result = Date.parse(value || ''); return Number.isFinite(result) ? result : 0; };
  const relative = value => { const milliseconds = dateMs(value); if (!milliseconds) return 'time unknown'; const seconds = Math.max(0, Math.floor((Date.now() - milliseconds) / 1000)); if (seconds < 45) return 'just now'; if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`; return `${Math.floor(seconds / 86400)}d ago`; };
  const elapsed = value => { const milliseconds = dateMs(value); if (!milliseconds) return 'unknown'; const seconds = Math.max(0, Math.floor((Date.now() - milliseconds) / 1000)); if (seconds < 3600) return `${Math.floor(seconds / 60)}m`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor(seconds % 3600 / 60)}m`; return `${Math.floor(seconds / 86400)}d ${Math.floor(seconds % 86400 / 3600)}h`; };
  const heat = effort => effort === 'low' ? 'cool' : effort === 'high' ? 'hot' : 'neutral';
  const chip = (model, effort) => model ? `<span class="chip ${heat(effort)}">${esc(model)}${effort ? ` @ ${esc(effort)}` : ''}</span>` : '<span class="badge">Not reported</span>';
  const badge = value => { const text = String(value || 'unknown').replace(/_/g, ' '); const normal = text.toLowerCase(); const kind = /done|green|passed|complete/.test(normal) ? 'done' : /block|fail|bad|died|error/.test(normal) ? 'error' : /need|wait|todo|stalled|could/.test(normal) ? 'needs' : /live|doing|running|deciding/.test(normal) ? 'live' : ''; return `<span class="badge ${kind}">${esc(text)}</span>`; };
  const typeLabel = type => type === 'worker' ? 'WK' : type === 'committee' ? 'CM' : 'PL';
  const titleForNode = node => node.name || node.action || 'Plan step';
  function walkNodes(nodes, callback, depth = 0) { asArray(nodes).forEach(node => { callback(node, depth); walkNodes(node.steps, callback, depth + 1); }); }
  function planSummary(plan) { const first = asArray(plan.stages)[0]; return plan.summary || plan.description || plan.phase || (first && (first.action || first.name)) || 'Execution plan'; }
  function planRollup(plan) { const counts = { ai:0, human:0, mix:0 }; walkNodes(plan.stages, node => { if (Object.hasOwn(counts, node.actor)) counts[node.actor]++; }); return counts; }
  function isStrategic(committee) { return /strategic|gate|decision|direction|approve|approval/i.test(`${committee.name || ''} ${committee.description || ''}`); }
  function makeData() {
    entries = []; needs = [];
    const workers = [...asArray(feeds.workers?.running), ...asArray(feeds.workers?.recent)];
    workers.forEach((worker, index) => entries.push({ id:`worker-${worker.session || worker.label || index}-${worker.updated || worker.started || index}`, type:'worker', title:worker.label || 'Unnamed worker', session:worker.session, model:worker.model, effort:worker.effort, time:worker.updated || worker.started, state:worker.state || 'unknown', source:worker }));
    const committees = [...asArray(feeds.committees?.decisions), ...asArray(feeds.committees?.execution)];
    committees.forEach((committee, index) => { const item = { id:`committee-${committee.session || committee.name || index}-${committee.updated || committee.created || index}`, type:'committee', title:committee.name || 'Committee', session:committee.session, model:null, effort:null, time:committee.updated || committee.created, state:committee.status === 'deciding' ? 'live' : committee.status === 'done' ? 'done' : committee.status || 'unknown', source:committee }; entries.push(item); if (committee.judgement === 'died') needs.push({ id:item.id, decision:'Choose a recovery path', context:committee.name || 'Committee recovery', session:committee.session, time:item.time }); else if (isStrategic(committee) && committee.status !== 'done') needs.push({ id:item.id, decision:'Provide strategic judgement', context:committee.description || committee.name || 'Strategic committee', session:committee.session, time:item.time }); });
    asArray(feeds.plans?.plans).forEach((plan, index) => { const base = { id:`plan-${plan.id || plan.session || plan.name || index}`, type:'plan', title:plan.name || 'Execution plan', session:plan.session, model:plan.author_model, effort:plan.author_effort, time:plan.updated || plan.created || plan.started, state:plan.status === 'done' ? 'done' : plan.status === 'live' ? 'live' : 'planned', source:plan }; entries.push(base); walkNodes(plan.stages, node => { const state = node.progress || node.status || 'todo'; entries.push({ id:`${base.id}-step-${node.id || node.name || node.action || Math.random().toString(36).slice(2)}`, type:'plan', title:titleForNode(node), session:plan.session, model:node.model || plan.author_model, effort:node.effort || plan.author_effort, time:node.updated || plan.updated || plan.created, state, source:plan, node }); if (node.actor === 'human' && !/done|complete|green/i.test(state)) needs.push({ id:base.id, decision:node.action || node.name || 'Review plan decision', context:plan.name || 'Execution plan', session:plan.session, time:node.updated || plan.updated || plan.created }); }); });
    entries.sort((first, second) => dateMs(second.time) - dateMs(first.time));
    needs.sort((first, second) => dateMs(second.time) - dateMs(first.time));
  }
  function visibleEntries() { const query = filterState.query; return entries.filter(item => { const searchable = `${item.title} ${item.session || ''} ${item.model || ''} ${item.state || ''}`.toLowerCase(); const stateMatch = filterState.state === 'all' || (filterState.state === 'needs-you' ? needs.some(need => need.id === item.id) : String(item.state).toLowerCase() === filterState.state); return filterState.types.has(item.type) && stateMatch && (!query || searchable.includes(query)); }); }
  function renderNeeds() { $('needsCount').textContent = `${needs.length} ${needs.length === 1 ? 'decision' : 'decisions'} awaiting you`; $('needsList').innerHTML = needs.length ? needs.map(need => `<button class="need" type="button" data-open="${esc(need.id)}"><div class="need-cell need-decision"><span class="diamond" aria-hidden="true">◆</span><span>${esc(need.decision)}</span></div><div class="need-cell need-context">${esc(need.context)}</div><div class="need-cell need-session mono">${esc(need.session || 'No session')}</div><div class="need-cell need-age mono">${esc(relative(need.time))}</div><div class="disclose" aria-hidden="true">›</div></button>`).join('') : '<div class="need-empty">No decisions are waiting. New human handoffs will appear here.</div>'; }
  function renderTimeline() { const shown = visibleEntries(); $('timelineCount').textContent = `${shown.length} ${shown.length === 1 ? 'event' : 'events'}`; $('timeline').innerHTML = shown.length ? shown.map(item => `<button class="event ${activeId === item.id ? 'selected' : ''}" type="button" data-open="${esc(item.id)}" aria-label="Open ${esc(item.title)}"><div><span class="type-icon type-${item.type}" title="${esc(item.type)}">${typeLabel(item.type)}</span></div><div class="entry-main"><div class="entry-title">${esc(item.title)}</div><div class="entry-sub"><span class="session">${esc(item.session || 'No session')}</span>${chip(item.model,item.effort)}${badge(item.state)}<span class="time-inline mono">${esc(relative(item.time))}</span></div></div><div class="session-cell"><span class="session">${esc(item.session || 'No session')}</span></div><div class="model-cell">${chip(item.model,item.effort)}</div><div class="state-cell">${badge(item.state)}</div><div class="time">${esc(relative(item.time))}</div><div class="disclose" aria-hidden="true">›</div></button>`).join('') : '<div class="empty"><strong>No matching timeline events</strong>Adjust search or filters to see available activity.</div>'; }
  function renderStatus() { const count = failed.size; $('status').textContent = count ? `${count} feed${count === 1 ? '' : 's'} unavailable` : entries.length ? 'Feeds current' : 'Waiting for feeds'; $('status').classList.toggle('warning', Boolean(count)); $('notices').innerHTML = count ? `<div class="notice">Some feed data is unavailable. Available activity remains visible and will retry automatically.</div>` : ''; }
  function render() { renderStatus(); renderNeeds(); renderTimeline(); }
  function findItem(id) { return entries.find(item => item.id === id) || entries.find(item => item.id.startsWith(id)); }
  function sourceSlot() { return '<section class="detail-block"><div class="source"><h3>Source document</h3><p>Issue preview, comment thread, and composer are reserved for the connected source document integration.</p><div class="source-state">Source content is not available in this feed.</div></div></section>'; }
  function workerDetail(item) { const worker = item.source; return `<section class="detail-block"><p class="detail-lead">${esc(worker.description || worker.label || item.title)}</p></section><section class="detail-block"><h3>Worker detail</h3><div class="facts"><div class="fact"><span>Session</span><strong class="mono">${esc(worker.session || 'Not reported')}</strong></div><div class="fact"><span>Elapsed</span><strong>${esc(elapsed(worker.started || item.time))}</strong></div><div class="fact"><span>Model</span><strong>${chip(worker.model,worker.effort)}</strong></div><div class="fact"><span>State</span><strong>${badge(worker.state || 'unknown')}</strong></div></div></section><section class="detail-block"><h3>Output</h3><p class="detail-lead">${esc(worker.result || worker.summary || worker.message || 'No worker output has been reported yet.')}</p></section>${sourceSlot()}`; }
  function committeeDetail(item) { const committee = item.source; const members = asArray(committee.members || committee.reviewers || committee.responses); return `<section class="detail-block"><p class="detail-lead">${esc(committee.description || committee.summary || 'This committee has not published a summary yet.')}</p></section><section class="detail-block"><h3>Committee detail</h3><div class="facts"><div class="fact"><span>Session</span><strong class="mono">${esc(committee.session || 'Not reported')}</strong></div><div class="fact"><span>State</span><strong>${badge(committee.status || item.state)}</strong></div><div class="fact"><span>Judgement</span><strong>${esc(committee.judgement || 'Pending')}</strong></div><div class="fact"><span>Members</span><strong>${members.length || 'Not reported'}</strong></div></div></section><section class="detail-block"><h3>Members</h3>${members.length ? `<div class="accordion"><div class="accordion-content">${members.map((member, index) => `<button type="button" class="member" data-member><span class="member-top"><span class="member-name">${esc(member.name || member.model || `Member ${index + 1}`)}</span>${chip(member.model,member.effort)}${badge(member.verdict || member.status || 'reviewing')}<span class="member-chevron" aria-hidden="true">›</span></span><span class="member-comment">${esc(member.comment || member.review || member.reason || 'No comment has been reported.')}</span></button>`).join('')}</div></div>` : '<div class="empty">No committee members are reported yet.</div>'}</section>${sourceSlot()}`; }
  function stepMarkup(step, index) { const children = asArray(step.steps); return `<div class="step"><span class="step-number">${index + 1}</span><div><div class="step-title">${esc(titleForNode(step))}</div><div class="meta-line">${badge(step.progress || step.status || 'todo')}<span class="badge">${esc(step.actor || 'ai')}</span>${step.model ? chip(step.model,step.effort) : ''}${step.committee ? '<span class="badge">Committee</span>' : ''}</div>${step.description || step.body || step.reason ? `<p class="step-body">${esc(step.description || step.body || step.reason)}</p>` : ''}${children.length ? `<div class="substeps">${children.map(child => `<div class="substep">${esc(titleForNode(child))} · ${esc(child.progress || child.status || 'todo')}</div>`).join('')}</div>` : ''}</div></div>`; }
  function planDetail(item) { const plan = item.source; const counts = planRollup(plan); const phases = asArray(plan.stages); return `<section class="detail-block"><p class="detail-lead">${esc(planSummary(plan))}</p></section><section class="detail-block"><h3>Plan summary</h3><div class="facts"><div class="fact"><span>Session</span><strong class="mono">${esc(plan.session || 'Not reported')}</strong></div><div class="fact"><span>State</span><strong>${badge(plan.status || item.state)}</strong></div><div class="fact"><span>Author</span><strong>${chip(plan.author_model,plan.author_effort)}</strong></div><div class="fact"><span>Actor rollup</span><strong>AI ${counts.ai} · Human ${counts.human} · Mix ${counts.mix}</strong></div></div></section><section class="detail-block"><h3>Phases</h3><div class="plan-tools"><button class="action" type="button" data-plan-expand>Expand all</button><button class="action" type="button" data-plan-collapse>Collapse all</button></div>${phases.length ? phases.map((phase, index) => `<div class="accordion phase"><details ${index === 0 ? 'open' : ''}><summary><span class="phase-name">${esc(phase.name || phase.action || `Phase ${index + 1}`)}</span>${badge(phase.progress || phase.status || 'todo')}</summary><div class="accordion-content"><div class="steps">${asArray(phase.steps).length ? asArray(phase.steps).map(stepMarkup).join('') : stepMarkup(phase, 0)}</div></div></details></div>`).join('') : '<div class="empty">This plan has no phases reported yet.</div>'}</section>${sourceSlot()}`; }
  function openDetail(id) { const item = findItem(id); if (!item) return; activeId = item.id; $('drawerKicker').textContent = `${item.type} detail`; $('drawerTitle').textContent = item.title; $('drawerBody').innerHTML = item.type === 'worker' ? workerDetail(item) : item.type === 'committee' ? committeeDetail(item) : planDetail(item); $('drawer').classList.add('open'); $('backdrop').classList.add('open'); $('drawer').setAttribute('aria-hidden','false'); document.body.classList.add('drawer-open'); $('closeDrawer').focus(); renderTimeline(); }
  function closeDetail() { activeId = null; $('drawer').classList.remove('open'); $('backdrop').classList.remove('open'); $('drawer').setAttribute('aria-hidden','true'); document.body.classList.remove('drawer-open'); renderTimeline(); }
  async function fetchJson(url) { const response = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, { cache:'no-store' }); if (!response.ok) throw new Error(String(response.status)); return response.json(); }
  async function refresh() { if (hasPainted && document.hidden) return; const results = await Promise.allSettled([fetchJson('/brain-status'), fetchJson('/committee-feed'), fetchJson('/builder-feed'), fetchJson('/exec-plan-feed')]); results.forEach((result, index) => { const key = ['status','committees','workers','plans'][index]; if (result.status === 'fulfilled') { feeds[key] = result.value; failed.delete(key); } else failed.add(key); }); makeData(); render(); hasPainted = true; }
  document.addEventListener('click', event => { const opener = event.target.closest('[data-open]'); if (opener) openDetail(opener.dataset.open); const member = event.target.closest('[data-member]'); if (member) member.classList.toggle('open'); if (event.target.closest('[data-plan-expand]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => { detail.open = true; }); if (event.target.closest('[data-plan-collapse]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => { detail.open = false; }); });
  $('closeDrawer').addEventListener('click', closeDetail); $('backdrop').addEventListener('click', closeDetail); document.addEventListener('keydown', event => { if (event.key === 'Escape' && activeId) closeDetail(); });
  $('search').addEventListener('input', event => { filterState.query = event.target.value.trim().toLowerCase(); renderTimeline(); }); document.querySelectorAll('[data-type]').forEach(button => button.addEventListener('click', () => { const type = button.dataset.type; filterState.types.has(type) ? filterState.types.delete(type) : filterState.types.add(type); button.setAttribute('aria-pressed', String(filterState.types.has(type))); renderTimeline(); })); document.querySelectorAll('[data-state]').forEach(button => button.addEventListener('click', () => { filterState.state = button.dataset.state; document.querySelectorAll('[data-state]').forEach(other => other.setAttribute('aria-pressed', String(other === button))); renderTimeline(); }));
  $('expand').addEventListener('click', () => $('drawerBody').querySelectorAll('details').forEach(detail => { detail.open = true; })); $('collapse').addEventListener('click', () => $('drawerBody').querySelectorAll('details').forEach(detail => { detail.open = false; })); document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
  makeData(); render(); refresh(); setInterval(refresh, 6000);
})();
