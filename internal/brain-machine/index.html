round:var(--surface)}.timeline-row{width:100%;min-height:43px;padding:7px 10px;border:0;border-bottom:1px solid var(--hair);background:transparent;text-align:left}.timeline-row:last-child{border-bottom:0}.tag{display:inline-flex;align-items:center;width:max-content;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;letter-spacing:.045em}.tag-worker{color:var(--accent);background:var(--accent-bg)}.tag-committee{color:var(--needs);background:var(--needs-bg)}.tag-plan{color:var(--done);background:color-mix(in srgb,var(--done) 10%,var(--surface))}.row-title{overflow:hidden;font-size:14px;font-weight:600;text-overflow:ellipsis;white-space:nowrap}.row-title.active{color:var(--accent)}.chip{display:inline-flex;align-items:center;max-width:100%;border-radius:999px;padding:3px 7px;font-size:10.5px;font-weight:600;line-height:1.2;white-space:nowrap}.chip.low{color:var(--low);background:var(--low-bg)}.chip.medium{color:var(--medium);background:var(--medium-bg)}.chip.high{color:var(--high);background:var(--high-bg)}.metric{overflow:hidden;color:var(--muted);font-size:10.5px;text-overflow:ellipsis;white-space:nowrap}.badge{display:inline-flex;align-items:center;width:max-content;border-radius:999px;padding:3px 7px;background:var(--medium-bg);color:var(--secondary);font-size:10.5px;font-weight:700;line-height:1.2}.badge.live{color:var(--live);background:var(--accent-bg)}.badge.done{color:var(--done);background:color-mix(in srgb,var(--done) 10%,var(--surface))}.badge.needs{color:var(--needs);background:var(--needs-bg)}.badge.fail{color:var(--fail);background:var(--fail-bg)}.backdrop{position:fixed;inset:0;z-index:20;background:rgba(2,6,23,.38);opacity:0;pointer-events:none;transition:opacity .18s}.backdrop.open{opacity:1;pointer-events:auto}.drawer{position:fixed;z-index:21;top:0;right:0;width:min(560px,100vw);height:100dvh;display:flex;flex-direction:column;border-left:1px solid var(--border);background:var(--surface);box-shadow:var(--shadow);transform:translateX(10 <body>
<main class="shell">
<header class="topbar"><div class="brand">Command Center <span class="live-dot" aria-hidden="true"></span><span class="live-count mono" id="liveCount">0 live</span></div><div class="header-right"><span class="need-pill" id="needPill">0 need you</span><span class="tokens mono" id="tokensToday">tokens today: -</span></div></header>
<div id="notices" class="notice"></div>
<section class="needs" aria-labelledby="needsHeading"><div class="needs-head"><h2 class="section-title" id="needsHeading">Needs you</h2><span class="needs-count mono" id="needsCount">Checking</span></div><div id="needsList"></div></section>
<section class="controls" aria-label="Timeline controls"><input id="search" class="search" type="search" placeholder="Search activity" aria-label="Search timeline"><div class="filter-group" aria-label="Type filters"><button class="filter" type="button" data-type="worker" aria-pressed="true">Worker</button><button class="filter" type="button" data-type="committee" aria-pressed="true">Committee</button><button class="filter" type="button" data-type="plan" aria-pressed="true">Plan</button></div><div class="filter-group" aria-label="State filters"><button class="filter" type="button" data-state="all" aria-pressed="true">All</button><button class="filter" type="button" data-state="live" aria-pressed="false">Live</button><button class="filter" type="button" data-state="needs-you" aria-pressed="false">Needs you</button><button class="filter" type="button" data-state="done" aria-pressed="false">Done</button></div><span class="spacer"></span><button id="expand" class="text-button" type="button">Expand all</button><button id="collapse" class="text-button" type="button">Collapse all</button></section>
<section aria-labelledby="timelineHeading"><div class="timeline-top"><h2 id="timelineHeading" class="section-title">Timeline</h2><div><button id="newActivity" class="text-button" type="button" hidden>New activity</button><span class="timeline-total mono" id="timelineCount"></span></div></div><div class="grid-head" aria-hidden="true"><span>Type</span><span>Title</span><span>Session</span><span>Model</span><span>Cost / duration</span><span>Time</span></div><div id="timeline" class="timeline"></div></section>
</main>
<div id="backdrop" class="backdrop"></div>
<aside id="drawer" class="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle" aria-hidden="true"><header class="drawer-head"><div><p class="drawer-kicker" id="drawerKicker">Detail</p><h2 class="drawer-title" id="drawerTitle">Item detail</h2></div><button id="closeDrawer" class="close" type="button" aria-label="Close detail">×</button></header><div id="drawerBody" class="drawer-body"></div></aside>
<div id="announcements" class="live-region" aria-live="polite"></div>
<script>
(() => {
const queryTheme=new URLSearchParams(location.search).get('theme');if(queryTheme==='light'||queryTheme==='dark')document.documentElement.dataset.theme=queryTheme;
const feeds={status:null,committees:null,workers:null,plans:null};const failed=new Set();let entries=[],needs=[],activeId=null,lastOpener=null,pendingEntries=[],hasPainted=false;const filterState={types:new Set(['worker','committee','plan']),state:'all',query:''};const $=id=>document.getElementById(id);const esc=value=>String(value??'').replace(/[&<>'"]/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));const asArray=value=>Array.isArray(value)?value:[];const dateMs=value=>{const result=Date.parse(value||'');return Number.isFinite(result)?result:0};
const relative=value=>{const stamp=dateMs(value);if(!stamp)return'unknown';const seconds=Math.max(0,Math.floor((Date.now()-stamp)/1000));if(seconds<45)return'now';if(seconds<3600)return`${Math.floor(seconds/60)}m`;if(seconds<86400)return`${Math.floor(seconds/3600)}h`;return`${Math.floor(seconds/86400)}d`};const elapsed=value=>{const stamp=dateMs(value);if(!stamp)return'-';const seconds=Math.max(0,Math.floor((Date.now()-stamp)/1000));if(seconds<3600)return`${Math.floor(seconds/60)}m`;if(seconds<86400)return`${Math.floor(seconds/3600)}h ${Math.floor(seconds%3600/60)}m`;return`${Math.floor(seconds/86400)}d ${Math.floor(seconds%86400/3600)}h`};
const num=value=>typeof value==='number'||typeof value==='string'&&String(value).trim()!==''?String(value):'';const money=value=>{const raw=num(value);if(!raw)return'';return raw.startsWith('$')?raw:`$${raw}`};const token=value=>{const raw=num(value);return raw?`${raw} tok`:''};const metricFor=value=>{const source=value||{};const parts=[token(source.tokens??source.token_count??source.total_tokens),money(source.cost??source.cost_usd)];if(source.started)parts.push(elapsed(source.started));return parts.filter(Boolean).join(' · ')||'-'};const heat=effort=>effort==='low'?'low':effort==='high'?'high':'medium';const chip=(model,effort)=>model?`<span class="chip ${heat(effort)}">${esc(model)}${effort?` @ ${esc(effort)}`:''}</span>`:'';
const stateClass=value=>{const state=String(value||'').toLowerCase();return/live|running|deciding|doing/.test(state)?'live':/done|green|passed|complete/.test(state)?'done':/block|fail|bad|died/.test(state)?'fail':/wait|todo|stalled|could|planned|need/.test(state)?'needs':''};const badge=value=>{const name=String(value||'unknown').replace(/_/g,' ');return`<span class="badge ${stateClass(name)}">${esc(name)}</span>`};const titleForNode=node=>node.name||node.action||'Plan step';
function walkNodes(nodes,callback,depth=0){asArray(nodes).forEach(node=>{callback(node,depth);walkNodes(node.steps,callback,depth+1)})}function planSummary(plan){const first=asArray(plan.stages)[0];return plan.summary||plan.description||plan.phase||(first&&(first.action||first.name))||'Execution plan'}function planRollup(plan){const counts={ai:0,human:0,mix:0};walkNodes(plan.stages,node=>{if(counts[node.actor]!==undefined)counts[node.actor]++});return counts}function isStrategic(committee){return/strategic|gate|decision|direction|approve|approval/i.test(`${committee.name||''} ${committee.description||''}`)}
function makeData(){entries=[];needs=[];const workers=[...asArray(feeds.workers&&feeds.workers.running),...asArray(feeds.workers&&feeds.workers.recent)];workers.forEach((worker,index)=>entries.push({id:`worker-${worker.session||worker.label||index}-${worker.updated||worker.started||index}`,type:'worker',title:worker.label||'Unnamed worker',session:worker.session,model:worker.model,effort:worker.effort,time:worker.updated||worker.started,state:worker.state||'unknown',source:worker}));const committees=[...asArray(feeds.committees&&feeds.committees.decisions),...asArray(feeds.committees&&feeds.committees.execution)];committees.forEach((committee,index)=>{const item={id:`committee-${committee.session||committee.name||index}-${committee.updated||committee.created||index}`,type:'committee',title:committee.name||'Committee',session:committee.session,time:committee.updated||committee.created,state:committee.status==='deciding'?'live':committee.status==='done'?'done':committee.status||'unknown',source:committee};entries.push(item);if(committee.judgement==='died')needs.push({id:item.id,type:'committee',title:committee.name||'Committee recovery',text:committee.description||'The committee died and requires a recovery decision before work can continue.',session:committee.session,time:item.time,source:item.source});else if(isStrategic(committee)&&committee.status!=='done')needs.push({id:item.id,type:'committee',title:committee.name||'Strategic committee',text:committee.description||'A strategic judgement is needed before the next execution step.',session:committee.session,time:item.time,source:item.source})});asArray(feeds.plans&&feeds.plans.plans).forEach((plan,index)=>{const base={id:`plan-${plan.id||plan.session||plan.name||index}`,type:'plan',title:plan.name||'Execution plan',session:plan.session,model:plan.author_model,effort:plan.author_effort,time:plan.updated||plan.created||plan.started,state:plan.status==='done'?'done':plan.status==='live'?'live':'planned',source:plan};entries.push(base);walkNodes(plan.stages,node=>{const nodeState=node.progress||node.status||'todo';entries.push({id:`${base.id}-node-${node.id||node.name||node.action||index}`,type:'plan',title:`${plan.name||'Plan'}: ${titleForNode(node)}`,session:plan.session,model:node.model||plan.author_model,effort:node.effort||plan.author_effort,time:node.updated||plan.updated||plan.created,state:/doing|live/.test(nodeState)?'live':/done|complete/.test(nodeState)?'done':nodeState,source:plan,node});if(node.actor==='human'&&nodeState==='todo')needs.push({id:`${base.id}-need-${node.id||node.name||node.action||index}`,type:'plan',title:titleForNode(node),text:`${plan.name||'Execution plan'}: ${node.action||node.name||'Human decision required'} blocks the next phase.`,session:plan.session,time:node.updated||plan.updated,node,source:plan})})});entries.sort((a,b)=>dateMs(b.time)-dateMs(a.time))}
function matches(item){const haystack=`${item.type} ${item.title} ${item.session||''} ${item.state||''} ${item.model||''}`.toLowerCase();const state=String(item.state||'').toLowerCase();const live=/^(live|running|deciding|doing)$/.test(state),done=/^(done|complete|completed)$/.test(state);const stateOk=filterState.state==='all'||filterState.state==='live'&&live||filterState.state==='done'&&done||filterState.state==='needs-you'&&needs.some(need=>need.id===item.id||need.source===item.source&&(!need.node||need.node===item.node));return filterState.types.has(item.type)&&stateOk&&(!filterState.query||haystack.includes(filterState.query))}
function render(){renderHeader();renderNotices();renderNeeds();renderTimeline();renderNewActivity()}function renderHeader(){const status=feeds.status||{};const live=status.live_agent_count??asArray(feeds.workers&&feeds.workers.running).length;$('liveCount').textContent=`${live||0} live`;const total=token(status.tokens_today??status.tokens??status.total_tokens_today);$('tokensToday').textContent=`tokens today: ${total||'-'}`;$('needPill').textContent=`${needs.length} need you`}function renderNotices(){const labels={status:'Brain status',committees:'Committee',workers:'Worker',plans:'Execution plan'};$('notices').innerHTML=[...failed].map(key=>`${esc(labels[key])} feed unavailable. Other activity remains available.`).join(' ')}function renderNeeds(){$('needsCount').textContent=needs.length?`${needs.length} awaiting`:'All clear';$('needsList').innerHTML=needs.length?needs.map(need=>`<button class="need" type="button" data-open="${esc(need.id)}"><span class="need-title">${esc(need.title)}</span><span class="need-context">${esc(need.text)}</span><span class="session">${esc(need.session||'session unknown')}</span><span class="time">${esc(relative(need.time))}</span></button>`).join(''):'<div class="empty">No decisions or actions are waiting for you.</div>'}function renderTimeline(){const visible=entries.filter(matches);$('timelineCount').textContent=`${visible.length} items`;$('timeline').innerHTML=visible.length?visible.map(item=>`<button class="timeline-row" type="button" data-open="${esc(item.id)}"><span class="tag tag-${item.type}">${item.type.toUpperCase()}</span><span class="row-title ${activeId===item.id?'active':''}">${esc(item.title)}</span><span class="session row-session">${esc(item.session||'session unknown')}</span><span class="row-model">${chip(item.model,item.effort)||'<span class="metric">-</span>'}</span><span class="metric">${esc(metricFor(item.node||item.source))}</span><span class="time">${esc(relative(item.time))}</span></button>`).join(''):'<div class="empty">No activity matches these filters.</div>'}function renderNewActivity(){$('newActivity').hidden=!pendingEntries.length;$('newActivity').textContent=`${pendingEntries.length} new activity`}
function facts(rows){return`<dl class="facts">${rows.map(([key,value])=>`<div><dt>${esc(key)}</dt><dd>${value||'-'}</dd></div>`).join('')}</dl>`}function sourceSlot(){return'<section class="detail-block source-slot"><h3>Source document</h3><p>GitLab issue preview + comments mount here (next phase)</p></section>'}function workerDetail(item){const worker=item.source;return`<div class="detail-meta">${chip(worker.model,worker.effort)}${badge(worker.state)}</div><section class="detail-block"><h3>Current output</h3><p>${esc(worker.output||worker.current_output||worker.message||worker.label||'No worker output reported.')}</p></section><section class="detail-block"><h3>Worker details</h3>${facts([['Task',esc(worker.label||'-')],['State',esc(worker.state||'-')],['Host',esc(worker.host||'-')],['Started',worker.started?`${esc(new Date(worker.started).toLocaleString())} · ${esc(elapsed(worker.started))}`:'-'],['Last update',worker.updated?esc(relative(worker.updated)):'-'],['Tokens / cost',esc(metricFor(worker))]])}</section>${sourceSlot()}`}function committeeDetail(item){const committee=item.source;const members=asArray(committee.rounds).flatMap(round=>asArray(round.members));const judgement={green:'Passed',judged_bad:'Real defects',could_not_judge:'Could not judge',died:'Died'}[committee.judgement]||committee.judgement||committee.status||'Unknown';return`<div class="detail-meta">${badge(judgement)}</div><section class="detail-block"><h3>Description</h3><p>${esc(committee.description||'No committee description reported.')}</p></section><section class="detail-block"><h3>Tokens, cost, duration</h3><p class="mono">${esc(metricFor(committee))}</p></section><section class="detail-block"><h3>Members</h3>${members.length?members.map((member,index)=>`<button class="member" type="button" data-member="${index}" aria-expanded="false"><span class="member-top"><span class="member-role">${esc(member.role||'Member')}</span>${chip(member.model||member.role,member.effort)}${badge(member.verdict||'no verdict')}</span><span class="member-comment">${esc(member.comment||member.does||'No comment reported.')}</span></button>`).join(''):'<div class="empty">No member comments reported.</div>'}</section>${sourceSlot()}`}
function stepMarkup(node){const actor=node.actor||'ai';const children=asArray(node.steps);return`<div class="step"><span>${badge(actor)}</span><div><div class="step-name">${esc(titleForNode(node))}</div><div class="step-meta">${badge(node.progress||node.status||'todo')}${actor==='ai'?chip(node.model,node.effort):''}${node.committee?'<span class="badge">Committee</span>':''}<span class="metric">${esc(metricFor(node))}</span></div>${node.action&&node.action!==node.name?`<div class="substep">${esc(node.action)}</div>`:''}${children.length?`<div class="substeps">${children.map(child=>stepMarkup(child)).join('')}</div>`:''}</div></div>`}function planDetail(item){const plan=item.source,counts=planRollup(plan),phases=asArray(plan.stages);return`<div class="detail-meta">${chip(plan.author_model,plan.author_effort)}${badge(plan.status||'planned')}</div><section class="detail-block"><h3>Plan summary</h3><p class="plan-summary">${esc(planSummary(plan))}</p></section><section class="detail-block"><h3>Actor rollup</h3><div class="rollup"><span class="badge">AI ${counts.ai}</span><span class="badge needs">Human ${counts.human}</span><span class="badge">Mix ${counts.mix}</span></div></section><section class="detail-block"><div class="section-heading"><h3>Phases</h3><div class="plan-controls"><button class="text-button" type="button" data-plan-expand>Expand all</button><button class="text-button" type="button" data-plan-collapse>Collapse all</button></div></div>${phases.length?phases.map((phase,index)=>`<details class="phase" ${index===0?'open':''}><summary><span>${index+1}. ${esc(phase.name||phase.action||`Phase ${index+1}`)}</span>${badge(phase.progress||phase.status||'todo')}</summary><div class="steps">${asArray(phase.steps).length?asArray(phase.steps).map(stepMarkup).join(''):stepMarkup(phase)}</div></details>`).join(''):'<div class="empty">This plan has no phases reported yet.</div>'}</section>${sourceSlot()}`}
function openDetail(id,opener){const item=entries.find(entry=>entry.id===id)||needs.find(need=>need.id===id);if(!item)return;lastOpener=opener||document.activeElement;activeId=id;$('drawerKicker').textContent=`${item.type} detail`;$('drawerTitle').textContent=item.title;$('drawerBody').innerHTML=item.type==='worker'?workerDetail(item):item.type==='committee'?committeeDetail(item):planDetail(item);$('drawer').classList.add('open');$('backdrop').classList.add('open');$('drawer').setAttribute('aria-hidden','false');renderTimeline();requestAnimationFrame(()=>$('closeDrawer').focus())}function closeDetail(){activeId=null;$('drawer').classList.remove('open');$('backdrop').classList.remove('open');$('drawer').setAttribute('aria-hidden','true');renderTimeline();if(lastOpener&&lastOpener.focus)lastOpener.focus()}function trapFocus(event){if(!activeId||event.key!=='Tab')return;const items=[...$('drawer').querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(node=>!node.disabled);if(!items.length)return;const first=items[0],last=items.at(-1);if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}
async function fetchJson(url){const response=await fetch(`${url}${url.includes('?')?'&':'?'}_=${Date.now()}`,{cache:'no-store'});if(!response.ok)throw new Error(String(response.status));return response.json()}async function refresh(initial=false){if(!initial&&document.hidden)return;const oldIds=new Set(entries.map(item=>item.id));const results=await Promise.allSettled([fetchJson('/brain-status'),fetchJson('/committee-feed'),fetchJson('/builder-feed'),fetchJson('/exec-plan-feed')]);[[results[0],'status'],[results[1],'committees'],[results[2],'workers'],[results[3],'plans']].forEach(([result,key])=>{if(result.status==='fulfilled'){feeds[key]=result.value;failed.delete(key)}else failed.add(key)});makeData();const arrivals=hasPainted?entries.filter(item=>!oldIds.has(item.id)):[];if(!hasPainted){render();hasPainted=true;return}renderHeader();renderNotices();renderNeeds();if(arrivals.length){pendingEntries=[...new Map([...pendingEntries,...arrivals].map(item=>[item.id,item])).values()];$('announcements').textContent=`${pendingEntries.length} new activity item${pendingEntries.length===1?'':'s'} available.`}renderNewActivity()}function revealNew(){pendingEntries=[];$('announcements').textContent='New activity applied.';renderTimeline();renderNewActivity()}
document.addEventListener('click',event=>{const opener=event.target.closest('[data-open]');if(opener){openDetail(opener.dataset.open,opener);return}const member=event.target.closest('[data-member]');if(member){const expanded=member.classList.toggle('open');member.setAttribute('aria-expanded',String(expanded))}if(event.target.closest('[data-plan-expand]'))$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=true);if(event.target.closest('[data-plan-collapse]'))$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=false)});$('closeDrawer').addEventListener('click',closeDetail);$('backdrop').addEventListener('click',closeDetail);document.addEventListener('keydown',event=>{if(event.key==='Escape'&&activeId)closeDetail();trapFocus(event)});$('search').addEventListener('input',event=>{filterState.query=event.target.value.trim().toLowerCase();renderTimeline()});document.querySelectorAll('[data-type]').forEach(button=>button.addEventListener('click',()=>{const type=button.dataset.type;filterState.types.has(type)?filterState.types.delete(type):filterState.types.add(type);button.setAttribute('aria-pressed',String(filterState.types.has(type)));renderTimeline()}));document.querySelectorAll('[data-state]').forEach(button=>button.addEventListener('click',()=>{filterState.state=button.dataset.state;document.querySelectorAll('[data-state]').forEach(other=>other.setAttribute('aria-pressed',String(other===button)));renderTimeline()}));$('expand').addEventListener('click',()=>$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=true));$('collapse').addEventListener('click',()=>$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=false));$('newActivity').addEventListener('click',revealNew);document.addEventListener('visibilitychange',()=>{if(!document.hidden)refresh()});render();refresh(true);setInterval(()=>refresh(),6000);
})();
