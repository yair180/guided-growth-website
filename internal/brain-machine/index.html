<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Machine</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
  :root {
    --bg:#f7f8fa; --panel:#fff; --wash:#f0f2f6; --ink:#1c2430; --ink2:#39434f; --muted:#6a7484; --faint:#98a1b0;
    --line:#e4e8ef; --line2:#eef1f6; --blue:#2456c7;
    --green:#1c7a4d; --green-bg:#e3f6ec; --amber:#a15c00; --amber-bg:#fdf0d6; --red:#b42318; --red-bg:#fdece9; --gray:#9aa3b2;
    --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  @media (prefers-color-scheme: dark) { :root:not([data-theme]) {
    --bg:#10151d; --panel:#161c26; --wash:#131a24; --ink:#edf2f8; --ink2:#c7d0dc; --muted:#8b97a8; --faint:#5b6676;
    --line:#2a3441; --line2:#1b2430; --blue:#8db2ff;
    --green:#5fd493; --green-bg:#12331f; --amber:#f2bd63; --amber-bg:#3a2c10; --red:#ff8f88; --red-bg:#3a1a17; --gray:#5f6b7b;
  } }
  html[data-theme="dark"] {
    --bg:#10151d; --panel:#161c26; --wash:#131a24; --ink:#edf2f8; --ink2:#c7d0dc; --muted:#8b97a8; --faint:#5b6676;
    --line:#2a3441; --line2:#1b2430; --blue:#8db2ff;
    --green:#5fd493; --green-bg:#12331f; --amber:#f2bd63; --amber-bg:#3a2c10; --red:#ff8f88; --red-bg:#3a1a17; --gray:#5f6b7b;
  }
  html[data-theme="light"] {
    --bg:#f7f8fa; --panel:#fff; --wash:#f0f2f6; --ink:#1c2430; --ink2:#39434f; --muted:#6a7484; --faint:#98a1b0;
    --line:#e4e8ef; --line2:#eef1f6; --blue:#2456c7;
    --green:#1c7a4d; --green-bg:#e3f6ec; --amber:#a15c00; --amber-bg:#fdf0d6; --red:#b42318; --red-bg:#fdece9; --gray:#9aa3b2;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font:14px/1.5 var(--sans); -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1400px; margin:0 auto; padding:10px 14px 26px; }

  /* top strip: vitals + a small done summary */
  .topstrip { display:flex; flex-wrap:wrap; align-items:center; gap:6px 16px; padding:0 2px 9px; border-bottom:1px solid var(--line); font-size:12px; }
  .fdot { width:8px; height:8px; border-radius:50%; background:var(--gray); flex:none; }
  .fdot.fresh { background:var(--green); } .fdot.lagging { background:var(--amber); animation:pulse 1.6s infinite; }
  .fdot.paused { background:var(--gray); } .fdot.down { background:var(--red); animation:pulse 1.4s infinite; }
  .topstrip .box { color:var(--ink2); font-weight:650; }
  .topstrip .sub { color:var(--muted); }
  .topstrip .vit { margin-left:auto; display:flex; flex-wrap:wrap; gap:3px 13px; color:var(--muted); font-family:var(--mono); font-size:11.5px; }
  .topstrip .vit b { color:var(--ink2); font-weight:600; } .topstrip .vit .warn { color:var(--amber); } .topstrip .vit .crit { color:var(--red); }
  .svc { display:inline-flex; align-items:center; gap:6px; color:var(--red); }
  .svc .sdot { width:6px; height:6px; border-radius:50%; background:var(--red); }
  .summ { margin:8px 2px 0; font-size:11.5px; color:var(--muted); font-family:var(--mono); display:flex; flex-wrap:wrap; gap:3px 13px; }
  .summ b { color:var(--ink2); font-weight:600; } .summ .g { color:var(--green); } .summ .r { color:var(--red); } .summ .a { color:var(--amber); }
  .summ .note { color:var(--faint); font-style:italic; font-family:var(--sans); }

  /* three lifecycle columns */
  .board { display:grid; grid-template-columns: 1.05fr 1fr; align-items:start; margin-top:12px; gap:0; }
  .col { min-width:0; padding:0 15px; }
  .col-live { padding-left:2px; border-right:1px solid var(--line); background:var(--wash); border-radius:3px; }
  .col-done { padding-right:2px; padding-left:16px; }
  /* Planned: a thin strip, not a column (it is nearly always empty) */
  .planned-strip { margin-top:12px; padding:7px 11px; border:1px solid var(--line); border-radius:8px; background:var(--wash); font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:7px 11px; flex-wrap:wrap; }
  .planned-strip .plabel { font-size:10px; font-weight:750; letter-spacing:.09em; text-transform:uppercase; color:var(--ink2); }
  .planned-strip .pchip { font-size:11px; color:var(--ink); background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:2px 7px; }
  .dtoggle { font:inherit; font-size:11px; font-weight:600; color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:3px 9px; cursor:pointer; white-space:nowrap; }
  .dtoggle.active { background:var(--blue); color:var(--panel); border-color:var(--blue); }
  .dtoggle:hover { border-color:var(--blue); }
  .dgroup-label { font-size:9.5px; font-weight:750; letter-spacing:.07em; text-transform:uppercase; color:var(--faint); padding:9px 2px 2px; }
  .sess-head { display:flex; align-items:baseline; gap:7px; padding:9px 2px 3px; font-size:10px; font-weight:750; letter-spacing:.06em; text-transform:uppercase; color:var(--blue); border-top:1px solid var(--line); }
  .sess-head .sc { color:var(--muted); font-family:var(--mono); font-weight:600; }
  .col-head { display:flex; align-items:center; gap:8px; padding:2px 0 9px; border-bottom:1px solid var(--line); }
  .col-title { font-size:11px; font-weight:750; letter-spacing:.1em; text-transform:uppercase; color:var(--ink2); display:flex; align-items:center; gap:7px; }
  .livedot { width:7px; height:7px; border-radius:50%; background:var(--gray); }
  .livedot.on { background:var(--amber); animation:pulse 1.3s infinite; }
  .col-count { font-size:11px; color:var(--muted); font-weight:600; margin-left:auto; }
  .col-body { padding-top:2px; max-height:720px; overflow-y:auto; overflow-x:hidden; }
  .empty { color:var(--faint); font-size:12px; padding:12px 2px; line-height:1.5; }
  .dfilter { display:flex; align-items:center; gap:6px; flex-wrap:wrap; padding:8px 0 6px; }
  .dchip { font:inherit; font-size:11px; font-weight:600; color:var(--muted); background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:3px 9px; cursor:pointer; display:inline-flex; gap:5px; align-items:center; white-space:nowrap; }
  .dchip:hover { border-color:var(--blue); color:var(--blue); }
  .dchip.active { background:var(--blue); color:var(--panel); border-color:var(--blue); }
  .dchip .dc { font-family:var(--mono); opacity:.75; }
  .dsearch { flex:1; min-width:80px; font:inherit; font-size:12px; color:var(--ink); background:var(--bg); border:1px solid var(--line); border-radius:7px; padding:4px 9px; }
  .dsearch:focus { outline:none; border-color:var(--blue); }

  /* a committee = a two-line block (title + subtitle), accordion */
  .cm { border-bottom:1px solid var(--line); }
  .col-live .cm { border-bottom:1px solid color-mix(in srgb, var(--line) 70%, transparent); }
  .cm-line { display:flex; align-items:flex-start; gap:8px; padding:9px 2px; cursor:pointer; }
  .pill { flex:none; font-size:8.5px; font-weight:750; letter-spacing:.04em; padding:2px 6px; border-radius:5px; white-space:nowrap; text-transform:uppercase; margin-top:2px; }
  .pill.green { background:var(--green-bg); color:var(--green); }
  .pill.red { background:var(--red-bg); color:var(--red); }
  .pill.deciding { background:var(--amber-bg); color:var(--amber); animation:breathe 1.7s ease-in-out infinite; }
  .pill.split { background:var(--amber-bg); color:var(--amber); }
  .pill.pending { background:var(--line2); color:var(--muted); border:1px solid var(--line); }
  .pill.stalled { background:var(--red-bg); color:var(--red); border:1px dashed var(--red); }
  /* the judge could not seat a reviewer: NOT a quality signal, must never look like a failure */
  .pill.nojudge { background:var(--line2); color:var(--muted); border:1px dashed var(--faint); }
  .cm.nojudge .cname { color:var(--muted); }
  /* a worker/joblog run chip, distinct from a committee */
  .btag { font-size:8.5px; font-weight:750; letter-spacing:.05em; text-transform:uppercase; color:var(--blue); background:color-mix(in srgb, var(--blue) 12%, transparent); border-radius:4px; padding:1px 5px; white-space:nowrap; }
  .cm.stalled .cname { color:var(--muted); }
  .cbody { flex:1; min-width:0; }
  .cname { font-size:11.5px; font-weight:600; color:var(--ink); line-height:1.34; overflow:hidden; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; }
  .col-live .cname { font-size:12px; }
  .cm.open > .cm-line .cname { -webkit-line-clamp:unset; }   /* expanded: always show the full title */
  .cm-l2 { display:flex; align-items:center; gap:5px 8px; flex-wrap:wrap; margin-top:3px; font-size:10.5px; color:var(--muted); line-height:1.35; }
  .csess { font-family:var(--mono); font-weight:600; color:var(--blue); background:var(--line2); border-radius:4px; padding:1px 5px; white-space:nowrap; }
  .csub { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }
  .ctype { font-size:8.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--faint); }
  .cprog { color:var(--muted); font-family:var(--mono); white-space:nowrap; }
  .caret { flex:none; color:var(--faint); font-size:14px; transition:transform .16s ease; margin-top:1px; }
  .cm.open > .cm-line .caret { transform:rotate(90deg); }
  .cm-detail { display:none; padding:2px 2px 11px 8px; }
  .cm.open > .cm-detail { display:block; }
  .cm-desc { font-size:12px; color:var(--ink2); line-height:1.5; margin:2px 0 9px; }
  .rlabel { font-size:9.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--faint); font-weight:700; margin:8px 0 5px; }
  .rlabel .cur { color:var(--blue); }

  /* a member = a thin line too, expandable to full detail */
  .mem { border-top:1px solid var(--line2); }
  .mem-line { display:flex; align-items:center; gap:8px; padding:6px 0; cursor:pointer; font-size:12px; }
  .mlight { width:8px; height:8px; border-radius:50%; flex:none; background:var(--gray); }
  .mlight.green { background:var(--green); } .mlight.red { background:var(--red); } .mlight.thinking { background:var(--amber); animation:pulse 1.4s infinite; }
  .mrole { color:var(--ink2); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mdoes { color:var(--muted); font-weight:400; min-width:0; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mtag { flex:none; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
  .mtag.green { color:var(--green); } .mtag.red { color:var(--red); } .mtag.thinking { color:var(--amber); }
  .mcaret { flex:none; color:var(--faint); font-size:11px; transition:transform .15s; }
  .mem.open .mcaret { transform:rotate(90deg); }
  .mfull { display:none; margin:2px 0 8px 16px; padding:9px 11px; background:var(--bg); border:1px solid var(--line); border-radius:8px; font-size:12px; line-height:1.55; color:var(--ink2); white-space:pre-wrap; word-break:break-word; max-height:300px; overflow:auto; }
  .mem.open .mfull { display:block; }

  .grade { flex:none; font-size:8.5px; font-weight:750; letter-spacing:.04em; text-transform:uppercase; padding:2px 5px; border-radius:4px; }
  .grade.strong { background:var(--green-bg); color:var(--green); }
  .grade.advisory { border:1px dashed var(--amber); color:var(--amber); }

  .banner { display:none; margin:10px 2px 0; padding:9px 12px; border-radius:8px; font-size:12.5px; background:var(--line2); color:var(--muted); border:1px solid var(--line); }
  .banner.show { display:block; }


  @keyframes pulse { 50% { opacity:.32; } }
  @keyframes breathe { 50% { opacity:.55; } }
  @media (max-width:900px) {
    .board { grid-template-columns:1fr; gap:20px; }
    .col-live { order:-1; border:1px solid var(--line); padding:10px; }
    .col { padding:0 2px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topstrip">
    <span class="fdot" id="fdot"></span>
    <span id="subline">connecting to the brain box</span>
    <span class="svc" id="svc" hidden><span class="sdot"></span><span id="svctext"></span></span>
    <span class="vit" id="vit"></span>
  </div>
  <div class="summ" id="summ"></div>
  <div class="banner" id="banner"></div>

  <div class="board">
    <section class="col col-live">
      <div class="col-head"><span class="col-title"><span class="livedot" id="livedot"></span>Live</span><span class="col-count" id="cnt-live"></span></div>
      <div class="col-body" id="live"></div>
    </section>
    <section class="col col-done">
      <div class="col-head"><span class="col-title">Done</span><span class="col-count" id="cnt-done"></span></div>
      <div class="dfilter">
        <button class="dchip active" data-f="all" type="button">All <span class="dc" data-c="all">0</span></button>
        <button class="dchip" data-f="green" type="button">Passed <span class="dc" data-c="green">0</span></button>
        <button class="dchip" data-f="red" type="button">Real defects <span class="dc" data-c="red">0</span></button>
        <button class="dchip" data-f="nojudge" type="button">Could not judge <span class="dc" data-c="nojudge">0</span></button>
        <button class="dchip" data-f="stalled" type="button">Died <span class="dc" data-c="stalled">0</span></button>
        <button class="dtoggle" id="groupToggle" type="button">Group by session</button>
        <input class="dsearch" id="dsearch" type="search" placeholder="search" aria-label="search done committees">
      </div>
      <div class="col-body" id="done"></div>
    </section>
  </div>
</div>
<script>
  const urlTheme = new URLSearchParams(location.search).get('theme');
  if (urlTheme === 'dark' || urlTheme === 'light') document.documentElement.dataset.theme = urlTheme;
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (d && d.type === 'gg-theme' && (d.theme === 'dark' || d.theme === 'light')) document.documentElement.dataset.theme = d.theme;
  });

  const POLL_MS = 6000;
  let timer = null, lastHeight = 0;
  const openState = {};   // committee id / member key -> bool (persist expand across polls)

  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
  function rel(sec) {
    if (sec < 10) return 'just now'; if (sec < 60) return `${sec}s ago`;
    const m = Math.round(sec / 60); if (m < 60) return `${m}m ago`;
    const h = Math.floor(m / 60); return `${h}h ${m % 60}m ago`;
  }
  function relStarted(iso) {
    const t = iso ? Date.parse(iso) : NaN; if (Number.isNaN(t)) return '';
    return rel(Math.max(0, Math.round((Date.now() - t) / 1000)));
  }
  function ageSeconds(ts) { const t = ts ? Date.parse(ts) : NaN; return Number.isNaN(t) ? Infinity : Math.round((Date.now() - t) / 1000); }
  function fmtBytes(n) { if (n == null || isNaN(n)) return ''; if (n < 1024) return n + ' B'; if (n < 1048576) return Math.round(n / 1024) + ' KB'; return (n / 1048576).toFixed(n < 10485760 ? 1 : 0) + ' MB'; }
  function fmtTokens(n) { if (n == null || isNaN(n) || n === 0) return ''; if (n < 1000) return n + ' tok'; if (n < 1e6) return Math.round(n / 1000) + 'K tok'; return (n / 1e6).toFixed(1) + 'M tok'; }

  // The server classifies by EVIDENCE (did a reviewer actually read it?), because a plain "red"
  // hid a broken judge as failed work. Prefer that; fall back to the raw verdict for old clients.
  function verdictKey(c) {
    const j = c.judgement;
    if (j) return { green:'green', judged_bad:'red', could_not_judge:'nojudge', died:'stalled', deciding:'deciding' }[j] || 'pending';
    if (c.status === 'stalled') return 'stalled';
    if (c.status === 'deciding' || c.verdict === 'deciding') return 'deciding';
    if (c.verdict === 'green' || c.verdict === 'red' || c.verdict === 'split') return c.verdict;
    return 'pending';
  }
  function verdictLabel(k) { return { green:'GREEN', red:'RED', nojudge:'NO JUDGE', split:'SPLIT', deciding:'DECIDING', stalled:'STALLED', pending:'QUEUED' }[k] || 'QUEUED'; }
  function memberClass(m) { return m.status !== 'done' ? 'thinking' : (m.verdict === 'green' ? 'green' : m.verdict === 'red' ? 'red' : ''); }
  function memberTag(m) { return m.status !== 'done' ? 'thinking' : (m.verdict || ''); }
  function currentMembers(c) { const r = Array.isArray(c.rounds) ? c.rounds : []; const last = r[r.length - 1]; return last && Array.isArray(last.members) ? last.members : []; }
  // a committee that says "deciding" but has not posted anything in a while is stalled, not live
  const STALL_MS = 20 * 60 * 1000;
  function isStalled(c) { return c.status === 'deciding' && (Date.now() - Date.parse(c.updated || c.created || 0)) > STALL_MS; }

  // strip a trailing [tag] off the topic to use as a grade chip; keep the name clean
  function nameOf(c) { if (c.name) return String(c.name); return String(c.topic || 'committee').replace(/\s*\[[^\]]+\]\s*$/, '').trim() || 'committee'; }
  function gradeOf(c) {
    const m = String(c.topic || '').match(/\[([^\]]+)\]\s*$/);
    const g = m ? m[1].toLowerCase() : '';
    if (g.includes('constitutional')) return { cls: 'strong', label: 'constitutional' };
    if (g.includes('transitional')) return { cls: 'advisory', label: 'transitional' };
    return null;
  }
  function typeLabel(c) { return c.type === 'worker' ? 'worker' : c.type === 'decision' ? 'decision' : 'check'; }
  // A joblog worker run uses the same card shape as a committee, so it shares the Live/Done columns.
  // A failed worker is a real failure (unlike a committee with no judge), so it maps to red.
  function workerToCard(worker) {
    const m = ({ running: ['deciding', 'deciding'], done: ['done', 'green'], failed: ['done', 'red'], stalled: ['stalled', 'red'] })[worker.state] || ['deciding', 'deciding'];
    const bits = []; if (worker.reason) bits.push(worker.reason); if (worker.stall_count) bits.push(`${worker.stall_count} stalls`);
    return {
      id: 'worker:' + worker.id, type: 'worker', source: 'joblog', name: worker.label, topic: worker.label,
      description: bits.join(' · ') || 'build task', session: worker.session,
      status: m[0], verdict: m[1], rounds: [], created: worker.started, updated: worker.updated,
    };
  }

  function postHeight() {
    const h = Math.ceil(document.documentElement.scrollHeight);
    if (Math.abs(h - lastHeight) < 2) return; lastHeight = h;
    try { parent.postMessage({ type: 'gg-embed-height', height: h }, '*'); } catch (e) {}
  }

  function membersHtml(c) {
    const rounds = Array.isArray(c.rounds) ? c.rounds : [];
    const desc = c.description ? `<div class="cm-desc">${esc(c.description)}</div>` : '';
    const src = c.source ? `<div class="rlabel">${esc(c.source)}${c.created ? ' · started ' + esc(relStarted(c.created)) : ''}</div>` : '';
    const body = rounds.map((r, i) => {
      const cur = i === rounds.length - 1;
      const members = Array.isArray(r.members) ? r.members : [];
      const rlab = rounds.length > 1 ? `<div class="rlabel">Round ${esc(r.n)}${cur ? ' <span class="cur">(current)</span>' : ''}</div>` : '';
      const mem = members.map((m, j) => {
        const key = `${c.id}:${r.n}:${j}`;
        const has = m.comment && String(m.comment).trim();
        const does = m.does || m.mandate || m.title || '';   // "what it does", once the data has it
        return `<div class="mem${openState[key] ? ' open' : ''}" data-mkey="${esc(key)}">` +
          `<div class="mem-line"${has ? '' : ' style="cursor:default"'}>` +
          `<span class="mlight ${memberClass(m)}"></span>` +
          `<span class="mrole">${esc(m.role)}</span>` +
          (does ? `<span class="mdoes">${esc(does)}</span>` : `<span class="mdoes"></span>`) +
          `<span class="mtag ${memberClass(m)}">${esc(memberTag(m))}</span>` +
          (has ? `<span class="mcaret">&rsaquo;</span>` : '') + `</div>` +
          (has ? `<div class="mfull">${esc(m.comment)}</div>` : '') + `</div>`;
      }).join('');
      return `${rlab}${mem}`;
    }).join('');
    return `${desc}${src}${body}`;
  }

  function committeeHtml(c) {
    const k = verdictKey(c);
    const stalled = isStalled(c);
    const pk = stalled ? 'stalled' : k;
    const members = currentMembers(c);
    const open = !!openState[c.id];
    const doneN = members.filter(m => m.status === 'done').length;
    let right = '';
    if (stalled) right = `${doneN} of ${members.length} in · no update ${relStarted(c.updated)}`;
    else if (k === 'deciding') right = `${doneN} of ${members.length} in · ${relStarted(c.created)}`;
    else if (c.tokens) right = fmtTokens(c.tokens);
    else if (members.length) right = `${members.length} members`;
    const grade = gradeOf(c);
    const sub = c.description || `${c.source ? esc(c.source) + ' ' : ''}${typeLabel(c)} panel`;
    return `<div class="cm ${pk}${open ? ' open' : ''}" data-cid="${esc(c.id)}">` +
      `<div class="cm-line">` +
        `<span class="pill ${pk}">${stalled ? 'STALLED' : verdictLabel(k)}</span>` +
        `<div class="cbody">` +
          `<div class="cname">${esc(nameOf(c))}</div>` +
          `<div class="cm-l2">` +
            (c.type === 'worker' ? `<span class="btag">WORKER</span>` : '') +
            (c.session ? `<span class="csess">${esc(c.session)}</span>` : '') +
            `<span class="csub" title="${esc(sub)}">${esc(sub)}</span>` +
            (grade ? `<span class="grade ${grade.cls}">${grade.label}</span>` : '') +
            (right ? `<span class="cprog">${esc(right)}</span>` : '') +
          `</div>` +
        `</div>` +
        `<span class="caret">&rsaquo;</span>` +
      `</div>` +
      `<div class="cm-detail">${membersHtml(c)}</div>` +
    `</div>`;
  }

  // Only rewrite a column's DOM when its content actually changed, so the Done
  // column (100+ mostly-static rows) does not rebuild every poll. That keeps the
  // live board smooth and never yanks a card out from under you mid-read.
  const lastHtml = {};
  function setHtmlCached(id, html) { if (lastHtml[id] === html) return; lastHtml[id] = html; document.getElementById(id).innerHTML = html; }
  function renderColumn(id, list, emptyMsg) {
    setHtmlCached(id, list.length ? list.map(committeeHtml).join('') : `<div class="empty">${esc(emptyMsg)}</div>`);
  }

  // One delegated click handler for the whole board (survives partial re-renders,
  // never double-binds). Expand/collapse is a class toggle, no re-render needed.
  function bindOnce() {
    document.querySelector('.board').addEventListener('click', (ev) => {
      const memLine = ev.target.closest('.mem-line');
      if (memLine) {
        const mem = memLine.parentElement;
        if (mem && mem.querySelector('.mfull')) { openState[mem.dataset.mkey] = !openState[mem.dataset.mkey]; mem.classList.toggle('open'); postHeight(); }
        return;
      }
      const cmLine = ev.target.closest('.cm-line');
      if (cmLine) { const cm = cmLine.parentElement; openState[cm.dataset.cid] = !openState[cm.dataset.cid]; cm.classList.toggle('open'); postHeight(); }
    });
    document.querySelectorAll('.dchip').forEach(ch => ch.addEventListener('click', () => {
      doneFilter = ch.dataset.f;
      document.querySelectorAll('.dchip').forEach(x => x.classList.toggle('active', x === ch));
      renderDoneList(); postHeight();
    }));
    document.getElementById('dsearch').addEventListener('input', () => { renderDoneList(); postHeight(); });
    document.getElementById('groupToggle').addEventListener('click', (e) => {
      groupBySession = !groupBySession;
      e.currentTarget.classList.toggle('active', groupBySession);
      renderDoneList(); postHeight();
    });
  }

  // Done column filter (verdict chips + search). The chips + input live in static
  // HTML so a poll never steals search focus; only the counts and list update.
  let doneFilter = 'all', groupBySession = false, allDone = [];
  function updateDoneCounts() {
    const c = { all: allDone.length, green: 0, red: 0, nojudge: 0, stalled: 0 };
    allDone.forEach(x => { const k = verdictKey(x); if (c[k] != null) c[k]++; });
    document.querySelectorAll('.dchip .dc').forEach(el => el.textContent = c[el.dataset.c] || 0);
  }
  function renderDoneList() {
    const q = (document.getElementById('dsearch').value || '').toLowerCase().trim();
    const filtered = allDone.filter(c => (doneFilter === 'all' || verdictKey(c) === doneFilter) && (!q || nameOf(c).toLowerCase().includes(q)));
    if (!filtered.length) { setHtmlCached('done', `<div class="empty">${allDone.length ? 'No committees match this filter.' : 'No resolved committees yet.'}</div>`); return; }
    let html;
    if (groupBySession) {
      const groups = {};
      filtered.forEach(c => { const s = c.session || 'unassigned'; (groups[s] = groups[s] || []).push(c); });
      html = Object.entries(groups).sort((a, b) => b[1].length - a[1].length).map(([s, items]) =>
        `<div class="sess-head">${esc(s)} <span class="sc">${items.length}</span></div>` + items.map(committeeHtml).join('')).join('');
    } else {
      // pin the rare real decisions above the flood of verification checks
      const decisions = filtered.filter(c => c.type === 'decision');
      const checks = filtered.filter(c => c.type !== 'decision');
      html = (decisions.length ? `<div class="dgroup-label">Decisions</div>` + decisions.map(committeeHtml).join('') : '') +
             (checks.length ? (decisions.length ? `<div class="dgroup-label">Verification checks</div>` : '') + checks.map(committeeHtml).join('') : '');
    }
    setHtmlCached('done', html);
  }

  function renderVitals(s) {
    const age = ageSeconds(s.ts);
    const fdot = document.getElementById('fdot'), banner = document.getElementById('banner');
    if (age < 60) { fdot.className = 'fdot fresh'; banner.className = 'banner'; }
    else if (age < 300) { fdot.className = 'fdot lagging'; banner.className = 'banner'; }
    else { fdot.className = 'fdot paused'; banner.className = 'banner show'; banner.textContent = `The brain box has not reported for ${rel(age)}. It is likely paused or offline. Committees below are from the ledger and stay accurate.`; }
    document.getElementById('subline').innerHTML = `<span class="box">${esc(s.box || 'box')}</span> <span class="sub">· ${esc(s.uptime || '')} · ${age < 300 ? 'updated ' + rel(age) : 'last seen ' + rel(age)}</span>`;
    const svc = s.services || {}, entries = Object.entries(svc), down = entries.filter(([, v]) => !v).map(([k]) => k);
    const svcEl = document.getElementById('svc');
    if (down.length) { svcEl.hidden = false; document.getElementById('svctext').textContent = `${down.join(', ')} down`; } else svcEl.hidden = true;
    const load0 = Array.isArray(s.load) && s.load.length ? Number(s.load[0]) : 0, cores = Number(s.cores) || 1;
    const memPct = (s.mem && Number(s.mem.pct)) || 0, diskPct = parseInt(s.disk_pct, 10) || 0, agents = Number(s.live_agent_count) || 0;
    document.getElementById('vit').innerHTML =
      `<span class="${load0 / cores >= 1.8 ? 'crit' : load0 / cores >= 0.9 ? 'warn' : ''}">load <b>${load0.toFixed(2)}</b>/${cores}</span>` +
      `<span class="${memPct >= 85 ? 'crit' : memPct >= 70 ? 'warn' : ''}">mem <b>${memPct}%</b></span>` +
      `<span class="${diskPct >= 90 ? 'crit' : diskPct >= 80 ? 'warn' : ''}">disk <b>${esc(s.disk_pct || '?')}</b></span>` +
      `<span>${agents > 0 ? `<b>${agents}</b> agents` : (svc.monitor === true ? 'agents idle' : 'agents unknown')}</span>`;
  }
  function renderVitalsDown() {
    document.getElementById('fdot').className = 'fdot down';
    document.getElementById('subline').textContent = 'the brain box is not reporting';
    document.getElementById('svc').hidden = true; document.getElementById('vit').innerHTML = '';
  }

  // Honest summary. A bare "failed" count lied: it lumped real objections together with committees
  // whose reviewers never seated (broken judge) and with runs that died. Three different facts.
  function renderSummary(stats) {
    const d = (stats && stats.decision) || {}, e = (stats && stats.execution) || {};
    const sum = (k) => (d[k] || 0) + (e[k] || 0);
    const total = sum('total'), green = sum('green'), bad = sum('judged_bad'), nj = sum('could_not_judge'), died = sum('died');
    const tok = sum('tokens'), disk = sum('disk');
    const bits = [`<b>${total}</b> committees on record`];
    if (green) bits.push(`<span class="g">${green} passed</span>`);
    if (bad) bits.push(`<span class="r">${bad} found real defects</span>`);
    if (nj) bits.push(`<span class="a">${nj} could not judge</span>`);
    if (died) bits.push(`<span class="a">${died} died</span>`);
    if (tok) bits.push(fmtTokens(tok)); if (disk) bits.push(fmtBytes(disk) + ' on disk');
    document.getElementById('summ').innerHTML = bits.map(b => `<span>${b}</span>`).join('') +
      (nj ? `<span class="note">"could not judge" = the reviewers never seated, so that is a broken judge, not bad work</span>` : '');
  }

  function render(feed, workerCards) {
    const all = [].concat(Array.isArray(feed.decisions) ? feed.decisions : [], Array.isArray(feed.execution) ? feed.execution : [], Array.isArray(workerCards) ? workerCards : []);
    const seen = new Set(); const uniq = all.filter(c => c && c.id && !seen.has(c.id) && seen.add(c.id));
    const byUpdated = (a, b) => String(b.updated || '').localeCompare(String(a.updated || ''));
    const liveAll = uniq.filter(c => c.status === 'deciding');
    const live = liveAll.filter(c => !isStalled(c)).sort(byUpdated);        // only genuinely live
    const stalledLive = liveAll.filter(c => isStalled(c)).sort(byUpdated);  // dead: they go to Done as history
    const doneBase = uniq.filter(c => c.status === 'done' || (c.status !== 'deciding' && c.status !== 'planned' && c.status !== 'pending'));
    const done = doneBase.concat(stalledLive).sort(byUpdated);
    document.getElementById('cnt-live').textContent = live.length ? `${live.length} live` : 'idle';
    const totalDone = (feed.stats && feed.stats.execution && feed.stats.decision) ? (feed.stats.decision.total || 0) + (feed.stats.execution.total || 0) : done.length;
    document.getElementById('cnt-done').textContent = done.length < totalDone ? `${done.length} of ${totalDone}` : `${totalDone} total`;
    document.getElementById('livedot').className = live.length ? 'livedot on' : 'livedot';
    renderColumn('live', live, 'Nothing deliberating right now. Live committees surface here the moment one convenes.');
    allDone = done; updateDoneCounts(); renderDoneList();
    renderSummary(feed.stats);
  }

  async function fetchJson(url) { const r = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, { cache: 'no-store' }); if (!r.ok) throw new Error(String(r.status)); return r.json(); }
  async function tick() {
    const [bs, cf, wf] = await Promise.allSettled([fetchJson('/brain-status'), fetchJson('/committee-feed'), fetchJson('/worker-feed')]);
    if (bs.status === 'fulfilled' && bs.value && bs.value.box) renderVitals(bs.value); else renderVitalsDown();
    let workerCards = [];
    if (wf.status === 'fulfilled' && wf.value) {
      workerCards = [].concat(wf.value.running || [], wf.value.recent || []).map(workerToCard);
    }
    if (cf.status === 'fulfilled' && cf.value) render(cf.value, workerCards);
    postHeight();
  }
  function schedule() { clearTimeout(timer); if (!document.hidden) timer = setTimeout(loop, POLL_MS); }
  async function loop() { await tick(); schedule(); }
  document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(timer); else loop(); });
  window.addEventListener('resize', postHeight);
  bindOnce();
  loop();
</script>
</body>
</html>
