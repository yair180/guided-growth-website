<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brain Machine</title>
<link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
:root{color-scheme:light dark;--bg:#f5f6f8;--surface:#fff;--soft:#f0f2f5;--ink:#172033;--muted:#677386;--faint:#97a1b0;--line:#dfe4eb;--blue:#315fc6;--blue-bg:#e8efff;--green:#18794e;--green-bg:#e3f7eb;--amber:#985600;--amber-bg:#fff1d7;--red:#b42318;--red-bg:#fee9e7;--purple:#7342ac;--purple-bg:#f1eafa;--cool:#176c9c;--cool-bg:#e0f2fb;--neutral:#4d5a6a;--neutral-bg:#edf0f4;--hot:#a53e22;--hot-bg:#fce8e0;--shadow:0 16px 48px rgb(24 35 55/.16);--sans:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--bg:#0d121b;--surface:#151d29;--soft:#101824;--ink:#eef3fa;--muted:#9aa8ba;--faint:#6c798b;--line:#2a3647;--blue:#9ebcff;--blue-bg:#192d59;--green:#67d89c;--green-bg:#123923;--amber:#f6c66e;--amber-bg:#3b2b0d;--red:#ff9990;--red-bg:#421b1b;--purple:#d2b6ff;--purple-bg:#33204e;--cool:#78d1ff;--cool-bg:#0f3247;--neutral:#c2cbd6;--neutral-bg:#263240;--hot:#ffaf91;--hot-bg:#49231a;--shadow:0 16px 48px rgb(0 0 0/.38)}}
html[data-theme="dark"]{--bg:#0d121b;--surface:#151d29;--soft:#101824;--ink:#eef3fa;--muted:#9aa8ba;--faint:#6c798b;--line:#2a3647;--blue:#9ebcff;--blue-bg:#192d59;--green:#67d89c;--green-bg:#123923;--amber:#f6c66e;--amber-bg:#3b2b0d;--red:#ff9990;--red-bg:#421b1b;--purple:#d2b6ff;--purple-bg:#33204e;--cool:#78d1ff;--cool-bg:#0f3247;--neutral:#c2cbd6;--neutral-bg:#263240;--hot:#ffaf91;--hot-bg:#49231a;--shadow:0 16px 48px rgb(0 0 0/.38)}
html[data-theme="light"]{--bg:#f5f6f8;--surface:#fff;--soft:#f0f2f5;--ink:#172033;--muted:#677386;--faint:#97a1b0;--line:#dfe4eb;--blue:#315fc6;--blue-bg:#e8efff;--green:#18794e;--green-bg:#e3f7eb;--amber:#985600;--amber-bg:#fff1d7;--red:#b42318;--red-bg:#fee9e7;--purple:#7342ac;--purple-bg:#f1eafa;--cool:#176c9c;--cool-bg:#e0f2fb;--neutral:#4d5a6a;--neutral-bg:#edf0f4;--hot:#a53e22;--hot-bg:#fce8e0}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.5 var(--sans);-webkit-font-smoothing:antialiased}button,input{font:inherit}button{color:inherit}button:focus-visible,input:focus-visible{outline:3px solid var(--blue);outline-offset:2px}.app{max-width:1180px;margin:auto;padding:32px 28px 80px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:26px}.eyebrow{margin:0 0 5px;color:var(--blue);font:700 11px/1 var(--mono);letter-spacing:.12em}.topbar h1{margin:0;font-size:30px;letter-spacing:-.035em;line-height:1.08}.status{padding-top:5px;color:var(--muted);font-size:13px;text-align:right}.status b{color:var(--ink);font-weight:650}.controls{position:sticky;top:0;z-index:4;display:flex;flex-wrap:wrap;align-items:center;gap:10px;padding:13px 0;margin:0 0 26px;background:linear-gradient(var(--bg) 78%,transparent)}.search{min-width:230px;flex:1 1 300px;position:relative}.search input{width:100%;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--ink);padding:10px 12px 10px 35px}.search:before{content:"⌕";position:absolute;left:12px;top:7px;color:var(--muted);font-size:19px}.filter-group{display:flex;gap:5px;flex-wrap:wrap}.filter,.action{border:1px solid var(--line);border-radius:8px;background:var(--surface);cursor:pointer;padding:8px 10px;color:var(--muted);font-size:12px;font-weight:650}.filter[aria-pressed="true"]{border-color:var(--blue);background:var(--blue-bg);color:var(--blue)}.action{color:var(--ink)}.action:hover,.filter:hover{border-color:var(--blue)}.section-heading{display:flex;justify-content:space-between;align-items:baseline;gap:15px;margin:0 0 11px}.section-heading h2{margin:0;font-size:13px;letter-spacing:.1em;text-transform:uppercase}.section-heading span{color:var(--muted);font-size:12px}.needs{padding:18px 19px 8px;border:1px solid color-mix(in srgb,var(--amber) 35%,var(--line));border-radius:14px;background:linear-gradient(135deg,var(--amber-bg),var(--surface) 70%);box-shadow:0 2px 0 rgb(0 0 0/.02);margin-bottom:30px}.needs .section-heading h2{color:var(--amber)}.need-list{display:grid;gap:0}.need{width:100%;border:0;border-top:1px solid color-mix(in srgb,var(--amber) 25%,var(--line));background:transparent;display:grid;grid-template-columns:10px minmax(0,1fr) auto;align-items:center;gap:11px;padding:13px 0;text-align:left;cursor:pointer}.need:first-child{border-top:0;padding-top:2px}.need-title{font-size:16px;font-weight:650;line-height:1.25}.need-meta{margin-top:2px;color:var(--muted);font-size:12px}.need-flag{font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--amber);text-transform:uppercase}.stream{position:relative;padding-left:28px}.stream:before{content:"";position:absolute;top:7px;bottom:8px;left:7px;width:1px;background:var(--line)}.timeline{display:grid;gap:5px}.entry{position:relative;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;width:100%;border:1px solid transparent;border-radius:10px;background:transparent;text-align:left;cursor:pointer;padding:12px 12px 12px 0;transition:background .15s,border-color .15s}.entry:hover,.entry.active{border-color:var(--line);background:var(--surface);padding-left:12px;margin-left:-12px}.dot{position:absolute;left:-26px;top:19px;width:11px;height:11px;border:2px solid var(--bg);border-radius:50%;background:var(--gray,var(--faint));box-shadow:0 0 0 1px var(--line)}.dot.worker{background:var(--blue)}.dot.committee{background:var(--purple)}.dot.plan{background:var(--green)}.entry-main{min-width:0}.entry-line{display:flex;align-items:center;gap:9px;min-width:0}.kind{flex:none;color:var(--muted);font:700 10px/1 var(--mono);letter-spacing:.08em}.entry-title{min-width:0;font-size:16px;font-weight:630;line-height:1.25;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.entry-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-top:4px;color:var(--muted);font-size:12px}.timestamp{align-self:center;color:var(--muted);font:12px/1 var(--mono);white-space:nowrap}.chip,.badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 7px;font:700 10px/1.15 var(--mono);letter-spacing:.015em;white-space:nowrap}.chip.cool{color:var(--cool);background:var(--cool-bg)}.chip.neutral{color:var(--neutral);background:var(--neutral-bg)}.chip.hot{color:var(--hot);background:var(--hot-bg)}.badge{color:var(--blue);background:var(--blue-bg)}.badge.done{color:var(--green);background:var(--green-bg)}.badge.blocked,.badge.failed{color:var(--red);background:var(--red-bg)}.badge.waiting{color:var(--amber);background:var(--amber-bg)}.empty,.unavailable{border:1px dashed var(--line);border-radius:10px;color:var(--muted);padding:18px;background:var(--surface)}.unavailable{font-size:12px;padding:9px 11px;margin:0 0 10px}.backdrop{position:fixed;inset:0;z-index:9;background:rgb(5 10 20/.38);opacity:0;visibility:hidden;transition:.2s}.backdrop.open{opacity:1;visibility:visible}.drawer{position:fixed;z-index:10;right:0;top:0;bottom:0;width:min(720px,100vw);background:var(--surface);border-left:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(103%);transition:transform .22s ease;display:flex;flex-direction:column}.drawer.open{transform:translateX(0)}.drawer-head{display:flex;gap:14px;align-items:flex-start;justify-content:space-between;padding:27px 30px 20px;border-bottom:1px solid var(--line)}.drawer-kicker{margin:0 0 6px;color:var(--blue);font:700 11px/1 var(--mono);letter-spacing:.1em}.drawer h2{margin:0;font-size:25px;line-height:1.17;letter-spacing:-.03em}.close{flex:none;width:34px;height:34px;border:1px solid var(--line);border-radius:8px;background:var(--surface);cursor:pointer;font-size:23px;line-height:1}.drawer-body{overflow:auto;padding:23px 30px 54px}.detail-meta{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px}.detail-block{border-top:1px solid var(--line);padding:17px 0}.detail-block h3{margin:0 0 8px;font-size:12px;letter-spacing:.09em;text-transform:uppercase}.detail-block p{margin:0;color:var(--ink);font-size:15px}.facts{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.fact{padding:11px;border-radius:9px;background:var(--soft)}.fact span{display:block;color:var(--muted);font-size:11px}.fact strong{display:block;margin-top:2px;font-size:14px;overflow-wrap:anywhere}.accordion{border:1px solid var(--line);border-radius:10px;margin:8px 0;background:var(--surface);overflow:hidden}.accordion summary{display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;padding:12px 13px;font-weight:650;list-style:none}.accordion summary::-webkit-details-marker{display:none}.accordion summary:after{content:"+";color:var(--muted);font-size:20px;font-weight:400}.accordion[open] summary:after{content:"−"}.accordion-content{padding:0 13px 14px;color:var(--muted)}.member{width:100%;border:0;border-top:1px solid var(--line);background:transparent;color:var(--ink);text-align:left;cursor:pointer;padding:11px 0}.member:first-child{border-top:0}.member-top{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.member-comment{display:none;margin-top:7px;color:var(--muted);white-space:pre-wrap}.member.open .member-comment{display:block}.plan-intro{font-size:16px!important;line-height:1.6}.rollup{display:flex;gap:7px;flex-wrap:wrap}.phase summary{font-size:16px}.steps{display:grid;gap:9px}.step{display:grid;grid-template-columns:auto minmax(0,1fr);gap:9px;align-items:start;padding:10px 0;border-top:1px solid var(--line)}.step:first-child{border-top:0}.step-name{font-weight:650;line-height:1.35}.step-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}.substeps{grid-column:2;display:grid;gap:6px;margin-top:2px;padding-left:11px;border-left:2px solid var(--line)}.substep{font-size:13px;color:var(--muted)}.plan-controls{display:flex;gap:8px;margin:0 0 10px}.placeholder{border:1px dashed var(--line);border-radius:10px;padding:16px;color:var(--muted);background:var(--soft)}.drawer-empty{text-align:center;padding:80px 20px;color:var(--muted)}.drawer-empty h2{font-size:22px;color:var(--ink);margin-bottom:8px}@media(max-width:620px){.app{padding:22px 16px 60px}.topbar{margin-bottom:18px}.topbar h1{font-size:26px}.status{display:none}.controls{gap:7px}.search{flex-basis:100%}.filter,.action{padding:7px 8px}.entry{grid-template-columns:minmax(0,1fr);gap:4px}.timestamp{margin-left:0}.drawer-head,.drawer-body{padding-left:20px;padding-right:20px}.facts{grid-template-columns:1fr}.need{grid-template-columns:10px minmax(0,1fr)}}
</style>
</head>
<body>
<main class="app">
  <header class="topbar"><div><p class="eyebrow">LIVE OPERATIONAL TIMELINE</p><h1>Brain machine</h1></div><div class="status" id="status">Loading feeds</div></header>
  <div class="controls" aria-label="Timeline controls">
    <label class="search"><input id="search" type="search" autocomplete="off" placeholder="Search the timeline"></label>
    <div class="filter-group" aria-label="Type filters"><button class="filter" data-type="worker" aria-pressed="true">WORKER</button><button class="filter" data-type="committee" aria-pressed="true">COMMITTEE</button><button class="filter" data-type="plan" aria-pressed="true">PLAN</button></div>
    <div class="filter-group" aria-label="State filter"><button class="filter" data-state="all" aria-pressed="true">ALL</button><button class="filter" data-state="live" aria-pressed="false">LIVE</button><button class="filter" data-state="done" aria-pressed="false">DONE</button><button class="filter" data-state="needs-you" aria-pressed="false">NEEDS YOU</button></div>
    <button class="action" id="expand">EXPAND ALL</button><button class="action" id="collapse">COLLAPSE ALL</button>
  </div>
  <section class="needs" aria-labelledby="needsTitle"><div class="section-heading"><h2 id="needsTitle">Needs you</h2><span id="needsCount">0 calls awaiting you</span></div><div class="need-list" id="needsList"></div></section>
  <section aria-labelledby="timelineTitle"><div class="section-heading"><h2 id="timelineTitle">Timeline</h2><span id="timelineCount"></span></div><div id="notices"></div><div class="stream"><div class="timeline" id="timeline"></div></div></section>
</main>
<div class="backdrop" id="backdrop"></div>
<aside class="drawer" id="drawer" aria-label="Timeline item detail" aria-hidden="true"><header class="drawer-head"><div><p class="drawer-kicker" id="drawerKicker">DETAIL</p><h2 id="drawerTitle">Select an item</h2></div><button class="close" id="closeDrawer" aria-label="Close detail">×</button></header><div class="drawer-body" id="drawerBody"><div class="drawer-empty"><h2>Timeline detail</h2><p>Choose any item to open its full context.</p></div></div></aside>
<script>
(() => {
  const feeds = { status: null, committees: null, workers: null, plans: null };
  const failed = new Set(); let entries = []; let needs = []; let activeId = null;
  const filterState = { types: new Set(['worker','committee','plan']), state: 'all', query: '' };
  const $ = id => document.getElementById(id);
  const esc = value => String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
  const asArray = value => Array.isArray(value) ? value : [];
  const dateMs = value => { const result = Date.parse(value || ''); return Number.isFinite(result) ? result : 0; };
  const relative = value => { const seconds = Math.max(0, Math.floor((Date.now() - dateMs(value)) / 1000)); if (!dateMs(value)) return 'time unknown'; if (seconds < 45) return 'just now'; if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`; return `${Math.floor(seconds / 86400)}d ago`; };
  const elapsed = value => { if (!dateMs(value)) return 'unknown'; const seconds = Math.max(0, Math.floor((Date.now() - dateMs(value)) / 1000)); if (seconds < 3600) return `${Math.floor(seconds / 60)}m`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor(seconds % 3600 / 60)}m`; return `${Math.floor(seconds / 86400)}d ${Math.floor(seconds % 86400 / 3600)}h`; };
  const heat = effort => effort === 'low' ? 'cool' : effort === 'high' ? 'hot' : 'neutral';
  const chip = (model, effort) => model ? `<span class="chip ${heat(effort)}">${esc(model)}${effort ? ` @ ${esc(effort)}` : ''}</span>` : '';
  const badge = value => { const name = String(value || 'unknown').replace(/_/g,' '); const state = /done|green|passed/.test(name) ? 'done' : /block|fail|bad|died/.test(name) ? 'blocked' : /wait|todo|stalled|could/.test(name) ? 'waiting' : ''; return `<span class="badge ${state}">${esc(name)}</span>`; };
  const titleForNode = node => node.name || node.action || 'Plan step';
  function walkNodes(nodes, callback, depth = 0) { asArray(nodes).forEach(node => { callback(node, depth); walkNodes(node.steps, callback, depth + 1); }); }
  function planSummary(plan) { const first = asArray(plan.stages)[0]; return plan.summary || plan.description || plan.phase || (first && (first.action || first.name)) || 'Execution plan'; }
  function planRollup(plan) { const counts = {ai:0,human:0,mix:0}; walkNodes(plan.stages, node => { if (counts[node.actor] !== undefined) counts[node.actor]++; }); return counts; }
  function isStrategic(committee) { return /strategic|gate|decision|direction|approve|approval/i.test(`${committee.name || ''} ${committee.description || ''}`); }
  function makeData() {
    entries = []; needs = [];
    const workers = [...asArray(feeds.workers && feeds.workers.running), ...asArray(feeds.workers && feeds.workers.recent)];
    workers.forEach((worker, index) => entries.push({ id:`worker-${worker.session || worker.label || index}-${worker.updated || worker.started || index}`, type:'worker', title:worker.label || 'Unnamed worker', session:worker.session, model:worker.model, effort:worker.effort, time:worker.updated || worker.started, state:worker.state || 'unknown', source:worker }));
    const committees = [...asArray(feeds.committees && feeds.committees.decisions), ...asArray(feeds.committees && feeds.committees.execution)];
    committees.forEach((committee, index) => { const item = { id:`committee-${committee.session || committee.name || index}-${committee.updated || committee.created || index}`, type:'committee', title:committee.name || 'Committee', session:committee.session, model:null, effort:null, time:committee.updated || committee.created, state:committee.status === 'deciding' ? 'live' : committee.status === 'done' ? 'done' : committee.status || 'unknown', source:committee }; entries.push(item); if (committee.judgement === 'died') needs.push({ id:item.id, type:'committee', flag:'Recovered hang', title:committee.name || 'Committee recovery', text:'A committee died and needs a recovery decision.', source:item.source }); else if (isStrategic(committee) && committee.status !== 'done') needs.push({ id:item.id, type:'committee', flag:'Strategic gate', title:committee.name || 'Strategic committee', text:committee.description || 'Strategic judgement is needed.', source:item.source }); });
    asArray(feeds.plans && feeds.plans.plans).forEach((plan, index) => { const base = { id:`plan-${plan.id || plan.session || plan.name || index}`, type:'plan', title:plan.name || 'Execution plan', session:plan.session, model:plan.author_model, effort:plan.author_effort, time:plan.updated || plan.created || plan.started, state:plan.status === 'done' ? 'done' : plan.status === 'live' ? 'live' : 'planned', source:plan }; entries.push(base); walkNodes(plan.stages, node => { const state = node.progress || node.status || 'todo'; const current = state === 'doing' || state === 'live'; entries.push({ id:`${base.id}-node-${node.id || node.name || node.action || Math.random()}`, type:'plan', title:`${plan.name || 'Plan'}: ${titleForNode(node)}`, session:plan.session, model:node.model || plan.author_model, effort:node.effort || plan.author_effort, time:node.updated || plan.updated || plan.created, state:current ? 'live' : /done|complete/.test(state) ? 'done' : state, source:plan, node }); if (node.actor === 'human' && state === 'todo') needs.push({ id:`${base.id}-need-${node.id || node.name || node.action}`, type:'plan', flag:'Human decision', title:titleForNode(node), text:`${plan.name || 'Execution plan'} · ${node.action || node.name || 'Decision required'}`, source:plan, node }); }); });
    entries.sort((a,b) => dateMs(b.time) - dateMs(a.time));
  }
  function matches(item) { const haystack = `${item.type} ${item.title} ${item.session || ''} ${item.state || ''} ${item.model || ''}`.toLowerCase(); const state = String(item.state || '').toLowerCase(); const live = /^(live|running|deciding|doing)$/.test(state); const done = /^(done|complete|completed)$/.test(state); const stateOk = filterState.state === 'all' || (filterState.state === 'live' && live) || (filterState.state === 'done' && done) || (filterState.state === 'needs-you' && needs.some(need => need.id === item.id || (need.source === item.source && (!need.node || need.node === item.node)))); return filterState.types.has(item.type) && stateOk && (!filterState.query || haystack.includes(filterState.query)); }
  function render() { renderHeader(); renderNotices(); renderNeeds(); renderTimeline(); }
  function renderHeader() { const status = feeds.status; if (!status) { $('status').innerHTML = '<b>Box vitals unavailable</b>'; return; } const load = Array.isArray(status.load) ? status.load[0] : status.load; const update = status.ts ? ` · updated ${relative(status.ts)}` : ''; $('status').innerHTML = `<b>${esc(status.box || 'Box')}</b>${load !== undefined ? ` · load ${esc(load)}` : ''}${status.disk_pct ? ` · disk ${esc(status.disk_pct)}` : ''}${status.live_agent_count !== undefined ? ` · ${esc(status.live_agent_count)} live` : ''}${update}`; }
  function renderNotices() { const labels = {status:'Brain status',committees:'Committee',workers:'Worker',plans:'Execution plan'}; $('notices').innerHTML = [...failed].map(key => `<div class="unavailable">${labels[key]} feed unavailable. Other timeline items remain live.</div>`).join(''); }
  function renderNeeds() { $('needsCount').textContent = needs.length ? `${needs.length} call${needs.length === 1 ? '' : 's'} awaiting you` : 'No calls awaiting you'; $('needsList').innerHTML = needs.length ? needs.map(need => `<button class="need" data-open="${esc(need.id)}"><span class="dot ${need.type}"></span><span><span class="need-flag">${esc(need.flag)}</span><span class="need-title">${esc(need.title)}</span><span class="need-meta">${esc(need.text)}</span></span><span class="timestamp">Open</span></button>`).join('') : '<div class="empty">Nothing needs a human decision right now.</div>'; }
  function renderTimeline() { const filtered = entries.filter(matches); $('timelineCount').textContent = filtered.length ? `${filtered.length} item${filtered.length === 1 ? '' : 's'}` : ''; $('timeline').innerHTML = filtered.length ? filtered.map(item => `<button class="entry${activeId === item.id ? ' active' : ''}" data-open="${esc(item.id)}"><span class="dot ${item.type}"></span><span class="entry-main"><span class="entry-line"><span class="kind">${item.type.toUpperCase()}</span><span class="entry-title">${esc(item.title)}</span></span><span class="entry-meta">${item.session ? `<span>${esc(item.session)}</span>` : ''}${chip(item.model,item.effort)}${badge(item.state)}</span></span><span class="timestamp">${relative(item.time)}</span></button>`).join('') : '<div class="empty">No timeline items match these controls. Adjust the filters or wait for live feeds.</div>'; }
  function findItem(id) { return entries.find(item => item.id === id) || needs.find(item => item.id === id); }
  function facts(rows) { return `<div class="facts">${rows.map(([key,value]) => `<div class="fact"><span>${esc(key)}</span><strong>${value || 'Unknown'}</strong></div>`).join('')}</div>`; }
  function sourceSlot() { return '<section class="detail-block"><h3>Source document</h3><!-- GitLab preview + comments mount here (next phase) --><div class="placeholder">GitLab preview + comments mount here (next phase)</div></section>'; }
  function workerDetail(item) { const worker = item.source; return `<div class="detail-meta">${chip(worker.model,worker.effort)}${badge(worker.state)}</div><section class="detail-block"><h3>What it is doing</h3><p>${esc(worker.label || 'No task label reported.')}</p></section><section class="detail-block"><h3>Worker context</h3>${facts([['State',esc(worker.state || 'unknown')],['Host',esc(worker.host || 'unknown')],['Started',worker.started ? `${esc(new Date(worker.started).toLocaleString())} · ${esc(elapsed(worker.started))}` : 'Unknown'],['Last update',worker.updated ? `${esc(relative(worker.updated))}` : 'Unknown']])}</section>${sourceSlot()}`; }
  function committeeDetail(item) { const committee = item.source; const members = asArray(committee.rounds).flatMap(round => asArray(round.members)); const honest = {green:'Green',judged_bad:'Real defects',could_not_judge:'Could not judge',died:'Died',deciding:'Deciding'}[committee.judgement] || committee.judgement || committee.status || 'Unknown'; return `<div class="detail-meta">${badge(honest)}${badge(committee.status || 'unknown')}</div><section class="detail-block"><h3>Description</h3><p>${esc(committee.description || 'No committee description reported.')}</p></section><section class="detail-block"><h3>Honest judgement</h3><p>${esc(honest)}</p></section><section class="detail-block"><h3>Members</h3><div class="accordion"><details open><summary>${members.length} member${members.length === 1 ? '' : 's'} across reported rounds</summary><div class="accordion-content">${members.length ? members.map((member,index) => `<button class="member" data-member="${index}"><span class="member-top"><strong>${esc(member.role || 'Member')}</strong>${chip(member.role,member.effort)}${badge(member.verdict || 'no verdict')}</span><span class="member-comment">${esc(member.comment || member.does || 'No comment reported.')}</span></button>`).join('') : '<p>No member comments reported.</p>'}</div></details></div></section>${sourceSlot()}`; }
  function stepMarkup(node) { const actor = node.actor || 'ai'; const children = asArray(node.steps); return `<div class="step"><span class="badge ${actor === 'human' ? 'waiting' : ''}">${esc(actor)}</span><div><div class="step-name">${esc(titleForNode(node))}</div><div class="step-meta">${badge(node.progress || node.status || 'todo')}${actor === 'ai' ? chip(node.model,node.effort) : ''}${node.committee ? '<span class="badge">COMMITTEE</span>' : ''}</div>${node.action && node.action !== node.name ? `<div class="substep">${esc(node.action)}</div>` : ''}</div>${children.length ? `<div class="substeps">${children.map(child => `<div class="substep">${badge(child.actor || 'ai')} <strong>${esc(titleForNode(child))}</strong> ${badge(child.progress || child.status || 'todo')} ${child.actor === 'ai' ? chip(child.model,child.effort) : ''}${child.committee ? ' <span class="badge">COMMITTEE</span>' : ''}</div>`).join('')}</div>` : ''}</div>`; }
  function planDetail(item) { const plan = item.source; const counts = planRollup(plan); const phases = asArray(plan.stages); return `<div class="detail-meta">${chip(plan.author_model,plan.author_effort)}${badge(plan.status || 'planned')}</div><section class="detail-block"><h3>Plan summary</h3><p class="plan-intro">${esc(planSummary(plan))}</p></section><section class="detail-block"><h3>Author</h3><p>${chip(plan.author_model,plan.author_effort) || 'Not reported'}</p></section><section class="detail-block"><h3>Actor rollup</h3><div class="rollup"><span class="badge">AI ${counts.ai}</span><span class="badge waiting">HUMAN ${counts.human}</span><span class="badge">MIX ${counts.mix}</span></div></section><section class="detail-block"><div class="section-heading"><h3>Phases</h3><div class="plan-controls"><button class="action" data-plan-expand>EXPAND ALL</button><button class="action" data-plan-collapse>COLLAPSE ALL</button></div></div>${phases.length ? phases.map((phase,index) => `<div class="accordion phase"><details ${index === 0 ? 'open' : ''}><summary><span>${esc(phase.name || phase.action || `Phase ${index + 1}`)}</span>${badge(phase.progress || phase.status || 'todo')}</summary><div class="accordion-content"><div class="steps">${asArray(phase.steps).length ? asArray(phase.steps).map(stepMarkup).join('') : stepMarkup(phase)}</div></div></details></div>`).join('') : '<div class="empty">This plan has no phases reported yet.</div>'}</section>${sourceSlot()}`; }
  function openDetail(id) { const item = findItem(id); if (!item) return; activeId = id; $('drawerKicker').textContent = `${item.type.toUpperCase()} DETAIL`; $('drawerTitle').textContent = item.title; $('drawerBody').innerHTML = item.type === 'worker' ? workerDetail(item) : item.type === 'committee' ? committeeDetail(item) : planDetail(item); $('drawer').classList.add('open'); $('backdrop').classList.add('open'); $('drawer').setAttribute('aria-hidden','false'); renderTimeline(); }
  function closeDetail() { activeId = null; $('drawer').classList.remove('open'); $('backdrop').classList.remove('open'); $('drawer').setAttribute('aria-hidden','true'); renderTimeline(); }
  async function fetchJson(url) { const response = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, {cache:'no-store'}); if (!response.ok) throw new Error(String(response.status)); return response.json(); }
  async function refresh() { if (document.hidden) return; const [status, committees, workers, plans] = await Promise.allSettled([fetchJson('/brain-status'),fetchJson('/committee-feed'),fetchJson('/builder-feed'),fetchJson('/exec-plan-feed')]); [[status,'status'],[committees,'committees'],[workers,'workers'],[plans,'plans']].forEach(([result,key]) => { if (result.status === 'fulfilled') { feeds[key] = result.value; failed.delete(key); } else failed.add(key); }); makeData(); render(); }
  document.addEventListener('click', event => { const opener = event.target.closest('[data-open]'); if (opener) openDetail(opener.dataset.open); const member = event.target.closest('[data-member]'); if (member) member.classList.toggle('open'); if (event.target.closest('[data-plan-expand]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => detail.open = true); if (event.target.closest('[data-plan-collapse]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => detail.open = false); });
  $('closeDrawer').addEventListener('click', closeDetail); $('backdrop').addEventListener('click', closeDetail); document.addEventListener('keydown', event => { if (event.key === 'Escape') closeDetail(); });
  $('search').addEventListener('input', event => { filterState.query = event.target.value.trim().toLowerCase(); renderTimeline(); });
  document.querySelectorAll('[data-type]').forEach(button => button.addEventListener('click', () => { const type = button.dataset.type; filterState.types.has(type) ? filterState.types.delete(type) : filterState.types.add(type); button.setAttribute('aria-pressed', String(filterState.types.has(type))); renderTimeline(); }));
  document.querySelectorAll('[data-state]').forEach(button => button.addEventListener('click', () => { filterState.state = button.dataset.state; document.querySelectorAll('[data-state]').forEach(other => other.setAttribute('aria-pressed', String(other === button))); renderTimeline(); }));
  $('expand').addEventListener('click', () => $('drawerBody').querySelectorAll('details').forEach(detail => detail.open = true)); $('collapse').addEventListener('click', () => $('drawerBody').querySelectorAll('details').forEach(detail => detail.open = false));
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
  refresh(); setInterval(refresh, 6000);
})();
</script>
</body>
