<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Command Center - design options</title><link rel="icon" type="image/svg+xml" href="/logo.svg">
<style>
:root{--bg:#f7f8fa;--panel:#fff;--ink:#1c2430;--muted:#6a7484;--line:#e4e8ef;--blue:#2456c7;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--bg:#10151d;--panel:#161c26;--ink:#edf2f8;--muted:#8b97a8;--line:#2a3441;--blue:#8db2ff}}
html[data-theme=dark]{--bg:#10151d;--panel:#161c26;--ink:#edf2f8;--muted:#8b97a8;--line:#2a3441;--blue:#8db2ff}
*{box-sizing:border-box}html,body{margin:0;height:100%}body{background:var(--bg);color:var(--ink);font:14px/1.4 var(--sans);display:flex;flex-direction:column}
.bar{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
.bar .t{font-weight:700;font-size:13px;margin-right:6px}.bar .hint{color:var(--muted);font-size:11.5px;margin-left:auto}
.chip{font:inherit;font-size:12.5px;font-weight:600;color:var(--muted);background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:5px 14px;cursor:pointer}
.chip:hover{border-color:var(--blue);color:var(--blue)}.chip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
iframe{flex:1;width:100%;border:0;background:var(--bg)}
</style></head><body>
<div class="bar"><span class="t">Command Center design options</span>
<button class="chip on" data-v="quiet-ledger">Quiet Ledger</button>
<button class="chip" data-v="signal-grid">Signal Grid</button>
<button class="chip" data-v="human-relay">Human Relay</button>
<span class="hint">pick the design you want, then it becomes the board</span></div>
<iframe id="f" title="design option"></iframe>
<script>
var ut=new URLSearchParams(location.search).get('theme');if(ut==='dark'||ut==='light')document.documentElement.dataset.theme=ut;
var tq=ut?('?theme='+ut):'';var f=document.getElementById('f');
function show(v){f.src='/internal/cc-v2-'+v+'/'+tq;document.querySelectorAll('.chip').forEach(function(c){c.classList.toggle('on',c.dataset.v===v)});location.hash=v}
document.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){show(c.dataset.v)})});
show((location.hash||'#quiet-ledger').slice(1));
</script></body></html>
