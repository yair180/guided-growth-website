;walkNodes(plan.stages,node=>{const state=node.progress||node.status||'todo';const current=state==='doing'||state==='live';entries.push({id:`${base.id}-node-${node.id||node.name||node.action||Math.random()}`,type:'plan',title:`${plan.name||'Plan'}: ${titleForNode(node)}`,session:plan.session,model:node.model||plan.author_model,effort:node.effort||plan.author_effort,time:node.updated||plan.updated||plan.created,state:current?'live':/done|complete/.test(state)?'done':state,source:plan,node});if(node.actor==='human'&&state==='todo')needs.push({id:`${base.id}-need-${node.id||node.name||node.action}`,type:'plan',flag:'Human decision',title:titleForNode(node),text:`${plan.name||'Execution plan'} · ${node.action||node.name||'Decision required'}`,session:plan.session,time:node.updated||plan.updated,node,source:plan})})});entries.sort((a,b)=>dateMs(b.time)-dateMs(a.time))}
  function matches(item){const haystack=`${item.type} ${item.title} ${item.session||''} ${item.state||''} ${item.model||''}`.toLowerCase();const state=String(item.state||'').toLowerCase();const live=/^(live|running|deciding|doing)$/.test(state);const done=/^(done|complete|completed)$/.test(state);const stateOk=filterState.state==='all'||(filterState.state==='live'&&live)||(filterState.state==='done'&&done)||(filterState.state==='needs-you'&&needs.some(need=>need.id===item.id||(need.source===item.source&&(!need.node||need.node===item.node))));return filterState.types.has(item.type)&&stateOk&&(!filterState.query||haystack.includes(filterState.query))}
  function render(){renderHeader();renderNotices();renderNeeds();renderTimeline();renderNewActivity()} function renderHeader(){const status=feeds.status;if(!status){$('status').innerHTML='<b>Box vitals unavailable</b>';return}const load=Array.isArray(status.load)?status.load[0]:status.load;const update=status.ts?` · updated ${relative(status.ts)}`:'';$('status').innerHTML=`<b>${esc(status.box||'Box')}</b>${load!==undefined?` · load ${esc(load)}`:''}${status.disk_pct?` · disk ${esc(status.disk_pct)}`:''}${status.live_agent_count!==undefined?` · ${esc(status.live_agent_count)} live`:''}${update}`} function renderNotices(){const labels={status:'Brain status',committees:'Committee',workers:'Worker',plans:'Execution plan'};$('notices').innerHTML=[...failed].map(key=>`<div class="unavailable">! ${labels[key]} feed unavailable. Other timeline items remain live.</div>`).join('')}
  function renderNeeds(){$('needsCount').textContent=needs.length?`${needs.length} call${needs.length===1?'':'s'} awaiting you`:'No calls awaiting you';$('needsList').innerHTML=needs.length?needs.map(need=>`<button class="need" type="button" data-open="${esc(need.id)}"><span><span class="need-flag">◆ ${esc(need.flag)}</span><span class="need-title">${esc(need.title)}</span></span><span class="need-reason">${esc(need.text)}</span><span class="need-session">${esc(need.session||'session unknown')}</span><span class="need-age">${esc(relative(need.time))}</span></button>`).join(''):'<div class="empty">Nothing needs a human decision right now.</div>'}
  function renderNewActivity(){const button=$('newActivity');const count=pendingEntries.length;button.hidden=!count;button.textContent=`${count} new activit${count===1?'y':'ies'}`;button.setAttribute('aria-label',`${count} new activity item${count===1?'':'s'} available. Show new activity.`)} const abbreviations={worker:'WK',committee:'CM',plan:'PL'};function renderTimeline(){const filtered=entries.filter(matches);$('timelineCount').textContent=filtered.length?`${filtered.length} item${filtered.length===1?'':'s'}`:'No matching activity';$('timeline').innerHTML=filtered.length?filtered.map(item=>`<button class="entry${activeId===item.id?' active':''}" type="button" data-open="${esc(item.id)}"><span class="entry-type"><span class="type-tile ${item.type}" aria-label="${esc(item.type)}">${abbreviations[item.type]}</span></span><span class="entry-title-wrap" data-session="${esc(item.session||'session unknown')}"><span class="entry-title">${esc(item.title)}</span></span><span class="entry-session">${esc(item.session||'session unknown')}</span><span class="entry-model">${chip(item.model,item.effort)||'<span class="meta">not reported</span>'}</span><span class="entry-state">${badge(item.state)}</span><span class="entry-time">${esc(relative(item.time))}</span></button>`).join(''):'<div class="empty">No timeline activity matches these filters.</div>'}
  function facts(rows){return`<dl class="facts">${rows.map(([key,value])=>`<div><dt>${esc(key)}</dt><dd>${value}</dd></div>`).join('')}</dl>`} function sourceSlot(){return'<section class="detail-block source-slot" aria-labelledby="sourceHeading"><h3 id="sourceHeading">Source document</h3><p>Issue preview, comment thread, and composer appear here when the source integration is available.</p></section>'} function workerDetail(item){const worker=item.source;return`<div class="detail-meta">${chip(worker.model,worker.effort)}${badge(worker.state)}</div><section class="detail-block"><h3>What it is doing</h3><p>${esc(worker.label||'No task label reported.')}</p></section><section class="detail-block"><h3>Worker context</h3>${facts([['State',esc(worker.state||'unknown')],['Host',esc(worker.host||'unknown')],['Started',worker.started?`${esc(new Date(worker.started).toLocaleString())} · ${esc(elapsed(worker.started))}`:'Unknown'],['Last update',worker.updated?esc(relative(worker.updated)):'Unknown']])}</section>${sourceSlot()}`}
  function committeeDetail(item){const committee=item.source;const members=asArray(committee.rounds).flatMap(round=>asArray(round.members));const honest={green:'Green',judged_bad:'Real defects',could_not_judge:'Could not judge',died:'Died',deciding:'Deciding'}[committee.judgement]||committee.judgement||committee.status||'Unknown';return`<div class="detail-meta">${badge(honest)}${badge(committee.status||'unknown')}</div><section class="detail-block"><h3>Description</h3><p>${esc(committee.description||'No committee description reported.')}</p></section><section class="detail-block"><h3>Honest judgement</h3><p>${esc(honest)}</p></section><section class="detail-block"><h3>Members</h3><div class="accordion">${members.length?members.map((member,index)=>`<button class="member" type="button" data-member="${index}" aria-expanded="false"><span class="member-top"><strong>${esc(member.role||'Member')}</strong>${chip(member.role,member.effort)}${badge(member.verdict||'no verdict')}</span><span class="member-comment">${esc(member.comment||member.does||'No comment reported.')}</span></button>`).join(''):'<div class="empty">No member comments reported.</div>'}</div></section>${sourceSlot()}`}
  function stepMarkup(node){const actor=node.actor||'ai';const children=asArray(node.steps);return`<div class="step"><span>${badge(actor)}</span><div><div class="step-name">${esc(titleForNode(node))}</div><div class="step-meta">${badge(node.progress||node.status||'todo')}${actor==='ai'?chip(node.model,node.effort):''}${node.committee?'<span class="badge">Committee</span>':''}</div>${node.action&&node.action!==node.name?`<div class="substep">${esc(node.action)}</div>`:''}</div>${children.length?`<div class="substeps">${children.map(child=>`<div class="substep">${badge(child.actor||'ai')} <strong>${esc(titleForNode(child))}</strong> ${badge(child.progress||child.status||'todo')} ${child.actor==='ai'?chip(child.model,child.effort):''}${child.committee?' <span class="badge">Committee</span>':''}</div>`).join('')}</div>`:''}</div>`} function planDetail(item){const plan=item.source;const counts=planRollup(plan);const phases=asArray(plan.stages);return`<div class="detail-meta">${chip(plan.author_model,plan.author_effort)}${badge(plan.status||'planned')}</div><section class="detail-block"><h3>Plan summary</h3><p>${esc(planSummary(plan))}</p></section><section class="detail-block"><h3>Author</h3><p>${chip(plan.author_model,plan.author_effort)||'Not reported'}</p></section><section class="detail-block"><h3>Actor rollup</h3><div class="rollup"><span class="badge">AI ${counts.ai}</span><span class="badge waiting">Human ${counts.human}</span><span class="badge">Mix ${counts.mix}</span></div></section><section class="detail-block"><div class="section-heading"><h3>Phases</h3><div class="plan-controls"><button class="action" type="button" data-plan-expand>Expand all</button><button class="action" type="button" data-plan-collapse>Collapse all</button></div></div><div class="accordion">${phases.length?phases.map((phase,index)=>`<details class="phase" ${index===0?'open':''}><summary aria-controls="phase-${index}"><span>${index+1}. ${esc(phase.name||phase.action||`Phase ${index+1}`)}</   function overlayMode(){return window.innerWidth<1440} function syncDrawerMode(){document.body.classList.toggle('drawer-docked',window.innerWidth>=1440);if(activeId){$('drawer').setAttribute('role',overlayMode()?'dialog':'complementary');$('drawer').setAttribute('aria-modal',overlayMode()?'true':'false')}} function openDetail(id,opener){const item=entries.find(entry=>entry.id===id)||needs.find(need=>need.id===id);if(!item)return;lastOpener=opener||document.activeElement;activeId=id;$('drawerKicker').textContent=`${item.type.toUpperCase()} DETAIL`;$('drawerTitle').textContent=item.title;$('drawerBody').innerHTML=item.type==='worker'?workerDetail(item):item.type==='committee'?committeeDetail(item):planDetail(item);syncDrawerMode();$('drawer').classList.add('open');$('backdrop').classList.add('open');$('drawer').setAttribute('aria-hidden','false');renderTimeline();if(overlayMode())requestAnimationFrame(()=>$('closeDrawer').focus())} function closeDetail(){activeId=null;$('drawer').classList.remove('open');$('backdrop').classList.remove('open');$('drawer').setAttribute('aria-hidden','true');renderTimeline();if(lastOpener&&lastOpener.focus)lastOpener.focus()} function trapFocus(event){if(!overlayMode()||!activeId||event.key!=='Tab')return;const focusable=[...$('drawer').querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(node=>!node.disabled);if(!focusable.length)return;const first=focusable[0],last=focusable.at(-1);if(event.shiftKey&&document.activeElement===first){event.preventDefault();last.focus()}else if(!event.shiftKey&&document.activeElement===last){event.preventDefault();first.focus()}}
  async function fetchJson(url){const response=await fetch(`${url}${url.includes('?')?'&':'?'}_=${Date.now()}`,{cache:'no-store'});if(!response.ok)throw new Error(String(response.status));return response.json()} async function refresh(initial=false){if(!initial&&document.hidden)return;const oldIds=new Set(entries.map(item=>item.id));const results=await Promise.allSettled([fetchJson('/brain-status'),fetchJson('/committee-feed'),fetchJson('/builder-feed'),fetchJson('/exec-plan-feed')]);[[results[0],'status'],[results[1],'committees'],[results[2],'workers'],[results[3],'plans']].forEach(([result,key])=>{if(result.status==='fulfilled'){feeds[key]=result.value;failed.delete(key)}else failed.add(key)});makeData();const arrivals=hasPainted?entries.filter(item=>!oldIds.has(item.id)):[];if(!hasPainted){render();hasPainted=true;return}renderHeader();renderNotices();renderNeeds();if(arrivals.length){pendingEntries=[...new Map([...pendingEntries,...arrivals].map(item=>[item.id,item])).values()];$('announcements').textContent=`${pendingEntries.length} new activity item${pendingEntries.length===1?'':'s'} available.`}renderNewActivity()} function revealNew(){pendingEntries=[];$('announcements').textContent='New activity applied.';renderTimeline();renderNewActivity()}
  document.addEventListener('click',event=>{const opener=event.target.closest('[data-open]');if(opener){openDetail(opener.dataset.open,opener);return}const member=event.target.closest('[data-member]');if(member){const expanded=member.classList.toggle('open');member.setAttribute('aria-expanded',String(expanded))}if(event.target.closest('[data-plan-expand]'))$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=true);if(event.target.closest('[data-plan-collapse]'))$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=false)});$('closeDrawer').addEventListener('click',closeDetail);$('backdrop').addEventListener('click',closeDetail);document.addEventListener('keydown',event=>{if(event.key==='Escape'&&activeId)closeDetail();trapFocus(event)});$('search').addEventListener('input',event=>{filterState.query=event.target.value.trim().toLowerCase();renderTimeline()});document.querySelectorAll('[data-type]').forEach(button=>button.addEventListener('click',()=>{const type=button.dataset.type;filterState.types.has(type)?filterState.types.delete(type):filterState.types.add(type);button.setAttribute('aria-pressed',String(filterState.types.has(type)));renderTimeline()}));document.querySelectorAll('[data-state]').forEach(button=>button.addEventListener('click',()=>{filterState.state=button.dataset.state;document.querySelectorAll('[data-state]').forEach(other=>other.setAttribute('aria-pressed',String(other===button)));renderTimeline()}));$('expand').addEventListener('click',()=>$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=true));$('collapse').addEventListener('click',()=>$('drawerBody').querySelectorAll('details').forEach(detail=>detail.open=false));$('themeToggle').addEventListener('click',()=>{document.documentElement.dataset.theme=document.documentElement.dataset.theme==='dark'?'light':'dark'});$('newActivity').addEventListener('click',revealNew);window.addEventListener('resize',syncDrawerMode);document.addEventListene
