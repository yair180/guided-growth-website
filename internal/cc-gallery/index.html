<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="light dark"><title>Command Center - pick a template</title>
<style>
:root{--bg:#f6f8fb;--fg:#142033;--mut:#6b7a90;--line:#e3e9f0;--card:#fff;--blue:#2563eb}
@media(prefers-color-scheme:dark){:root{--bg:#0b1120;--fg:#eef3fa;--mut:#8595ab;--line:#26334a;--card:#111a2b;--blue:#67a4ff}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--fg);font:15px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:1400px;margin:0 auto;padding:22px}
.top{display:flex;align-items:baseline;gap:12px;margin:2px 0 16px}
.top b{font-size:15px;font-weight:650}.top span{color:var(--mut);font-size:13px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:flex;flex-direction:column}
.hd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--line)}
.hd b{font-weight:650}.hd a{color:var(--blue);text-decoration:none;font-size:13px;font-weight:600}
.frame{position:relative;height:520px;overflow:hidden;background:var(--bg)}
.frame iframe{position:absolute;top:0;left:0;width:1400px;height:1486px;border:0;transform:scale(.5);transform-origin:top left}
</style></head><body><div class="wrap">
<div class="top"><b>Command Center</b><span>pick the directions you like. we combine the best into the real one.</span></div>
<div class="grid">
<div class="card"><div class="hd"><b>Linear clean</b><a href="./linear.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./linear.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Ops console (dark)</b><a href="./console.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./console.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Kanban lanes</b><a href="./kanban.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./kanban.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Timeline stream</b><a href="./timeline.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./timeline.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Metric dashboard</b><a href="./dashboard.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./dashboard.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Split master-detail</b><a href="./masterdetail.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./masterdetail.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Card gallery</b><a href="./cards.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./cards.html" loading="lazy"></iframe></div></div>
<div class="card"><div class="hd"><b>Outline tree</b><a href="./outline.html" target="_blank">open full &#8599;</a></div><div class="frame"><iframe src="./outline.html" loading="lazy"></iframe></div></div>
</div></div></body></html>
