<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Command Center Templates</title>
<style>
:root{color-scheme:light dark;--bg:#f5f8fc;--bar:rgba(255,255,255,.92);--text:#172033;--muted:#667085;--line:#dbe3ef;--blue:#1677ff;--blue-soft:#e8f2ff;--focus:#0b63ce}
@media(prefers-color-scheme:dark){:root{--bg:#0b1018;--bar:rgba(13,20,31,.94);--text:#e8eef8;--muted:#9aa8bb;--line:#263449;--blue:#5aa2ff;--blue-soft:#102b4d;--focus:#8bbcff}}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--text);font:13px/1.35 Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{display:grid;grid-template-rows:auto minmax(0,1fr)}
nav{display:flex;gap:7px;align-items:center;overflow-x:auto;padding:9px 12px;border-bottom:1px solid var(--line);background:var(--bar);scrollbar-width:thin}
.chip{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:transparent;color:var(--muted);padding:6px 11px;font:inherit;font-weight:700;cursor:pointer;transition:background .14s,border-color .14s,color .14s,box-shadow .14s}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip[aria-selected="true"]{border-color:var(--blue);background:var(--blue-soft);color:var(--blue);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--blue) 18%,transparent)}
.chip:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
main{min-height:0}
iframe{display:block;width:100%;height:100%;border:0;background:var(--bg)}
</style>
</head>
<body>
<nav role="tablist" aria-label="Command center templates">
<button class="chip" role="tab" aria-selected="true" data-src="linear.html">Linear</button>
<button class="chip" role="tab" aria-selected="false" data-src="console.html">Console</button>
<button class="chip" role="tab" aria-selected="false" data-src="kanban.html">Kanban</button>
<button class="chip" role="tab" aria-selected="false" data-src="timeline.html">Timeline</button>
<button class="chip" role="tab" aria-selected="false" data-src="dashboard.html">Dashboard</button>
<button class="chip" role="tab" aria-selected="false" data-src="masterdetail.html">Master-detail</button>
<button class="chip" role="tab" aria-selected="false" data-src="cards.html">Cards</button>
<button class="chip" role="tab" aria-selected="false" data-src="outline.html">Outline</button>
</nav>
<main><iframe id="preview" src="linear.html" title="Linear command center template"></iframe></main>
<script>
(()=>{'use strict';const chips=[...document.querySelectorAll('.chip')],frame=document.getElementById('preview');function select(chip){chips.forEach(item=>item.setAttribute('aria-selected',String(item===chip)));frame.src=chip.dataset.src;frame.title=`${chip.textContent} command center template`}chips.forEach((chip,index)=>{chip.addEventListener('click',()=>select(chip));chip.addEventListener('keydown',event=>{if(event.key!=='ArrowRight'&&event.key!=='ArrowLeft')return;event.preventDefault();const offset=event.key==='ArrowRight'?1:-1,next=chips[(index+offset+chips.length)%chips.length];next.focus();select(next)})})})();
</script>
</body>
</html>
