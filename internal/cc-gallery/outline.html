<body>
<div class="shell">
<header class="topbar">
  <div class="brand"><span class="live-dot"></span><b>Machine</b><span id="liveCount">Live</span></div>
  <div class="header-center"><input id="search" class="search" type="search" placeholder="Filter plans, committees, workers, sessions, or status" aria-label="Filter live machine data"></div>
  <div class="header-right"><span id="tokensToday" class="tokens">Today</span><button id="pause" class="quiet-button" type="button">Pause live</button><button id="theme" class="icon-button" type="button" aria-label="Toggle color theme">◐</button></div>
</header>
<section class="needs" aria-label="Needs your attention"><div class="needs-head">Needs you</div><div id="needsList" class="needs-list"></div></section>
<p id="notices" class="notices" role="status"></p>
<div class="dashboard">
<main class="main">
<section aria-labelledby="telemetryHeading"><div class="section-head"><h2 id="telemetryHeading">Machine vitals</h2><span>Live board status</span></div><div id="telemetry" class="telemetry"></div></section>
<section aria-labelledby="liveHeading"><div class="section-head"><h2 id="liveHeading">Active branches</h2><span id="liveNote"></span></div><div id="liveGrid" class="live-grid"></div></section>
<section aria-labelledby="boardHeading"><div class="section-head"><h2 id="boardHeading">Execution outline</h2><span id="boardCount"></span></div><div class="toolbar"><button class="filter" data-state="all" aria-pressed="true" type="button">All</button><button class="filter" data-state="live" aria-pressed="false" type="button">Deciding</button><button class="filter" data-state="done" aria-pressed="false" type="button">Passed</button><button class="filter" data-state="fail" aria-pressed="false" type="button">Judged bad / died</button><button class="filter" data-state="needs" aria-pressed="false" type="button">Could not judge</button><button id="problems" class="filter" type="button">Needs you</button><span class="spacer"></span><button id="expand" class="text-button" type="button">Show all</button><button id="collapse" class="text-button" type="button">Hide types</button></div><div id="board" class="board"></div></section>
</main>
<aside class="side" aria-labelledby="historyHeading"><div class="section-head"><h2 id="historyHeading">Recent ledger</h2><span>Open for detail</span></div><div id="timeline" class="timeline"></div></aside>
</div>
</div>
<div id="backdrop" class="backdrop"></div>
<aside id="drawer" class="drawer" aria-hidden="true" aria-label="Item details"><header class="drawer-header"><div id="drawerKicker" class="drawer-kicker"></div><h2 id="drawerTitle" class="drawer-title"></h2><button id="closeDrawer" class="drawer-close" type="button" aria-label="Close details">×</button></header><div id="drawerBody" class="drawer-body"></div></aside>
<div id="announcements" aria-live="polite" class="sr-only"></div>
