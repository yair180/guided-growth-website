<body>
<main class="shell">
  <header class="topbar">

<script>
(()=>{'use strict';const queryTheme=new URLSearchParams(location.search).get('theme');if(queryTheme==='light'||queryTheme==='dark')document.documentElement.dataset.theme=queryTheme;const feeds={status:null,committees:null,workers:null,plans:null},failed=new Set(),$=id=>document.getElementById(id),asArray=value=>Array.isArray(value)?value:[],esc=value=>String(value??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])),dateMs=value=>{const stamp=Date.parse(value||'');return Number.isFinite(stamp)?stamp:0},relative=value=>{const seconds=Math.max(0,Math.floor((Date.now()-dateMs(value))/1000));if(!dateMs(value))return'unknown';if(seconds<45)return'now';if(seconds<3600)return`${Math.floor(seconds/60)}m ago`;if(seconds<86400)return`${Math.floor(seconds/3600)}h ago`;return`${Math.floor(seconds/86400)}d ago`},elapsed=value=>{const seconds=Math.max(0,Math.floor((Date.now()-dateMs(value))/1000));if(!dateMs(value))return'Elapsed unavailable';if(seconds<3600)return`${Math.floor(seconds/60)}m`;if(seconds<86400)return`${Math.floor(seconds/3600)}h ${Math.floor(seconds%3600/60)}m`;return`${Math.floor(seconds/86400)}d`},money=value=>value===undefined||value===null||value===''?'Cost unavailable':String(value).startsWith('$')?String(value):`$${value}`,chip=(model,effort)=>model?`<span class="chip ${effort==='low'?'low':effort==='high'?'high':'medium'}">${esc(model)} @ ${esc(effort||'Effort pending')}</span>`:'<span class="chip">Model not assigned</span>',stateClass=value=>{const state=String(value||'').toLowerCase();return/live|running|deciding|doing/.test(state)?'live':/done|green|passed|complete/.test(state)?'done':/block|fail|bad|died/.test(state)?'fail':/wait|todo|stalled|need|queued/.test(state)?'needs':''},state=value=>`<span class="state ${stateClass(value)}">${esc(String(value||'unknown').replace(/_/g,' '))}</span>`,metricFor=value=>{const parts=[];if(value&&value.cost!==undefined)parts.push(money(value.cost));else if(value&&value.cost_ button class="history-row" type="button" data-open="${esc(item.id)}"><span class="type">${esc(item.type)}</span><span><strong>${esc(item.title)}</strong><span class="definition">${esc(stateClass(item.state)==='done'?nowFor(item):definitionFor(item))}</span></span><span class="time">${esc(relative(item.time))}</span></button>`).join(''):'<div class="empty">No completed work has been reported yet.</div>'}function facts(rows){return`<dl class="drawer-facts">${rows.map(([label,value])=>`<div><dt>${esc(label)}</dt><dd>${value||'Unavailable'}</dd></div>`).join('')}</dl>`}function sourceSlot(){return'<section class="detail-block source-slot"><h3>Source document</h3><p>GitLab issue preview and comments mount here when a source document is connected.</p></section>'}function workerDetail(item){const worker=item.source;return`<div class="drawer-intro"><p class="drawer-definition">This worker produces ${esc(worker.assignment||worker.label||item.title)} for ${esc(parentFor(item))}.</p><p class="drawer-now"><strong>Now:</strong> ${esc(nowFor(item))}</p></div>${facts([['State',esc(worker.state||'State unavailable')],['Model',chip(worker.model,worker.effort)],['Cost',esc(money(worker.cost??worker.cost_usd))],['Elapsed',esc(elapsed(worker.started))],['Parent objective',esc(parentFor(item))],['Latest output',esc(relative(worker.updated))]])}<section class="detail-block"><h3>Assignment</h3><p>${esc(worker.assignment||worker.label||item.title)}</p></section><section class="detail-block"><h3>Why this exists</h3><p>${esc(worker.description||`This execution thread advances ${parentFor(item)} by producing its assigned result.`)}</p></section><section class="detail-block"><h3>Latest meaningful output · ${esc(relative(worker.updated))}</h3><p>${esc(worker.output||worker.current_output||worker.message||'Latest output unavailable')}</p></section><section class="detail-block"><h3>Execution progress</h3><p>Current action: ${esc(nowFor(item))}<br>Session: ${esc(worker.session||'Session unavailable')}<br>Last active: ${esc(relative(worker.updated||worker.started))}</p></section>${sourceSlot()}`}function committeeDetail(item){const committee=item.source,members=asArray(committee.members||committee.responses||committee.participants),judgement=committee.judgement||committee.verdict||committee.synthesis;return`<div class="drawer-intro"><p class="drawer-definition">This committee evaluates ${esc(committee.description||item.title)} to decide the next operational direction.</p><p class="drawer-now"><strong>Decision question:</strong> ${esc(committee.question||committee.name||item.title)}</p></div>${facts([['State',esc(committee.status||'State unavailable')],['Members',`${members.length||'No'} reported`],['Owner',esc(committee.owner||'Decision owner unavailable')],['Parent plan',esc(parentFor(item))],['Cost',esc(money(committee.cost??committee.cost_usd))],['Elapsed',esc(elapsed(committee.created||committee.started))]])}${judgement?`<section class="detail-block"><div class="detail-inset"><strong>Current synthesis</strong><p>${esc(judgement)}</p><p>Recommendation: ${esc(committee.recommendation||'Recommendation pending')} · ${chip(committee.model,committee.effort)}</p></div></section>`:`<section class="detail-block"><p><strong>Verdict pending.</strong> ${members.length||0} member responses are available. Outstanding perspectives remain visible below.</p></section>`}<section class="detail-block"><h3>Member verdicts</h3>${members.length?members.map((member,index)=>`<article class="member"><div class="member-top"><span class="member-role">${esc(member.role||member.name||`Member ${index+1}`)}</span>${state(member.state||member.status||'pending')}${chip(member.model,member.effort)}</div><div class="member-comment">${esc(member.verdict||member.comment||member.summary||'Verdict not yet reported.')}</div><details><summary>Reasoning and evidence</summary><p>${esc(member.reasoning||member.evidence||member.comment||'No additional reasoning reported.')}</p></details></article>`).join(''):'<div class="empty">No committee member responses are available.</div>'}</section>${sourceSlot()}`}function stepMarkup(node){const actor=node.actor||'ai',children=asArray(node.steps);return`<div class="step"><span>${state(node.progress||node.status||'todo')}</span><div><div class="step-name">${esc(titleForNode(node))}</div><div class="step-meta">${esc(node.description||node.action||'This step produces the next required artifact.')} · ${actor==='ai'?chip(node.model,node.effort):esc(actor)} · ${esc(money(node.cost??node.cost_usd))}</div>${children.length?`<div class="steps">${children.map(stepMarkup).join('')}</div>`:''}</div></div>`}function planDetail(item){const plan=item.source,stages=asArray(plan.stages),steps=planSteps(plan);return`<div class="drawer-intro"><p class="drawer-definition">${esc(definitionFor(item))}</p><p class="drawer-now"><strong>Current step:</strong> ${esc(plan.current_step||plan.phase||'The plan is establishing its current step.')}</p></div>${facts([['State',esc(plan.status||plan.state||'State unavailable')],['Progress',`${steps.done} of ${steps.total||'?'} steps`],['Model',chip(plan.model,plan.effort)],['Cost',esc(money(plan.cost??plan.cost_usd))],['Elapsed',esc(elapsed(plan.started||item.time))],['Parent',esc(parentFor(item))]])}<section class="detail-block"><h3>Intended effect</h3><p>${esc(plan.summary||plan.description||'This plan has not yet reported its intended operational effect.')}</p></section><section class="detail-block"><h3>Plan phases and steps</h3><div class="plan-controls"><button class="text-button" data-details="open" type="button">Expand all</button><button class="text-button" data-details="close" type="button">Collapse all</button></div>${stages.length?stages.map((stage,index)=>`<details class="phase" ${index===0?'open':''}><summary class="phase-head"><h4>Phase ${index+1}: ${esc(stage.name||stage.action||'Untitled phase')}</h4>${state(stage.progress||stage.status||'planned')}</summary><div class="steps">${asArray(stage.steps).length?asArray(stage.steps).map(stepMarkup).join(''):stepMarkup(stage)}</div></details>`).join(''):'<div class="empty">No plan phases have been reported.</div>'}</section><section class="detail-block"><h3>Actors and relationships</h3><p>${esc(entries.filter(entry=>entry.id!==item.id&&(entry.source.plan===plan.name||entry.source.parent_plan===plan.name)).map(entry=>`${entry.type}: ${entry.title}`).join(' · ')||'No linked actors reported.')}</p></section>${sourceSlot()}`}function openDetail(id,opener){const item=entries.find(entry=>entry.id===id)||needs.find(need=>need.id===id);if(!item)return;activeId=id;lastOpener=opener||document.activeElement;$('drawerKicker').textContent=item.type;$('drawerTitle').textContent=item.title;$('drawerBody').innerHTML=item.type==='plan'?planDetail(item):item.type==='committee'?committeeDetail(item):workerDetail(item);$('drawer').classList.add('open');$('backdrop').classList.add('open');$('drawer').setAttribute('aria-hidden','false');requestAnimationFrame(()=>$('closeDrawer').focus())}function closeDetail(){activeId=null;$('drawer').classList.remove('open');$('backdrop').classList.remove('open');$('drawer').setAttribute('aria-hidden','true');if(lastOpener&&lastOpener.focus)lastOpener.focus()}function render(){renderNeeds();renderLive();renderBoard();renderTelemetry();renderHistory();$('liveCount').textContent=`Live · updated now`;hasPainted=true}async function fetchJson(url){const response=await fetch(`${url}${url.includes('?')?'&':'?'}_=${Date.now()}`,{cache:'no-store'});if(!response.ok)throw Error(`${response.status}`);return response.json()}async function refresh(initial=false){if(paused)return;const sources=[['status','/brain-status'],['committees','/committee-feed'],['workers','/builder-feed'],['plans','/exec-plan-feed']];await Promise.all(sources.map(async([key,url])=>{try{feeds[key]=await fetchJson(url);failed.delete(url)}catch(error){failed.add(url)}}));makeData();if(!hasPainted||initial||!document.hidden)render();$('notices').textContent=failed.size?`Some live sections could not refresh. Showing the last available data for ${[...failed].join(', ')}.`:''}document.addEventListener('click',event=>{const open=event.target.closest('[data-open]');if(open){openDetail(open.dataset.open,open);return}if(event.target.closest('#closeDrawer')||event.target===$('backdrop'))closeDetail();const detailControl=event.target.closest('[data-details]');if(detailControl){$('drawerBody').querySelectorAll('details').forEach(node=>node.open=detailControl.dataset.details==='open')}});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeDetail()});$('search').addEventListener('input',event=>{filterState.query=event.target.value;renderBoard()});document.querySelectorAll('.filter').forEach(button=>button.addEventListener('click',()=>{if(button.dataset.type){button.setAttribute('aria-pressed',String(!filterState.types.has(button.dataset.type)));filterState.types.has(button.dataset.type)?filterState.types.delete(button.dataset.type):filterState.types.add(button.dataset.type)}else{filterState.state=button.dataset.state;document.querySelectorAll('[data-state]').forEach(node=>node.setAttribute('aria-pressed',String(node===button)))}renderBoard()}));$('expand').addEventListener('click',()=>{filterState.state='all';document.querySelectorAll('[data-state]').forEach(node=>node.setAttribute('aria-pressed',String(node.dataset.state==='all')));renderBoard()});$('collapse').addEventListener('click',()=>{filterState.types.clear();renderBoard()});$('problems').addEventListener('click',()=>{filterState.state='needs-you';document.querySelectorAll('[data-state]').forEach(node=>node.setAttribute('aria-pressed',String(node.dataset.state==='needs-you')));renderBoard()});$('pause').addEventListener('click',()=>{paused=!paused;$('pause').textContent=paused?'Resume live':'Pause live';if(!paused)refresh(true)});$('theme').addEventListener('click',()=>{const dark=document.documentElement.dataset.theme==='dark'||(!document.documentElement.dataset.theme&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=dark?'light':'dark'});refresh(true);setInterval(()=>refresh(),5000)})();
</script>
