),cost=status.cost??status.cost_usd??status.today_cost??'Cost unavailable',health=status.health||status.box_health||status.status||'Status unavailable';$('tokensToday').textContent=`Today ${money(cost)}`;$('telemetry').innerHTML=`<section class="telemetry-panel live"><h2 class="telemetry-title">Fleet state</h2><div class="telemetry-big">${live.length} live</div><div class="telemetry-copy">${workers.length} workers visible · ${entries.filter(item=>item.type==='committee').length} committees</div><div class="telemetry-list"><div class="telemetry-line"><span>Running now</span><span>${live.map(item=>item.title).slice(0,2).join(', ')||'No active session'}</span></div></div></section><section class="telemetry-panel"><h2 class="telemetry-title">Box health</h2><div class="telemetry-big">${esc(String(health))}</div><div class="telemetry-copy">Machine health is reported by the current brain status feed.</div><div class="telemetry-list"><div class="telemetry-line"><span>Last update</span><span>${esc(relative(status.updated||status.timestamp))}</span></div></div></section><section class="telemetry-panel"><h2 class="telemetry-title">Today’s cost</h2><div class="telemetry-big">${esc(money(cost))}</div><div class="telemetry-copy">${status.tokens||status.total_tokens?`${esc(String(status.tokens||status.total_tokens))} tokens reported`:'Token usage unavailable'}</div><div class="telemetry-list"><div class="telemetry-line"><span>Live cost state</span><span>${failed.has('/brain-status')?'Unavailable':'Connected'}</span></div></div></section>`}function renderHistory(){const done=entries.filter(item=>stateClass(item.state)==='done'),items=(done.length?done:entries).slice(0,12);$('timeline').innerHTML=items.length?items.map(item=>`<button class="history-row" type="button" data-open="${esc(item.id)}"><span class="type">${esc(item.type)}</span><span><strong>${esc(item.title)}</strong><span class="definition">${esc(stateClass(item.state)==='done'?nowFor(item):definitionFor(item))}</span></span><span class="time">${esc(relative(item.time))}</span></button>`).join(''):'<div class="empty">No completed work has been reported yet.</div>'}function facts(rows){return`<dl class="drawer-facts">${rows.map(([label,value])=>`<div><dt>${esc(label)}</dt><dd>${value||'Unavailable'}</dd></div>`).join('')}</dl>`}function sourceSlot(item){const links=asArray(item&&item.source&&item.source.links);return`<section class="detail-block source-slot"><h3>Links</h3>${links.length?`<p>${links.map(link=>`<a href="${esc(link.href||'#')}" target="_blank" rel="noreferrer">${esc(link.label||link.href||'Open link')}</a>`).join(' · ')}</p>`:'<p>No source links reported.</p>'}</section>`}function workerDetail(item){const worker=item.source;return`<div class="drawer-intro"><p class="drawer-definition">This worker produces ${esc(worker.assignment||worker.label||item.title)} for ${esc(parentFor(item))}.</p><p class="drawer-now"><strong>Now:</strong> ${esc(nowFor(item))}</p></div>${facts([['State',esc(worker.state||'State unavailable')],['Model',chip(worker.model,worker.effort)],['Cost',esc(money(worker.cost??worker.cost_usd))],['Elapsed',esc(elapsed(worker.started))],['Parent objective',esc(parentFor(item))],['Latest output',esc(relative(worker.updated))]])}<section class="detail-block"><h3>Assignment</h3><p>${esc(worker.assignment||worker.label||item.title)}</p></section><section class="detail-block"><h3>Why this exists</h3><p>${esc(worker.description||`This execution thread advances ${parentFor(item)} by producing its assigned result.`)}</p></section><section class="detail-block"><h3>Latest meaningful output · ${esc(relative(worker.updated))}</h3><p>${esc(worker.output||worker.current_output||worker.message||'Latest output unavailable')}</p></section><section class="detail-block"><h3>Execution progress</h3><p>Current action: ${esc(nowFor(item))}<br>Session: ${esc(worker.session||'Session unavailable')}<br>Last active: ${esc(relative(worker.updated||worker.started))}</p></section>${sourceSlot(item)}`}function committeeDetail(item){const committee=item.source,members=asArray(committee.members||committee.responses||committee.participants),judgement=committee.judgement||committee.verdict||committee.synthesis;return`<div class="drawer-intro"><p class="drawer-definition">This committee evaluates ${esc(committee.description||item.title)} to decide the next operational direction.</p><p class="drawer-now"><strong>Decision question:</strong> ${esc(committee.question||committee.name||item.title)}</p></div>${facts([['State',esc(committee.status||'State unavailable')],['Members',`${members.length||'No'} reported`],['Owner',esc(committee.owner||'Decision owner unavailable')],['Parent plan',esc(parentFor(item))],['Cost',esc(money(committee.cost??committee.cost_usd))],['Elapsed',esc(elapsed(committee.created||committee.started))]])}${judgement?`<section class="detail-block"><div class="detail-inset"><strong>Current synthesis</strong><p>${esc(judgement)}</p><p>Recommendation: ${esc(committee.recommendation||'Recommendation pending')} · ${chip(committee.model,committee.effort)}</p></div></section>`:`<section class="detail-block"><p><strong>Verdict pending.</strong> ${members.length||0} member responses are available. Outstanding perspectives remain visible below.</p></section>`}<section class="detail-block"><h3>Member verdicts</h3>${members.length?members.map((member,index)=>`<article class="member"><div class="member-top"><span class="member-role">${esc(member.role||member.name||`Member ${index+1}`)}</span>${state(member.state||member.status||'pending')}${chip(member.model,member.effort)}</div><div class="member-comment">${esc(member.verdict||member.comment||member.summary||'Verdict not yet reported.')}</div><details><summary>Reasoning and evidence</summary><p>${esc(member.reasoning||member.evidence||member.comment||'No additional reasoning reported.')}</p></details></article>`).join(''):'<div class="empty">No committee member responses are available.</div>'}</section>${sourceSlot(item)}`}function stepMarkup(node){const actor=node.actor||'ai',children=asArray(node.steps);return`<div class="step"><span>${state(node.progress||node.status||'todo')}</span><div><div class="step-name">${esc(titleForNode(node))}</div><div class="step-meta">${esc(node.description||node.action||'This step produces the next required artifact.')} · ${actor==='ai'?chip(node.model,node.effort):esc(actor)} · ${esc(money(node.cost??node.cost_usd))}</div>${children.length?`<div class="steps">${children.map(stepMarkup).join('')}</div>`:''}</div></div>`}function planDetail(item){const plan=item.source,stages=asArray(plan.stages),steps=planSteps(plan);return`<div class="drawer-intro"><p class="drawer-definition">${esc(definitionFor(item))}</p><p class="drawer-now"><strong>Current step:</strong> ${esc(plan.current_step||plan.phase||'The plan is establishing its current step.')}</p></div>${facts([['State',esc(plan.status||plan.state||'State unavailable')],['Progress',`${steps.done} of ${steps.total||'?'} steps`],['Model',chip(plan.model,plan.effort)],['Cost',esc(money(plan.cost??plan.cost_usd))],['Elapsed',esc(elapsed(plan.started||item.time))],['Parent',esc(parentFor(item))]])}<section class="detail-block"><h3>Intended effect</h3><p>${esc(plan.summary||plan.description||'This plan has not yet reported its intended operational effect.')}</p></section><section class="detail-block"><h3>Plan phases and steps</h3><div class="plan-controls"><button class="text-button" data-details="open" type="button">Expand all</button><button class="text-button" data-details="close" type="button">Collapse all</button></div>${stages.length?stages.map((stage,index)=>`<details class="phase" ${index===0?'open':''}><summary class="phase-head"><h4>Phase ${index+1}: ${esc(stage.name||stage.action||'Untitled phase')}</h4>${state(stage.progress||stage.status||'planned')}</summary><div class="steps">${asArray(stage.steps).length?asArray(stage.steps).map(stepMarkup).join(''):stepMarkup(stage)}</div></details>`).join(''):'<div class="empty">No plan phases have been reported.</div>'}</section><section class="detail-block"><h3>Actors and relationships</h3><p>${esc(entries.filter(entry=>entry.id!==item.id&&(entry.source.plan===plan.name||entry.source.parent_plan===plan.name)).map(entry=>`${entry.type}: ${entry.title}`).join(' · ')||'No linked actors reported.')}</p></section>${sourceSlot(item)}`}function openDetail(id,opener){const item=entries.find(entry=>entry.id===id)||needs.find(need=>need.id===id);if(!item)return;activeId=id;lastOpener=opener||document.activeElement;$('drawerKicker').textContent=item.type;$('drawerTitle').textContent=item.title;$('drawerMeta').innerHTML=`${state(item.state)}${chip(item.model,item.effort)}<span class="time">${esc(relative(item.time))}</span>`;$('drawerBody').innerHTML=item.type==='plan'?planDetail(item):item.type==='committee'?committeeDetail(item):workerDetail(item);$('drawer').classList.add('open');$('backdrop').classList.add('open');$('drawer').setAttribute('aria-hidden','false');requestAnimationFrame(()=>$('closeDrawer').focus())}function closeDetail(){activeId=null;$('drawer').classList.remove('open');$('backdrop').classList.remove('open');$('drawer').setAttribute('aria-hidden','true');if(lastOpener&&lastOpener.focus)lastOpener.focus()}function render(){renderNeeds();renderLive();renderBoard();renderTelemetry();renderHistory();$('liveCount').textContent=`Live · updated now`;hasPainted=true}async function fetchJson(url){const response=await fetch(`${url}${url.includes('?')?'&':'?'}_=${Date.now()}`,{cache:'no-store'});if(!response.ok)throw Error(`${response.status}`);return response.json()}function feedHasContent(key,value){if(!value||typeof value!=='object')return false;if(key==='status')return Object.keys(value).length>0;if(key==='workers')return asArray(value.running).length+asArray(value.recent).length>0;if(key==='committees')return asArray(value.decisions).length+asArray(value.execution).length>0;if(key==='plans')return asArray(value.plans).length>0;return false}function showSampleNotice(){const notice=$('notices');if(notice)notice.innerHTML='<span class="sample-data-tag">showing sample data</span>'}function showLiveNotice(){const notice=$('notices');if(notice)notice.textContent=''}async function refresh(initial=false){if(paused)return;const sources=[['status','/brain-status'],['committees','/committee-feed'],['workers','/builder-feed'],['plans','/exec-plan-feed']],nextFeeds={};await Promise.all(sources.map(async([key,url])=>{try{const value=await fetchJson(url);if(!feedHasContent(key,value))throw Error('empty');nextFeeds[key]=value;failed.delete(url)}catch(error){failed.add(url)}}));const hasCompleteLiveData=sources.every(([key])=>feedHasContent(key,nextFeeds[key]));if(hasCompleteLiveData){Object.assign(feeds,nextFeeds);makeData();if(!document.hidden||initial)render();showLiveNotice()}else{showSampleNotice()}}document.addEventListener('click',event=>{const open=event.target.closest('[data-open]');if(open){openDetail(open.dataset.open,open);return}if(event.target.closest('#closeDrawer')||event.target===$('backdrop'))closeDetail();const detailControl=event.target.closest('[data-details]');if(detailControl){$('drawerBody').querySelectorAll('details').forEach(node=>node.open=detailControl.dataset.details==='open')}});document.addEventListener('keydown',event=>{if(event.key==='Escape')closeDetail()});$('search').addEventListener('input',event=>{filterState.query=event.target.value;renderBoard()});document.querySelectorAll('.filter').forEach(button=>button.addEventListener('click',()=>{if(button.dataset.type){button.setAttribute('aria-pressed',String(!filterState.types.has(button.dataset.type)));filterState.types.has(button.dataset.type)?filterState.types.delete(button.dataset.type):filterState.types.add(button.dataset.type)}else{filterState.state=button.dataset.state;document.querySelectorAll('[data-state]').forEach(node=>node.setAttribute('aria-pressed',String(node===button)))}renderBoard()}));$('expand').addEventListener('click',()=>{filterState.state='all';document.querySelectorAll('[data-state]').forEach(node=>node.setAttribute('aria-pressed',String(node.dataset.state==='all')));renderBoard()});$('collapse').addEventListener('click',()=>{filterState.types.clear();renderBoard()});$('problems').addEventListener('click',()=>{filterState.state='needs-you';document.querySelectorAll('[data-state]').forEach(node=>node.setAttribute('aria-pressed',String(node.dataset.state==='needs-you')));renderBoard()});$('pause').addEventListener('click',()=>{paused=!paused;$('pause').textContent=paused?'Resume live':'Pause live';if(!paused)refresh(true)});$('theme').addEventListener('click',()=>{const dark=document.documentElement.dataset.theme==='dark'||(!document.documentElement.dataset.theme&&matchMedia('(prefers-color-scheme: dark)').matches);document.documentElement.dataset.theme=dark?'light':'dark'});makeData();render();showSampleNotice();refresh(true);setInterval(()=>refresh(),5000)})();
