<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Command Center</title>
<style>
:root{color-scheme:light dark;--canvas:#F7F6F2;--surface:#FFFFFF;--inset:#F0EFE9;--ink:#202522;--muted:#5D6761;--line:#D7DAD4;--focus:#275FA8;--need:#8B3E24;--need-bg:#F8E8DF;--live:#176B52;--live-bg:#E1F1EA;--done:#536159;--done-bg:#E9ECE9;--error:#9A3040;--error-bg:#F7E4E7;--low:#17677B;--low-bg:#DDEEF2;--medium:#526057;--medium-bg:#E7EAE7;--high:#974423;--high-bg:#F7E5DC;--sans:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;--serif:ui-serif,Georgia,Cambria,"Times New Roman",serif}
@media(prefers-color-scheme:dark){:root:not([data-theme]){--canvas:#171918;--surface:#202321;--inset:#292D2A;--ink:#F1F3EF;--muted:#AEB8B1;--line:#404640;--focus:#8CB8F4;--need:#FFB49A;--need-bg:#452C24;--live:#86D6B6;--live-bg:#203C32;--done:#C1CBC4;--done-bg:#303732;--error:#FFA2AF;--error-bg:#49282E;--low:#8DD5E5;--low-bg:#243D43;--medium:#CAD2CC;--medium-bg:#343B36;--high:#FFB092;--high-bg:#4A2D24}}
html[data-theme="dark"]{--canvas:#171918;--surface:#202321;--inset:#292D2A;--ink:#F1F3EF;--muted:#AEB8B1;--line:#404640;--focus:#8CB8F4;--need:#FFB49A;--need-bg:#452C24;--live:#86D6B6;--live-bg:#203C32;--done:#C1CBC4;--done-bg:#303732;--error:#FFA2AF;--error-bg:#49282E;--low:#8DD5E5;--low-bg:#243D43;--medium:#CAD2CC;--medium-bg:#343B36;--high:#FFB092;--high-bg:#4A2D24}
*{box-sizing:border-box}html{background:var(--canvas)}body{margin:0;background:var(--canvas);color:var(--ink);font:15px/1.65 var(--sans);-webkit-font-smoothing:antialiased}button,input{font:inherit}button{color:inherit}button:focus-visible,input:focus-visible,summary:focus-visible{outline:2px solid var(--focus);outline-offset:2px}.app{width:min(920px,calc(100% - 64px));margin:0 auto;padding:48px 0 80px}.topbar{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin-bottom:32px}.eyebrow{margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:.04em;line-height:1.3;color:var(--muted)}h1,h2,h3{font-family:var(--serif)}.topbar h1{margin:0;font-size:clamp(32px,4vw,42px);font-weight:600;line-height:1.2;letter-spacing:-.02em}.status{padding-top:7px;color:var(--muted);font-size:13px;font-weight:500;text-align:right;white-space:nowrap}.status b{color:var(--ink);font-weight:700}.needs{margin:0 0 32px;padding:24px;border:1px solid var(--need);border-radius:8px;background:var(--need-bg)}.section-heading{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin:0 0 16px}.section-heading h2{margin:0;color:var(--need);font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.04em;line-height:1.3}.section-heading span{color:var(--muted);font-size:13px;font-weight:500}.need-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.need{display:grid;grid-template-columns:24px minmax(0,1fr);gap:12px;align-content:start;min-height:96px;width:100%;padding:16px;border:1px solid color-mix(in srgb,var(--need) 45%,var(--need-bg));border-radius:8px;background:color-mix(in srgb,var(--surface) 38%,transparent);text-align:left;cursor:pointer}.need:hover{background:var(--surface)}.need-flag{grid-row:span 2;color:var(--need);font-size:17px;line-height:1.25}.need-title{font-size:17px;font-weight:600;line-height:1.4;overflow-wrap:anywhere}.need-meta{color:var(--muted);font-size:13px;line-height:1.45}.controls{display:flex;flex-wrap:wrap;align-items:end;gap:12px 16px;margin:0 0 32px;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}.search{width:clamp(280px,35vw,360px);position:relative}.search label,.filter-label{display:block;margin:0 0 6px;font-size:12px;font-weight:700;letter-spacing:.04em;line-height:1.3;color:var(--muted)}.search input{width:100%;min-height:44px;border:1px solid var(--line);border-radius:4px;background:var(--surface);color:var(--ink);padding:9px 12px}.filter-wrap{display:flex;gap:8px;flex-wrap:wrap}.filter-group{display:flex;gap:4px;flex-wrap:wrap}.filter,.action{min-height:44px;border:1px solid var(--line);border-radius:4px;background:var(--surface);padding:8px 12px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.04em;cursor:pointer}.filter[aria-pressed="true"]{border-color:var(--ink);background:var(--inset);color:var(--ink);box-shadow:inset 3px 0 0 var(--focus)}.filter:hover,.action:hover{border-color:var(--muted);background:var(--inset)}.action:disabled{color:var(--muted);background:var(--inset);cursor:not-allowed;opacity:.6}.stream{position:relative}.timeline{position:relative}.timeline:before{content:"";position:absolute;top:0;bottom:0;left:84px;width:1px;background:var(--line)}.entry{position:relative;display:grid;grid-template-columns:72px 24px minmax(0,1fr);gap:12px;width:100%;min-height:96px;padding:20px 0;border:0;border-bottom:1px solid var(--line);background:transparent;text-align:left;cursor:pointer}.entry:hover,.entry.active{background:var(--inset)}.entry.active{box-shadow:inset 3px 0 0 var(--need)}.timestamp{padding-top:4px;color:var(--muted);font-size:13px;font-weight:500;line-height:1.45;text-align:right}.dot{position:relative;z-index:1;width:12px;height:12px;margin-top:6px;border:2px solid var(--canvas);border-radius:50%;background:var(--muted);box-shadow:0 0 0 1px var(--line)}.dot.worker{background:var(--low)}.dot.committee{background:var(--high)}.dot.plan{background:var(--live)}.entry-main{min-width:0}.entry-line{display:flex;align-items:baseline;gap:10px;min-width:0}.kind{flex:none;border:1px solid var(--line);border-radius:999px;padding:3px 8px;color:var(--muted);font-size:12px;font-weight:700;line-height:1.3}.entry-title{min-width:0;font-size:17px;font-weight:600;line-height:1.4;overflow-wrap:anywhere}.entry-meta{display:flex;flex-wrap:wrap;align-items:center;gap:6px 8px;margin-top:8px;color:var(--muted);font-size:13px;font-weight:500;line-height:1.45}.chip,.badge{display:inline-flex;align-items:center;min-height:26px;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:600;line-height:1.2;white-space:nowrap}.chip{border-left:3px solid currentColor}.chip.cool{color:var(--low);background:var(--low-bg)}.chip.neutral{color:var(--medium);background:var(--medium-bg)}.chip.hot{color:var(--high);background:var(--high-bg)}.badge{color:var(--muted);background:var(--inset)}.badge.done{color:var(--done);background:var(--done-bg)}.badge.blocked,.badge.failed{color:var(--error);background:var(--error-bg)}.badge.waiting{color:var(--need);background:var(--need-bg)}.empty,.unavailable{padding:20px;border:1px dashed var(--line);border-radius:4px;background:var(--surface);color:var(--muted)}.unavailable{margin-bottom:16px;font-size:13px}.backdrop{position:fixed;inset:0;z-index:10;background:rgb(0 0 0/.3);opacity:0;visibility:hidden;transition:opacity .2s ease-out}.backdrop.open{opacity:1;visibility:visible}.drawer{position:fixed;z-index:11;top:0;right:0;bottom:0;display:flex;flex-direction:column;width:min(560px,90vw);border-left:1px solid var(--line);background:var(--surface);box-shadow:0 24px 64px rgb(0 0 0/.24);transform:translateX(8px);opacity:0;visibility:hidden;transition:transform .2s ease-out,opacity .2s ease-out}.drawer.open{transform:none;opacity:1;visibility:visible}.drawer-head{position:sticky;top:0;z-index:2;display:grid;grid-template-columns:minmax(0,1fr) 44px;gap:16px;padding:24px 32px 20px;border-bottom:1px solid var(--line);background:var(--surface)}.drawer-kicker{margin:0 0 6px;color:var(--muted);font-size:12px;font-weight:700;letter-spacing:.04em;line-height:1.3}.drawer h2{margin:0;font-size:30px;font-weight:600;line-height:1.18;overflow-wrap:anywhere}.close{width:44px;height:44px;border:1px solid var(--line);border-radius:4px;background:var(--surface);cursor:pointer;font-size:22px;line-height:1}.drawer-body{overflow:auto;padding:32px}.drawer-content{max-width:680px;margin:0 auto}.detail-meta,.rollup{display:flex;flex-wrap:wrap;gap:8px}.detail-block{margin:0 0 32px}.detail-block:last-child{margin-bottom:0}.detail-block h3{margin:0 0 12px;font-family:var(--sans);font-size:12px;font-weight:700;letter-spacing:.04em;line-height:1.3;color:var(--muted)}.plan-intro{margin:0;font-size:17px;line-height:1.6}.detail-grid{display:grid;gap:12px}.detail-row{padding:0 0 12px;border-bottom:1px solid var(--line)}.detail-row strong{display:block;margin-bottom:3px;font-size:12px;letter-spacing:.04em;color:var(--muted)}.member{width:100%;border:0;border-bottom:1px solid var(--line);background:transparent;padding:16px 0;text-align:left;cursor:pointer}.member .member-head{display:flex;align-items:center;justify-content:space-between;gap:12px}.member-name{font-size:16px;font-weight:600}.member-comment{display:none;margin:12px 0 0;color:var(--ink);font-size:15px;line-height:1.65}.member.open .member-comment{display:block}.accordion details{border-bottom:1px solid var(--line)}.accordion summary{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:44px;padding:10px 0;cursor:pointer;font-family:var(--serif);font-size:20px;font-weight:600;line-height:1.3;list-style:none}.accordion summary::-webkit-details-marker{display:none}.accordion summary:after{content:"⌄";font-family:var(--sans);font-size:18px;color:var(--muted)}.accordion details[open] summary:after{content:"⌃"}.accordion-content{padding:16px 0}.steps{position:relative}.step{position:relative;display:grid;grid-template-columns:28px minmax(0,1fr);gap:12px;padding:20px 0}.step:not(:last-child):before{content:"";position:absolute;top:48px;bottom:-4px;left:13px;width:1px;background:var(--line)}.step-num{display:grid;place-items:center;width:28px;height:28px;border:1px solid var(--muted);border-radius:50%;color:var(--muted);font-size:12px;font-weight:700}.step-title{font-size:16px;font-weight:600;line-height:1.45}.step-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.step-body{margin:12px 0 0;font-size:15px;line-height:1.65}.source-slot{padding-top:24px;border-top:1px solid var(--line)}.source-slot p{margin:0;color:var(--muted);font-size:15px;line-height:1.65}.new-activity{margin:0 0 16px;min-height:44px;border:1px solid var(--focus);border-radius:4px;background:var(--surface);color:var(--focus);padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer}.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}@media(min-width:1440px){body:has(.drawer.open) .app{width:min(960px,calc(100vw - 648px));margin-left:32px;margin-right:auto}.drawer{box-shadow:none}.backdrop{display:none}}@media(max-width:899px){.need-list{grid-template-columns:1fr}}@media(max-width:719px){.app{width:calc(100% - 32px);padding-top:32px}.topbar{display:block}.status{text-align:left;padding-top:12px}.controls{align-items:stretch}.search{width:100%}.timeline:before{left:60px}.entry{grid-template-columns:48px 24px minmax(0,1fr);gap:12px}.drawer{width:100vw}.drawer-head,.drawer-body{padding-left:20px;padding-right:20px}}@media(prefers-reduced-motion:reduce){*,*:before,*:after{transition-duration:.08ms!important;animation-duration:.08ms!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<main class="app" aria-label="Command Center">
<header class="topbar"><div><p class="eyebrow">Operational record</p><h1>Command Center</h1></div><div id="status" class="status" aria-live="polite">● Loading activity</div></header>
<section class="needs" aria-labelledby="needs-title"><div class="section-heading"><h2 id="needs-title">NEEDS YOU</h2><span id="needsCount">Decision queue</span></div><div id="needsList" class="need-list"></div></section>
<section class="controls" aria-label="Timeline controls"><div class="search"><label for="search">Search activity</label><input id="search" type="search" placeholder="Search plans, sessions, work" autocomplete="off"></div><div><span class="filter-label">Type</span><div class="filter-group" role="group" aria-label="Filter by type"><button class="filter" data-type="worker" aria-pressed="true">Worker</button><button class="filter" data-type="committee" aria-pressed="true">Committee</button><button class="filter" data-type="plan" aria-pressed="true">Plan</button></div></div><div><span class="filter-label">State</span><div class="filter-group" role="group" aria-label="Filter by state"><button class="filter" data-state="all" aria-pressed="true">All</button><button class="filter" data-state="live" aria-pressed="false">● Live</button><button class="filter" data-state="done" aria-pressed="false">✓ Done</button></div></div><div><span class="filter-label">Open detail</span><div class="filter-group"><button id="expand" class="action" type="button" disabled>Expand all</button><button id="collapse" class="action" type="button" disabled>Collapse all</button></div></div></section>
<section class="stream" aria-labelledby="timeline-title"><div class="section-heading"><h2 id="timeline-title">Timeline</h2><span id="timelineCount">Newest first</span></div><button id="newActivity" class="new-activity" hidden type="button"></button><div id="timeline" class="timeline" aria-live="off"></div></section>
</main>
<div id="backdrop" class="backdrop" aria-hidden="true"></div>
<aside id="drawer" class="drawer" aria-labelledby="drawerTitle" aria-hidden="true"><header class="drawer-head"><div><p id="drawerKicker" class="drawer-kicker">DETAIL</p><h2 id="drawerTitle">Activity detail</h2></div><button id="closeDrawer" class="close" type="button" aria-label="Close detail">×</button></header><div id="drawerBody" class="drawer-body"><div class="drawer-content"></div></div></aside>
<div id="liveRegion" class="visually-hidden" aria-live="polite"></div>
<script>
(() => {
  const feeds = { status: null, committees: null, workers: null, plans: null };
  const failed = new Set(); let entries = []; let needs = []; let activeId = null; let openingElement = null; let queuedEntries = null; let hasRendered = false;
  const filterState = { types: new Set(['worker','committee','plan']), state: 'all', query: '' };
  const $ = id => document.getElementById(id);
  const esc = value => String(value ?? '').replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
  const asArray = value => Array.isArray(value) ? value : [];
  const dateMs = value => { const result = Date.parse(value || ''); return Number.isFinite(result) ? result : 0; };
  const relative = value => { const seconds = Math.max(0, Math.floor((Date.now() - dateMs(value)) / 1000)); if (!dateMs(value)) return 'time unknown'; if (seconds < 45) return 'just now'; if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`; return `${Math.floor(seconds / 86400)}d ago`; };
  const elapsed = value => { if (!dateMs(value)) return 'unknown'; const seconds = Math.max(0, Math.floor((Date.now() - dateMs(value)) / 1000)); if (seconds < 3600) return `${Math.floor(seconds / 60)}m`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor(seconds % 3600 / 60)}m`; return `${Math.floor(seconds / 86400)}d ${Math.floor(seconds % 86400 / 3600)}h`; };
  const heat = effort => effort === 'low' ? 'cool' : effort === 'high' ? 'hot' : 'neutral';
  const chip = (model, effort) => model ? `<span class="chip ${heat(effort)}">${esc(model)}${effort ? ` @ ${esc(effort)}` : ''}</span>` : '';
  const badge = value => { const name = String(value || 'unknown').replace(/_/g, ' '); const state = /done|green|passed/.test(name) ? 'done' : /block|fail|bad|died/.test(name) ? 'blocked' : /wait|todo|stalled|could/.test(name) ? 'waiting' : ''; const symbol = state === 'done' ? '✓ ' : state === 'blocked' ? '! ' : /live|doing|running/.test(name) ? '● ' : ''; return `<span class="badge ${state}">${symbol}${esc(name)}</span>`; };
  const titleForNode = node => node.name || node.action || 'Plan step';
  function walkNodes(nodes, callback, depth = 0) { asArray(nodes).forEach(node => { callback(node, depth); walkNodes(node.steps, callback, depth + 1); }); }
  function planSummary(plan) { const first = asArray(plan.stages)[0]; return plan.summary || plan.description || plan.phase || (first && (first.action || first.name)) || 'Execution plan'; }
  function planRollup(plan) { const counts = { ai: 0, human: 0, mix: 0 }; walkNodes(plan.stages, node => { if (counts[node.actor] !== undefined) counts[node.actor]++; }); return counts; }
  function isStrategic(committee) { return /strategic|gate|decision|direction|approve|approval/i.test(`${committee.name || ''} ${committee.description || ''}`); }
  function buildData() {
    const nextEntries = []; const nextNeeds = [];
    const workers = [...asArray(feeds.workers && feeds.workers.running), ...asArray(feeds.workers && feeds.workers.recent)];
    workers.forEach((worker, index) => nextEntries.push({ id: `worker-${worker.session || worker.label || index}-${worker.updated || worker.started || index}`, type: 'worker', title: worker.label || 'Unnamed worker', session: worker.session, model: worker.model, effort: worker.effort, time: worker.updated || worker.started, state: worker.state || 'unknown', source: worker }));
    const committees = [...asArray(feeds.committees && feeds.committees.decisions), ...asArray(feeds.committees && feeds.committees.execution)];
    committees.forEach((committee, index) => { const item = { id: `committee-${committee.session || committee.name || index}-${committee.updated || committee.created || index}`, type: 'committee', title: committee.name || 'Committee', session: committee.session, model: null, effort: null, time: committee.updated || committee.created, state: committee.status === 'deciding' ? 'live' : committee.status === 'done' ? 'done' : committee.status || 'unknown', source: committee }; nextEntries.push(item); if (committee.judgement === 'died') nextNeeds.push({ id: item.id, type: 'committee', flag: 'Recovered hang', title: committee.name || 'Committee recovery', text: 'A committee died and needs a recovery decision.', source: item.source }); else if (isStrategic(committee) && committee.status !== 'done') nextNeeds.push({ id: item.id, type: 'committee', flag: 'Strategic gate', title: committee.name || 'Strategic committee', text: committee.description || 'Strategic judgement is needed.', source: item.source }); });
    asArray(feeds.plans && feeds.plans.plans).forEach((plan, index) => { const base = { id: `plan-${plan.id || plan.session || plan.name || index}`, type: 'plan', title: plan.name || 'Execution plan', session: plan.session, model: plan.author_model, effort: plan.author_effort, time: plan.updated || plan.created || plan.started, state: plan.status === 'done' ? 'done' : plan.status === 'live' ? 'live' : 'planned', source: plan }; nextEntries.push(base); walkNodes(plan.stages, node => { const state = node.progress || node.status || 'todo'; const current = state === 'doing' || state === 'live'; nextEntries.push({ id: `${base.id}-node-${node.id || node.name || node.action || Math.random()}`, type: 'plan', title: titleForNode(node), session: plan.session, model: node.model || plan.author_model, effort: node.effort || plan.author_effort, time: node.updated || plan.updated || plan.created, state, source: plan, focus: node, current }); if (node.actor === 'human' && state !== 'done') nextNeeds.push({ id: `${base.id}-node-${node.id || node.name || node.action || index}`, type: 'plan', flag: 'Decision required', title: titleForNode(node), text: node.description || node.detail || 'This plan step needs a human decision.', source: plan }); }); });
    nextEntries.sort((left, right) => dateMs(right.time) - dateMs(left.time));
    return { entries: nextEntries, needs: nextNeeds };
  }
  function statusMarkup() { const source = feeds.status || {}; const state = source.status || source.state || (failed.size ? 'degraded' : 'live'); const label = state === 'live' || state === 'ok' ? '● Live' : failed.size ? '! Feed unavailable' : esc(state); return `<b>${label}</b> · ${entries.length} recorded items`; }
  function itemMatches(item) { const haystack = `${item.title} ${item.session || ''} ${item.state || ''} ${item.model || ''}`.toLowerCase(); return filterState.types.has(item.type) && (filterState.state === 'all' || item.state === filterState.state) && haystack.includes(filterState.query); }
  function renderNeeds() { $('needsCount').textContent = needs.length ? `${needs.length} decision${needs.length === 1 ? '' : 's'} waiting` : 'Clear for now'; $('needsList').innerHTML = needs.length ? needs.map(item => `<button class="need" type="button" data-open="${esc(item.id)}"><span class="need-flag" aria-hidden="true">◆</span><span class="need-title">${esc(item.title)}</span><span class="need-meta">${esc(item.flag)} · ${esc(item.text)}</span></button>`).join('') : '<div class="empty">No decisions are waiting for you.</div>'; }
  function entryMarkup(item) { const title = item.focus ? `${item.title} <span class="visually-hidden">in ${esc(item.source.name || 'execution plan')}</span>` : item.title; return `<button class="entry ${activeId === item.id ? 'active' : ''}" type="button" data-open="${esc(item.id)}"><time class="timestamp" datetime="${esc(item.time || '')}">${esc(relative(item.time))}</time><span class="dot ${item.type}" aria-hidden="true"></span><span class="entry-main"><span class="entry-line"><span class="kind">${esc(item.type[0].toUpperCase() + item.type.slice(1))}</span><span class="entry-title">${title}</span></span><span class="entry-meta">${item.session ? `<span>${esc(item.session)}</span>` : ''}${chip(item.model, item.effort)}${badge(item.state)}</span></span></button>`; }
  function renderTimeline() { const shown = entries.filter(itemMatches); $('timelineCount').textContent = shown.length ? `${shown.length} shown · newest first` : 'No matching activity'; $('timeline').innerHTML = failed.size ? `<div class="unavailable">! Some feeds are unavailable. Showing the last successfully loaded activity.</div>` : ''; $('timeline').innerHTML += shown.length ? shown.map(entryMarkup).join('') : '<div class="empty">No activity matches these filters yet.</div>'; }
  function render() { $('status').innerHTML = statusMarkup(); renderNeeds(); renderTimeline(); }
  function sourceSlot() { return '<section class="detail-block source-slot"><h3>Source document</h3><p>Issue preview, comment thread, and composer appear here when the integration provides them.</p></section>'; }
  function workerDetail(item) { const worker = item.source; return `<div class="detail-meta">${chip(worker.model, worker.effort)}${badge(worker.state || 'unknown')}</div><section class="detail-block"><h3>Task</h3><p class="plan-intro">${esc(worker.label || 'Unnamed worker')}</p></section><section class="detail-block"><h3>Work record</h3><div class="detail-grid"><div class="detail-row"><strong>State</strong>${badge(worker.state || 'unknown')}</div><div class="detail-row"><strong>Elapsed</strong>${esc(elapsed(worker.started || worker.updated))}</div><div class="detail-row"><strong>Current activity</strong><span>${esc(worker.activity || worker.detail || worker.message || 'No current activity reported.')}</span></div></div></section>${sourceSlot()}`; }
  function committeeDetail(item) { const committee = item.source; const members = asArray(committee.members || committee.reviews); return `<div class="detail-meta">${badge(committee.status || 'unknown')}</div><section class="detail-block"><h3>Subject</h3><p class="plan-intro">${esc(committee.name || 'Committee')}</p></section><section class="detail-block"><h3>Summary</h3><p>${esc(committee.description || committee.summary || 'No committee summary reported.')}</p></section><section class="detail-block"><h3>Members</h3>${members.length ? members.map((member, index) => `<button class="member" type="button" data-member aria-expanded="false"><span class="member-head"><span><span class="member-name">${esc(member.name || member.model || `Reviewer ${index + 1}`)}</span> ${chip(member.model, member.effort)}</span>${badge(member.verdict || member.status || 'reviewed')}</span></span><span class="member-comment">${esc(member.comment || member.review || member.reason || 'No written review was reported.')}</span></button>`).join('') : '<div class="empty">No member reviews are reported yet.</div>'}</section>${sourceSlot()}`; }
  function stepMarkup(step, index) { const children = asArray(step.steps); return `<article class="step"><span class="step-num">${index + 1}</span><div><div class="step-title">${esc(titleForNode(step))}</div><div class="step-meta">${badge(step.progress || step.status || 'todo')}${step.actor ? `<span class="badge">${esc(step.actor)} actor</span>` : ''}${step.actor === 'ai' ? chip(step.model, step.effort) : ''}${step.committee ? '<span class="badge">Committee</span>' : ''}</div>${step.description || step.detail ? `<p class="step-body">${esc(step.description || step.detail)}</p>` : ''}${children.length ? `<div class="steps">${children.map(stepMarkup).join('')}</div>` : ''}</div></article>`; }
  function planDetail(item) { const plan = item.source; const counts = planRollup(plan); const phases = asArray(plan.stages); return `<div class="detail-meta">${chip(plan.author_model, plan.author_effort)}${badge(plan.status || 'planned')}</div><section class="detail-block"><h3>Plan summary</h3><p class="plan-intro">${esc(planSummary(plan))}</p></section><section class="detail-block"><h3>Author</h3><p>${chip(plan.author_model, plan.author_effort) || 'Not reported'}</p></section><section class="detail-block"><h3>Actor rollup</h3><div class="rollup"><span class="badge">AI ${counts.ai}</span><span class="badge waiting">Human ${counts.human}</span><span class="badge">Mix ${counts.mix}</span></div></section><section class="detail-block"><div class="section-heading"><h3>Phases</h3><div class="filter-group"><button class="action" type="button" data-plan-expand>Expand all</button><button class="action" type="button" data-plan-collapse>Collapse all</button></div></div>${phases.length ? phases.map((phase, index) => `<div class="accordion phase"><details ${index === 0 ? 'open' : ''}><summary aria-expanded="${index === 0 ? 'true' : 'false'}"><span>${esc(phase.name || phase.action || `Phase ${index + 1}`)}</span>${badge(phase.progress || phase.status || 'todo')}</summary><div class="accordion-content"><div class="steps">${asArray(phase.steps).length ? asArray(phase.steps).map(stepMarkup).join('') : stepMarkup(phase, 0)}</div></div></details></div>`).join('') : '<div class="empty">This plan has no phases reported yet.</div>'}</section>${sourceSlot()}`; }
  function isOverlay() { return window.innerWidth < 1440; }
  function setDrawerSemantics() { const overlay = isOverlay(); const drawer = $('drawer'); drawer.setAttribute('role', overlay ? 'dialog' : 'complementary'); drawer.setAttribute('aria-modal', overlay ? 'true' : 'false'); }
  function openDetail(id, opener) { const item = entries.find(entry => entry.id === id) || needs.find(need => need.id === id); if (!item) return; activeId = id; $('expand').disabled = false; $('collapse').disabled = false; openingElement = opener || document.activeElement; $('drawerKicker').textContent = `${item.type.toUpperCase()} DETAIL`; $('drawerTitle').textContent = item.title; $('drawerBody').innerHTML = `<div class="drawer-content">${item.type === 'worker' ? workerDetail(item) : item.type === 'committee' ? committeeDetail(item) : planDetail(item)}</div>`; setDrawerSemantics(); $('drawer').classList.add('open'); $('backdrop').classList.toggle('open', isOverlay()); $('drawer').setAttribute('aria-hidden', 'false'); renderTimeline(); requestAnimationFrame(() => $('closeDrawer').focus()); }
  function closeDetail() { activeId = null; $('expand').disabled = true; $('collapse').disabled = true; $('drawer').classList.remove('open'); $('backdrop').classList.remove('open'); $('drawer').setAttribute('aria-hidden', 'true'); renderTimeline(); if (openingElement && document.contains(openingElement)) openingElement.focus(); openingElement = null; }
  function trapFocus(event) { if (!isOverlay() || !$('drawer').classList.contains('open') || event.key !== 'Tab') return; const targets = [...$('drawer').querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(element => !element.disabled); if (!targets.length) return; const first = targets[0]; const last = targets[targets.length - 1]; if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); } else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); } }
  async function fetchJson(url) { const response = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, { cache: 'no-store' }); if (!response.ok) throw new Error(String(response.status)); return response.json(); }
  async function refresh(initial = false) { if (!initial && document.hidden) return; const results = await Promise.allSettled([fetchJson('/brain-status'), fetchJson('/committee-feed'), fetchJson('/builder-feed'), fetchJson('/exec-plan-feed')]); [[results[0], 'status'], [results[1], 'committees'], [results[2], 'workers'], [results[3], 'plans']].forEach(([result, key]) => { if (result.status === 'fulfilled') { feeds[key] = result.value; failed.delete(key); } else failed.add(key); }); const next = buildData(); if (hasRendered && document.visibilityState === 'visible' && document.activeElement && document.activeElement !== document.body) { const existing = new Set(entries.map(item => item.id)); const count = next.entries.filter(item => !existing.has(item.id)).length; if (count) { queuedEntries = next; $('newActivity').hidden = false; $('newActivity').textContent = `New activity (${count})`; $('liveRegion').textContent = `${count} new activity item${count === 1 ? '' : 's'} available.`; return; } } entries = next.entries; needs = next.needs; hasRendered = true; render(); }
  document.addEventListener('click', event => { const opener = event.target.closest('[data-open]'); if (opener) { openDetail(opener.dataset.open, opener); return; } const member = event.target.closest('[data-member]'); if (member) { const expanded = member.classList.toggle('open'); member.setAttribute('aria-expanded', String(expanded)); } if (event.target.closest('[data-plan-expand]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => { detail.open = true; detail.querySelector('summary').setAttribute('aria-expanded', 'true'); }); if (event.target.closest('[data-plan-collapse]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => { detail.open = false; detail.querySelector('summary').setAttribute('aria-expanded', 'false'); }); });
  $('closeDrawer').addEventListener('click', closeDetail); $('backdrop').addEventListener('click', closeDetail); $('expand').addEventListener('click', () => $('drawerBody').querySelectorAll('details').forEach(detail => { detail.open = true; detail.querySelector('summary').setAttribute('aria-expanded', 'true'); })); $('collapse').addEventListener('click', () => $('drawerBody').querySelectorAll('details').forEach(detail => { detail.open = false; detail.querySelector('summary').setAttribute('aria-expanded', 'false'); })); $('newActivity').addEventListener('click', () => { if (!queuedEntries) return; entries = queuedEntries.entries; needs = queuedEntries.needs; queuedEntries = null; $('newActivity').hidden = true; render(); });
  document.addEventListener('keydown', event => { if (event.key === 'Escape' && $('drawer').classList.contains('open')) closeDetail(); trapFocus(event); });
  $('search').addEventListener('input', event => { filterState.query = event.target.value.trim().toLowerCase(); renderTimeline(); });
  document.querySelectorAll('[data-type]').forEach(button => button.addEventListener('click', () => { const type = button.dataset.type; filterState.types.has(type) ? filterState.types.delete(type) : filterState.types.add(type); button.setAttribute('aria-pressed', String(filterState.types.has(type))); renderTimeline(); }));
  document.querySelectorAll('[data-state]').forEach(button => button.addEventListener('click', () => { filterState.state = button.dataset.state; document.querySelectorAll('[data-state]').forEach(other => other.setAttribute('aria-pressed', String(other === button))); renderTimeline(); }));
  $('drawerBody').addEventListener('toggle', event => { if (event.target.matches('details')) event.target.querySelector('summary').setAttribute('aria-expanded', String(event.target.open)); }, true);
  window.addEventListener('resize', () => { setDrawerSemantics(); if ($('drawer').classList.contains('open')) $('backdrop').classList.toggle('open', isOverlay()); });
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
  refresh(true); setInterval(() => refresh(), 6000);
})();
</script>
