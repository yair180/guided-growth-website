ber{width:100%;padding:14px 0;border:0;border-top:1px solid var(--border);background:transparent;text-align:left}.member:first-child{border-top:0}.member-top{display:grid;grid-template-columns:32px minmax(0,1fr) auto;gap:10px;align-items:center}.initial{display:grid;place-items:center;width:32px;height:32px;border-radius:9px;background:var(--surface);color:var(--muted);font-size:13px;font-weight:700}.member-name{font-size:16px;font-weight:650;line-height:1.4;overflow-wrap:anywhere}.member-chevron{color:var(--muted);font-size:18px}.member[aria-expanded="true"] .member-chevron{transform:rotate(180deg)}.member-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0 0 42px}.member-comment{display:none;margin:12px 0 0 42px;color:var(--muted);white-space:pre-wrap;font-size:15px;line-height:1.65}.member[aria-expanded="true"]+.member-comment{display:block}.steps{position:relative}.step{position:relative;display:grid;grid-template-columns:32px minmax(0,1fr);gap:12px;padding:18px 0}.step+.step{border-top:1px solid var(--border)}.step:not(:last-child):before{content:"";position:absolute;top:50px;bottom:-1px;left:15px;width:2px;background:color-mix(in srgb,var(--border) 80%,transparent)}.step-state{position:relative;z-index:1;display:grid;place-items:center;width:32px;height:32px;border:1px solid var(--border);border-radius:50%;background:var(--surface);color:var(--muted);font-size:13px;font-weight:700}.step-state.human{border-color:var(--need);background:var(--need-bg);color:var(--need)}.step-state.mix{border-color:var(--focus);color:var(--focus)}.step-title{font-size:16px;font-weight:650;line-height:1.45;overflow-wrap:anywhere}.step-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.step-body{margin-top:10px;color:var(--muted);font-size:15px;line-height:1.65;overflow-wrap:anywhere}.substeps{display:grid;gap:8px;margin-top:14px;padding-left:12px;border-left:2px solid var(--border)}.substep{color:var(--muted);font-size:14px;line-height:1.55}.source-placeholder{padding:18px;border:1px dashed var(--border);border-radius:10px;background:var(--inset);color:var(--muted);font-size:14px;line-height:1.6}.visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

<body>
<main class="app" id="app">
  <header class="masthead"><div><p class="eyebrow">Human Relay</p><h1>Command Center</h1></div><p class="vitals" id="status">Loading live coordination feeds.</p></header>
  <section class="needs-zone" aria-labelledby="needsTitle"><div class="section-head"><div><p class="section-label">Founder handoffs</p><h2 id="needsTitle">Needs you</h2></div><span class="needs-count" id="needsCount">Checking for calls</span></div><div class="need-list" id="needsList"></div></section>
  <section class="controls" aria-label="Timeline controls"><div class="search-field"><label for="search">Search activity</label><input id="search" type="search" autocomplete="off" placeholder="Search the timeline"></div><div class="filter-cluster" role="group" aria-label="Type filters"><span class="filter-label">Type</span><button class="pill" data-type="worker" aria-pressed="true">Worker</button><button class="pill" data-type="committee" aria-pressed="true">Committee</button><button class="pill" data-type="plan" aria-pressed="true">Plan</button></div><div class="filter-cluster" role="group" aria-label="State filter"><span class="filter-label">State</span><button class="pill" data-state="all" aria-pressed="true">All</button><button class="pill" data-state="live" aria-pressed="false">Live</button><button class="pill" data-state="done" aria-pressed="false">Done</button><button class="pill" data-state="needs-you" aria-pressed="false">Needs you</button></div></section>
  <section class="timeline-section" aria-labelledby="timelineTitle"><div class="section-head"><div><p class="section-label">Every relay</p><h2 id="timelineTitle">Timeline</h2></div><div><span class="section-count" id="timelineCount"></span><button class="text-action new-activity" id="newActivity" hidden></button></div></div><div id="notices"></div><div id="timeline"></div></section>
</main>
<div class="backdrop" id="backdrop" aria-hidden="true"></div>
<aside class="drawer" id="drawer" aria-labelledby="drawerTitle" aria-hidden="true"><header class="drawer-head"><div><p class="drawer-kicker" id="drawerKicker">Detail</p><h2 id="drawerTitle">Select an item</h2></div><button class="close" id="closeDrawer" aria-label="Close detail">×</button></header><div class="drawer-body" id="drawerBody"><div class="empty">Choose any handoff or timeline item to open its full context.</div></div></aside>
<div class="visually-hidden" id="liveRegion" aria-live="polite"></div>
<script>
(() => {
  const feeds = { status: null, committees: null, workers: null, plans: null };
  const failed = new Set(); let entries = []; let needs = []; let activeId = null; let openingElement = null; let initialLoad = true; let queuedCount = 0;
  const filterState = { types: new Set(['worker', 'committee', 'plan']), state: 'all', query: '' };
  const $ = id => document.getElementById(id);
  const esc = value => String(value ?? '').replace(/[&<>'"]/g, char => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[char]));
  const asArray = value => Array.isArray(value) ? value : [];
  const dateMs = value => { const result = Date.parse(value || ''); return Number.isFinite(result) ? result : 0; };
  const relative = value => { const ms = dateMs(value); if (!ms) return 'time unknown'; const seconds = Math.max(0, Math.floor((Date.now() - ms) / 1000)); if (seconds < 45) return 'just now'; if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`; return `${Math.floor(seconds / 86400)}d ago`; };
  const elapsed = value => { const ms = dateMs(value); if (!ms) return 'unknown'; const seconds = Math.max(0, Math.floor((Date.now() - ms) / 1000)); if (seconds < 3600) return `${Math.floor(seconds / 60)}m`; if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ${Math.floor(seconds % 3600 / 60)}m`; return `${Math.floor(seconds / 86400)}d ${Math.floor(seconds % 86400 / 3600)}h`; };
  const stateClass = value => { const state = String(value || '').toLowerCase(); if (/done|complete|green|passed/.test(state)) return 'done'; if (/block|fail|bad|died|error/.test(state)) return 'error'; if (/wait|todo|stalled|could|need/.test(state)) return 'needs'; if (/live|running|deciding|doing/.test(state)) return 'live'; return ''; };
  const heat = effort => effort === 'low' ? 'cool' : effort === 'high' ? 'hot' : 'neutral';
  const chip = (model, effort) => model ? `<span class="chip ${heat(effort)}">${esc(model)}${effort ? ` @ ${esc(effort)}` : ' @ standard'}</span>` : '';
  const badge = value => { const label = String(value || 'unknown').replace(/_/g, ' '); return `<span class="state ${stateClass(label)}">${esc(label)}</span>`; };
  const titleForNode = node => node.name || node.action || 'Plan step';
  function walkNodes(nodes, callback, depth = 0) { asArray(nodes).forEach(node => { callback(node, depth); walkNodes(node.steps, callback, depth + 1); }); }
  function planSummary(plan) { const first = asArray(plan.stages)[0]; return plan.summary || plan.description || plan.phase || (first && (first.action || first.name)) || 'Execution plan'; }
  function planRollup(plan) { const counts = { ai: 0, human: 0, mix: 0 }; walkNodes(plan.stages, node => { if (counts[node.actor] !== undefined) counts[node.actor]++; }); return counts; }
  function isStrategic(committee) { return /strategic|gate|decision|direction|approve|approval/i.test(`${committee.name || ''} ${committee.description || ''}`); }
  function makeData() {
    entries = []; needs = [];
    const workers = [...asArray(feeds.workers && feeds.workers.running), ...asArray(feeds.workers && feeds.workers.recent)];
    workers.forEach((worker, index) => entries.push({ id: `worker-${worker.session || worker.label || index}-${worker.updated || worker.started || index}`, type: 'worker', title: worker.label || 'Unnamed worker', session: worker.session, model: worker.model, effort: worker.effort, time: worker.updated || worker.started, state: worker.state || 'unknown', source: worker }));
    const committees = [...asArray(feeds.committees && feeds.committees.decisions), ...asArray(feeds.committees && feeds.committees.execution)];
    committees.forEach((committee, index) => { const item = { id: `committee-${committee.session || committee.name || index}-${committee.updated || committee.created || index}`, type: 'committee', title: committee.name || 'Committee', session: committee.session, model: null, effort: null, time: committee.updated || committee.created, state: committee.status === 'deciding' ? 'live' : committee.status === 'done' ? 'done' : committee.status || 'unknown', source: committee }; entries.push(item); if (committee.judgement === 'died') needs.push({ id: item.id, type: 'committee', flag: 'Recovery decision', title: committee.name || 'Committee recovery', text: 'Choose how this stalled committee should recover.', source: item.source }); else if (isStrategic(committee) && committee.status !== 'done') needs.push({ id: item.id, type: 'committee', flag: 'Strategic gate', title: committee.name || 'Strategic committee', text: committee.description || 'A clear strategic judgement is needed to continue.', source: item.source }); });
    asArray(feeds.plans && feeds.plans.plans).forEach((plan, index) => { const base = { id: `plan-${plan.id || plan.session || plan.name || index}`, type: 'plan', title: plan.name || 'Execution plan', session: plan.session, model: plan.author_model, effort: plan.author_effort, time: plan.updated || plan.created || plan.started, state: plan.status === 'done' ? 'done' : plan.status === 'live' ? 'live' : 'planned', source: plan }; entries.push(base); walkNodes(plan.stages, node => { const nodeState = node.progress || node.status || 'todo'; const current = nodeState === 'doing' || nodeState === 'live'; entries.push({ id: `${base.id}-node-${node.id || node.name || node.action || Math.random()}`, type: 'plan', title: `${plan.name || 'Plan'}: ${titleForNode(node)}`, session: plan.session, model: node.model || plan.author_model, effort: node.effort || plan.author_effort, time: node.updated || plan.updated || plan.created, state: current ? 'live' : /done|complete/.test(nodeState) ? 'done' : nodeState, source: plan, node }); if (node.actor === 'human' && nodeState === 'todo') needs.push({ id: `${base.id}-need-${node.id || node.name || node.action}`, type: 'plan', flag: 'Human decision', title: titleForNode(node), text: `${plan.name || 'Execution plan'} · ${node.action || node.name || 'Decision required'}`, source: plan, node }); }); });
    entries.sort((a, b) => dateMs(b.time) - dateMs(a.time));
  }
  function matches(item) { const haystack = `${item.type} ${item.title} ${item.session || ''} ${item.state || ''} ${item.model || ''}`.toLowerCase(); const state = String(item.state || '').toLowerCase(); const live = /^(live|running|deciding|doing)$/.test(state); const done = /^(done|complete|completed)$/.test(state); const needsYou = needs.some(need => need.id === item.id || (need.source === item.source && (!need.node || need.node === item.node))); const stateOk = filterState.state === 'all' || (filterState.state === 'live' && live) || (filterState.state === 'done' && done) || (filterState.state === 'needs-you' && needsYou); return filterState.types.has(item.type) && stateOk && (!filterState.query || haystack.includes(filterState.query)); }
  function render() { renderHeader(); renderNotices(); renderNeeds(); renderTimeline(); }
  function renderHeader() { const status = feeds.status; if (!status) { $('status').innerHTML = '<b>Live status unavailable</b> · The board is still ready for incoming feeds.'; return; } const load = Array.isArray(status.load) ? status.load[0] : status.load; const updated = status.ts ? ` · updated ${relative(status.ts)}` : ''; $('status').innerHTML = `<b>${esc(status.box || 'Command Center')}</b>${load !== undefined ? ` · load ${esc(load)}` : ''}${status.disk_pct ? ` · disk ${esc(status.disk_pct)}` : ''}${status.live_agent_count !== undefined ? ` · ${esc(status.live_agent_count)} live` : ''}${updated}`; }
  function renderNotices() { const labels = { status: 'Brain status', committees: 'Committee', workers: 'Worker', plans: 'Execution plan' }; $('notices').innerHTML = [...failed].map(key => `<p class="notice">! ${labels[key]} feed is unavailable. Other activity remains available.</p>`).join(''); }
  function renderNeeds() { $('needsCount').textContent = needs.length ? `${needs.length} call${needs.length === 1 ? '' : 's'} awaiting you` : 'No calls awaiting you'; $('needsList').innerHTML = needs.length ? needs.map((need, index) => `<button class="need-card${index === 0 && needs.length % 2 ? ' urgent' : ''}" data-open="${esc(need.id)}"><span class="need-band"><span>◆ ${esc(need.flag)}</span><span>${need.source && (need.source.updated || need.source.created) ? esc(relative(need.source.updated || need.source.created)) : 'Open now'}</span></span><span class="need-body"><span class="need-title">${esc(need.title)}</span><span class="need-text">${esc(need.text)}</span></span></button>`).join('') : '<div class="empty">Nothing needs a human decision right now. When a clear handoff arrives, it will appear here.</div>'; }
  function dayName(value) { const ms = dateMs(value); if (!ms) return 'Undated activity'; const today = new Date(); const date = new Date(ms); if (date.toDateString() === today.toDateString()) return 'Today'; const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1); if (date.toDateString() === yesterday.toDateString()) return 'Yesterday'; return date.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' }); }
  function renderTimeline() { const filtered = entries.filter(matches); $('timelineCount').textContent = filtered.length ? `${filtered.length} item${filtered.length === 1 ? '' : 's'}` : ''; const groups = filtered.reduce((map, item) => { const key = dayName(item.time); (map.get(key) || map.set(key, []).get(key)).push(item); return map; }, new Map()); $('timeline').innerHTML = filtered.length ? [...groups].map(([day, items]) => `<section class="day-group" aria-label="${esc(day)}"><h3 class="day-label">${esc(day)}</h3><div class="timeline">${items.map(item => `<button class="entry${activeId === item.id ? ' active' : ''}${stateClass(item.state) === 'live' ? ' is-live' : ''}" data-open="${esc(item.id)}"><span class="type-tile ${item.type}">${esc(item.type)}</span><span class="entry-content"><span class="entry-title">${esc(item.title)}</span><span class="entry-footer">${item.session ? `<span class="session">${esc(item.session)}</span>` : ''}${chip(item.model, item.effort)}${badge(item.state)}<span class="timestamp">${relative(item.time)}</span></span></span></button>`).join('')}</div></section>`).join('') : '<div class="empty">No timeline items match these controls. Adjust the filters or wait for the live feeds.</div>'; }
  function findItem(id) { return entries.find(item => item.id === id) || needs.find(item => item.id === id); }
  function facts(rows) { return `<div class="facts">${rows.map(([key, value]) => `<div class="fact"><span>${esc(key)}</span><strong>${value || 'Unknown'}</strong></div>`).join('')}</div>`; }
  function sourceSlot() { return '<section class="detail-card"><h3>Source document</h3><div class="source-placeholder">Issue preview, comment thread, and composer will appear here when the source integration provides them.</div></section>'; }
  function workerDetail(item) { const worker = item.source; return `<div class="detail-meta">${chip(worker.model, worker.effort)}${badge(worker.state)}</div><section class="detail-card"><h3>What it is doing</h3><p class="summary">${esc(worker.label || 'No task label reported.')}</p></section><section class="detail-card"><h3>Worker context</h3>${facts([['State', esc(worker.state || 'unknown')], ['Host', esc(worker.host || 'unknown')], ['Started', worker.started ? `${esc(new Date(worker.started).toLocaleString())} · ${esc(elapsed(worker.started))}` : 'Unknown'], ['Last update', worker.updated ? esc(relative(worker.updated)) : 'Unknown']])}</section>${sourceSlot()}`; }
  function committeeDetail(item) { const committee = item.source; const members = asArray(committee.rounds).flatMap(round => asArray(round.members)); const honest = { green: 'Green', judged_bad: 'Real defects', could_not_judge: 'Could not judge', died: 'Died', deciding: 'Deciding' }[committee.judgement] || committee.judgement || committee.status || 'Unknown'; return `<div class="detail-meta">${badge(honest)}${badge(committee.status || 'unknown')}</div><section class="detail-card"><h3>Subject</h3><p class="summary">${esc(committee.description || 'No committee description reported.')}</p></section><section class="detail-card"><h3>Honest judgement</h3><p>${esc(honest)}</p></section><section class="detail-card"><h3>Members</h3><div class="accordion"><details open><summary>${members.length} member${members.length === 1 ? '' : 's'} across reported rounds</summary><div class="accordion-content">${members.length ? members.map((member, index) => { const memberId = `member-comment-${index}`; const role = member.role || 'Member'; return `<button class="member" data-member aria-expanded="false" aria-controls="${memberId}"><span class="member-top"><span class="initial">${esc(role.charAt(0).toUpperCase())}</span><span class="member-name">${esc(role)}</span><span class="member-chevron" aria-hidden="true">⌄</span></span><span class="member-meta">${chip(member.model || member.role, member.effort)}${badge(member.verdict || 'no verdict')}</span></button><div class="member-comment" id="${memberId}">${esc(member.comment || member.does || 'No comment reported.')}</div>`; }).join('') : '<p>No member comments reported.</p>'}</div></details></div></section>${sourceSlot()}`; }
  function stepMarkup(node) { const actor = node.actor || 'ai'; const children = asArray(node.steps); const actorLabel = actor === 'human' ? 'Human' : actor === 'mix' ? 'Mix' : 'AI'; const icon = actor === 'human' ? 'H' : actor === 'mix' ? 'M' : 'A'; return `<div class="step"><span class="step-state ${esc(actor)}" aria-label="${esc(actorLabel)} step">${icon}</span><div><div class="step-title">${esc(titleForNode(node))}</div><div class="step-meta"><span class="state ${actor === 'human' ? 'needs' : ''}">${esc(actorLabel)}</span>${badge(node.progress || node.status || 'todo')}${actor === 'ai' ? chip(node.model, node.effort) : ''}${node.committee ? '<span class="state">◆ Committee</span>' : ''}</div>${node.action && node.action !== node.name ? `<div class="step-body">${esc(node.action)}</div>` : ''}${children.length ? `<div class="substeps">${children.map(child => `<div class="substep"><strong>${esc(titleForNode(child))}</strong> · ${esc(child.actor || 'ai')} · ${esc(child.progress || child.status || 'todo')}</div>`).join('')}</div>` : ''}</div></div>`; }
  function planDetail(item) { const plan = item.source; const counts = planRollup(plan); const phases = asArray(plan.stages); return `<div class="detail-meta">${chip(plan.author_model, plan.author_effort)}${badge(plan.status || 'planned')}</div><section class="detail-card"><h3>Plan summary</h3><p class="summary">${esc(planSummary(plan))}</p></section><section class="detail-card"><h3>Author</h3><p>${chip(plan.author_model, plan.author_effort) || 'Not reported'}</p></section><section class="detail-card"><h3>Actor rollup</h3><div class="rollup"><div class="rollup-item">AI ${counts.ai}</div><div class="rollup-item">Human ${counts.human}</div><div class="rollup-item">Mix ${counts.mix}</div></div></section><section class="detail-card"><div class="section-toolbar"><h3>Phases</h3><div class="toolbar-actions"><button class="text-action" data-plan-expand>Expand all</button><button class="text-action" data-plan-collapse>Collapse all</button></div></div>${phases.length ? phases.map((phase, index) => `<div class="accordion phase"><details ${index === 0 ? 'open' : ''}><summary>${esc(phase.name || phase.action || `Phase ${index + 1}`)}${badge(phase.progress || phase.status || 'todo')}</summary><div class="accordion-content"><div class="steps">${asArray(phase.steps).length ? asArray(phase.steps).map(stepMarkup).join('') : stepMarkup(phase)}</div></div></details></div>`).join('') : '<div class="empty">This plan has no phases reported yet.</div>'}</section>${sourceSlot()}`; }
  function isDocked() { return window.matchMedia('(min-width: 1440px)').matches; }
  function syncDrawerMode() { document.body.classList.toggle('drawer-docked', isDocked()); const overlay = !isDocked(); $('drawer').setAttribute('role', overlay ? 'dialog' : 'complementary'); $('drawer').setAttribute('aria-modal', overlay ? 'true' : 'false'); }
  function openDetail(id, trigger) { const item = findItem(id); if (!item) return; activeId = id; openingElement = trigger || document.activeElement; syncDrawerMode(); $('drawerKicker').textContent = `${item.type} detail`; $('drawerTitle').textContent = item.title; $('drawerBody').innerHTML = item.type === 'worker' ? workerDetail(item) : item.type === 'committee' ? committeeDetail(item) : planDetail(item); $('drawer').classList.add('open'); $('drawer').setAttribute('aria-hidden', 'false'); if (!isDocked()) { $('backdrop').style.pointerEvents = 'auto'; $('backdrop').style.opacity = '1'; } renderTimeline(); $('closeDrawer').focus(); }
  function closeDetail() { if (!$('drawer').classList.contains('open')) return; activeId = null; $('drawer').classList.remove('open'); $('drawer').setAttribute('aria-hidden', 'true'); $('backdrop').style.pointerEvents = 'none'; $('backdrop').style.opacity = '0'; renderTimeline(); if (openingElement && document.contains(openingElement)) openingElement.focus(); }
  function trapFocus(event) { if (event.key !== 'Tab' || isDocked() || !$('drawer').classList.contains('open')) return; const focusable = [...$('drawer').querySelectorAll('button,[href],input,select,textarea,[tabindex]:not([tabindex="-1"])')].filter(element => !element.disabled); if (!focusable.length) return; const first = focusable[0]; const last = focusable[focusable.length - 1]; if (event.shiftKey && document.activeElement === first) { event.preventDefault(); last.focus(); } else if (!event.shiftKey && document.activeElement === last) { event.preventDefault(); first.focus(); } }
  async function fetchJson(url) { const response = await fetch(`${url}${url.includes('?') ? '&' : '?'}_=${Date.now()}`, { cache: 'no-store' }); if (!response.ok) throw new Error(String(response.status)); return response.json(); }
  async function refresh(force = false) { if (!force && document.hidden) return; const before = new Set(entries.map(item => item.id)); const [status, committees, workers, plans] = await Promise.allSettled([fetchJson('/brain-status'), fetchJson('/committee-feed'), fetchJson('/builder-feed'), fetchJson('/exec-plan-feed')]); [[status, 'status'], [committees, 'committees'], [workers, 'workers'], [plans, 'plans']].forEach(([result, key]) => { if (result.status === 'fulfilled') { feeds[key] = result.value; failed.delete(key); } else failed.add(key); }); makeData(); const arrived = entries.filter(item => !before.has(item.id)).length; if (!initialLoad && document.hidden && arrived) { queuedCount += arrived; renderHeader(); renderNotices(); renderNeeds(); renderNewActivity(); return; } render(); initialLoad = false; }
  function renderNewActivity() { const button = $('newActivity'); button.hidden = !queuedCount; button.textContent = `${queuedCount} new activit${queuedCount === 1 ? 'y' : 'ies'}`; if (queuedCount) $('liveRegion').textContent = `${queuedCount} new timeline item${queuedCount === 1 ? '' : 's'} available.`; }
  document.addEventListener('click', event => { const opener = event.target.closest('[data-open]'); if (opener) { openDetail(opener.dataset.open, opener); return; } const member = event.target.closest('[data-member]'); if (member) { const expanded = member.getAttribute('aria-expanded') === 'true'; member.setAttribute('aria-expanded', String(!expanded)); } if (event.target.closest('[data-plan-expand]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => { detail.open = true; }); if (event.target.closest('[data-plan-collapse]')) $('drawerBody').querySelectorAll('.phase details').forEach(detail => { detail.open = false; }); });
  $('closeDrawer').addEventListener('click', closeDetail); $('backdrop').addEventListener('click', closeDetail); document.addEventListener('keydown', event => { if (event.key === 'Escape') closeDetail(); trapFocus(event); });
  $('search').addEventListener('input', event => { filterState.query = event.target.value.trim().toLowerCase(); renderTimeline(); });
  document.querySelectorAll('[data-type]').forEach(button => button.addEventListener('click', () => { const type = button.dataset.type; filterState.types.has(type) ? filterState.types.delete(type) : filterState.types.add(type); button.setAttribute('aria-pressed', String(filterState.types.has(type))); renderTimeline(); }));
  document.querySelectorAll('[data-state]').forEach(button => button.addEventListener('click', () => { filterState.state = button.dataset.state; document.querySelectorAll('[data-state]').forEach(other => other.setAttribute('aria-pressed', String(other === button))); renderTimeline(); }));
  $('newActivity').addEventListener('click', () => { queuedCount = 0; renderNewActivity(); renderTimeline(); });
  document.addEventListener('visibilitychange', () => { if (!document.hidden) { queuedCount = 0; renderNewActivity(); refresh(); } });
  window.addEventListener('resize', syncDrawerMode); syncDrawerMode(); refresh(true); setInterval(() => refresh(), 6000);
})();
