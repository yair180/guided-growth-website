<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flow Designer · Guided Growth</title>
<style>
  :root{
    --bg:#f5f6f9; --panel:#ffffff; --soft:#eef0f5; --border:#e2e6ee; --border-2:#d2d8e4;
    --text:#171b24; --text-2:#5a6276; --muted:#8a90a2; --faint:#a8aec0;
    --info:#185fa5; --info-bg:#e6f1fb; --info-bd:#378add; --ok:#0f6e56; --ok-bg:#e1f5ee;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Inter",system-ui,sans-serif;line-height:1.5}
  .top{position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:12px;padding:12px 20px;background:rgba(245,246,249,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(140deg,#7c5cff,#5b8cff);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800}
  .ttl{font-size:15px;font-weight:700}
  .sub{font-size:11px;color:var(--muted);font-family:var(--mono)}
  .spacer{flex:1}
  .btn{font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--panel);border:1px solid var(--border-2);border-radius:8px;padding:7px 13px;color:var(--text-2)}
  .btn:hover{border-color:var(--info-bd);color:var(--info)}
  .btn.primary{background:var(--info-bg);border-color:var(--info-bd);color:var(--info)}
  main{display:grid;grid-template-columns:230px 1fr;gap:16px;padding:16px 20px 60px;max-width:1100px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  .ph{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:11px 13px 6px}
  .beat{display:flex;align-items:center;gap:8px;padding:9px 11px;margin:0 7px 5px;border-radius:9px;font-size:13px;cursor:pointer;border:1px solid transparent}
  .beat:hover{background:var(--soft)}
  .beat.sel{background:var(--info-bg);border-color:var(--info-bd);color:var(--info);font-weight:600}
  .beat.dragging{opacity:.4}
  .grip{color:var(--faint);cursor:grab;font-family:var(--mono);font-size:13px}
  .bn{flex:1}
  .badge{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--soft);border-radius:5px;padding:1px 6px}
  .add{display:flex;align-items:center;gap:6px;padding:9px 11px;margin:2px 7px 9px;border-radius:9px;font-size:13px;color:var(--muted);cursor:pointer}
  .add:hover{color:var(--info)}
  .ed{padding:16px 18px}
  .lab{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:14px 0 6px}
  .lab:first-child{margin-top:0}
  input.line,textarea.line{width:100%;font:inherit;font-size:13.5px;color:var(--text);background:var(--panel);border:1px solid var(--border-2);border-radius:9px;padding:9px 11px;resize:vertical}
  .opts{display:flex;gap:7px;flex-wrap:wrap}
  .opt{font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--border-2);border-radius:8px;padding:7px 12px;color:var(--text-2);background:var(--panel)}
  .opt.on{border:2px solid var(--info-bd);background:var(--info-bg);color:var(--info)}
  .meta{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
  .pill{font-size:11px;color:var(--text-2);background:var(--soft);border-radius:7px;padding:3px 9px}
  .pill input{border:0;background:transparent;font:inherit;font-size:11px;color:var(--info);width:120px}
  .prev{margin-top:8px;background:var(--soft);border-radius:12px;padding:16px;display:flex;justify-content:center}
  .phone{width:330px;background:var(--panel);border:1px solid var(--border);border-radius:18px;overflow:hidden}
  .pbar{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500}
  .orb{width:24px;height:24px;border-radius:50%;background:var(--info-bg);color:var(--info);display:flex;align-items:center;justify-content:center;font-size:13px}
  .pbody{padding:14px;display:flex;flex-direction:column;gap:11px}
  .bub{background:var(--soft);border-radius:12px;padding:9px 12px;font-size:13px;max-width:84%;align-self:flex-start}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:12px}
  .row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px;border-top:1px solid var(--border)}
  .row:first-child{border-top:0}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .tile{border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:6px}
  .tile.sel{border:2px solid var(--info-bd);background:var(--info-bg);color:var(--info)}
  .day{width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;background:var(--info-bg);color:var(--info)}
  .day.off{background:transparent;border:1px solid var(--border-2);color:var(--faint)}
  .composer{margin-top:4px;padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center}
  .input{flex:1;height:34px;border:1px solid var(--border-2);border-radius:999px;display:flex;align-items:center;padding:0 13px;color:var(--faint);font-size:12.5px}
  .mic{width:34px;height:34px;border-radius:50%;background:var(--info-bg);color:var(--info);display:flex;align-items:center;justify-content:center;font-size:16px}
  dialog{border:1px solid var(--border-2);border-radius:12px;padding:0;max-width:640px;width:90%}
  dialog::backdrop{background:rgba(10,12,18,.4)}
  .dh{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);font-weight:600}
  pre{margin:0;padding:14px 16px;font-family:var(--mono);font-size:11.5px;max-height:60vh;overflow:auto;white-space:pre-wrap}
</style></head>
<body>
  <div class="top">
    <div class="logo">G</div>
    <div><div class="ttl">Flow Designer</div><div class="sub">onboarding &middot; design the cards, export the flow</div></div>
    <span class="spacer"></span>
    <button class="btn" onclick="resetFlow()">Reset</button>
    <button class="btn primary" onclick="exportFlow()">Export flow</button>
  </div>
  <main>
    <div class="panel">
      <div class="ph">Beats</div>
      <div id="beats"></div>
      <div class="add" onclick="addBeat()">+ Add beat</div>
    </div>
    <div class="panel"><div class="ed" id="editor"></div></div>
  </main>
  <dialog id="exp"><div class="dh">Flow JSON <span class="spacer" style="flex:1"></span><button class="btn" onclick="copyExp()">Copy</button> <button class="btn" onclick="document.getElementById('exp').close()" style="margin-left:8px">Close</button></div><pre id="expbody"></pre></dialog>

<script>
var COMPONENTS={
  none:{label:'Coach only'}, profile:{label:'Profile card'},
  choiceTiles:{label:'Two choice tiles'}, photoTiles:{label:'Photo tiles'},
  emojiTiles:{label:'Emoji tiles'}, listTiles:{label:'Compact list'},
  goalChips:{label:'Goal chips'}, habitCard:{label:'Habit card'},
  scheduleCard:{label:'Schedule + reminder'}, reflectionOptions:{label:'3 reflection options'},
  planCard:{label:'Plan summary'}
};
var DEFAULT=[
  {id:1,name:'Welcome',coach:'Hey, I am here with you. Ready when you are.',comp:'none',opts:['none'],rule:'',tool:''},
  {id:2,name:'Profile',coach:'What should I call you? And a couple quick things.',comp:'profile',opts:['profile'],rule:'name, age, gender, referral',tool:'submit_profile'},
  {id:3,name:'Path choice',coach:'Want me to walk you through it, or do you know what you are working on?',comp:'choiceTiles',opts:['choiceTiles'],rule:'beginner or advanced',tool:'submit_path_choice'},
  {id:4,name:'Category',coach:'What feels most worth improving right now?',comp:'photoTiles',opts:['photoTiles','emojiTiles','listTiles'],rule:'pick 1',tool:'submit_category'},
  {id:5,name:'Subcategory',coach:'Within that, what are you reaching for?',comp:'goalChips',opts:['goalChips','listTiles'],rule:'up to 2',tool:'submit_goals'},
  {id:6,name:'Habits',coach:'Here is a starting habit. Keep it or tweak it.',comp:'habitCard',opts:['habitCard'],rule:'1 to 2 habits',tool:'add_habit'},
  {id:7,name:'Reminders',coach:'When should I nudge you?',comp:'scheduleCard',opts:['scheduleCard'],rule:'time + days',tool:'update_habit'},
  {id:8,name:'Reflection',coach:'Want a short daily reflection too?',comp:'reflectionOptions',opts:['reflectionOptions'],rule:'guided / custom / freeform',tool:'submit_reflection_config'},
  {id:9,name:'Plan',coach:'Here is your plan. Good to go?',comp:'planCard',opts:['planCard'],rule:'confirm',tool:'confirm_plan'}
];
var KEY='flow-designer-v1';
var flow=load(), sel=flow[0]?flow[0].id:null, nextId=Math.max.apply(null,flow.map(function(b){return b.id;}).concat([0]))+1;
function load(){try{var s=JSON.parse(localStorage.getItem(KEY));if(s&&s.length)return s;}catch(e){}return JSON.parse(JSON.stringify(DEFAULT));}
function save(){try{localStorage.setItem(KEY,JSON.stringify(flow));}catch(e){}}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
function beatById(id){return flow.filter(function(b){return b.id===id;})[0];}

function renderBeats(){
  document.getElementById('beats').innerHTML=flow.map(function(b,i){
    return '<div class="beat'+(b.id===sel?' sel':'')+'" draggable="true" data-id="'+b.id+'" onclick="pick('+b.id+')">'
      +'<span class="grip">&#8942;</span><span class="bn">'+esc(b.name)+'</span><span class="badge">'+(i+1)+'</span></div>';
  }).join('');
  wireDrag();
}
function pick(id){sel=id;renderBeats();renderEditor();}

function renderEditor(){
  var b=beatById(sel); var e=document.getElementById('editor');
  if(!b){e.innerHTML='<p style="color:var(--muted)">Pick a beat.</p>';return;}
  var opts=b.opts.map(function(o){return '<button class="opt'+(b.comp===o?' on':'')+'" onclick="setComp(\''+o+'\')">'+COMPONENTS[o].label+'</button>';}).join('');
  e.innerHTML=''
    +'<div class="lab">Beat name</div><input class="line" value="'+esc(b.name)+'" oninput="setField(\'name\',this.value)">'
    +'<div class="lab">Coach line</div><textarea class="line" rows="2" oninput="setField(\'coach\',this.value)">'+esc(b.coach)+'</textarea>'
    +'<div class="lab">Component</div><div class="opts">'+opts+'</div>'
    +'<div class="meta"><span class="pill">Rule: <input value="'+esc(b.rule)+'" oninput="setField(\'rule\',this.value)"></span>'
    +'<span class="pill">Tool: <input value="'+esc(b.tool)+'" oninput="setField(\'tool\',this.value)"></span>'
    +'<button class="btn" style="margin-left:auto" onclick="removeBeat()">Remove beat</button></div>'
    +'<div class="lab">Preview</div><div class="prev">'+phone(b)+'</div>';
}
function setField(k,v){var b=beatById(sel);b[k]=v;save();if(k==='name')renderBeats();if(k!=='name')renderEditor();if(k==='coach'){var p=document.querySelector('.prev');if(p)p.innerHTML=phone(b);}}
function setComp(o){beatById(sel).comp=o;save();renderEditor();}

function phone(b){
  return '<div class="phone"><div class="pbar"><span class="orb">&#10022;</span>Coach</div><div class="pbody">'
    +'<div class="bub">'+esc(b.coach||'...')+'</div>'+comp(b.comp)
    +'</div><div class="composer"><div class="input">Type or talk...</div><div class="mic">&#127908;</div></div></div>';
}
function comp(c){
  if(c==='profile')return '<div class="card"><div class="row"><span style="color:var(--text-2)">Name</span><b>Sam</b></div><div class="row"><span style="color:var(--text-2)">Age</span><b>25 to 34</b></div><div class="row"><span style="color:var(--text-2)">Gender</span><b>Male</b></div><div class="row"><span style="color:var(--text-2)">Heard via</span><b>A friend</b></div></div>';
  if(c==='choiceTiles')return '<div class="tiles"><div class="tile sel">I am new</div><div class="tile">I have experience</div></div>';
  if(c==='photoTiles')return '<div class="tiles"><div class="tile sel">&#127769; Sleep better</div><div class="tile">&#127939; Move more</div><div class="tile">&#129367; Eat better</div><div class="tile">&#9889; More energy</div></div>';
  if(c==='emojiTiles')return '<div class="tiles"><div class="tile sel">&#127769; Sleep</div><div class="tile">&#127939; Move</div><div class="tile">&#129367; Eat</div><div class="tile">&#9889; Energy</div></div>';
  if(c==='listTiles')return '<div class="card"><div class="row sel" style="color:var(--info)">Sleep better</div><div class="row">Move more</div><div class="row">Eat better</div></div>';
  if(c==='goalChips')return '<div class="tiles"><div class="tile sel">Fall asleep earlier</div><div class="tile">Wake up earlier</div><div class="tile">Sleep deeper</div><div class="tile">More consistent</div></div>';
  if(c==='habitCard')return '<div class="card"><div style="font-weight:600;margin-bottom:9px">10-minute wind-down</div><div style="display:flex;gap:5px;margin-bottom:10px"><span class="day">M</span><span class="day">T</span><span class="day">W</span><span class="day">T</span><span class="day">F</span><span class="day off">S</span><span class="day off">S</span></div><div class="row">&#128336; 9:30 PM <span class="pill" style="margin-left:auto">Reminder on</span></div></div>';
  if(c==='scheduleCard')return '<div class="card"><div class="row"><span style="color:var(--text-2)">Time</span><b>9:30 PM</b></div><div style="display:flex;gap:5px;margin:9px 0"><span class="day">M</span><span class="day">T</span><span class="day">W</span><span class="day">T</span><span class="day">F</span><span class="day off">S</span><span class="day off">S</span></div><div class="row"><span style="color:var(--text-2)">Reminder</span><b style="color:var(--info)">On</b></div></div>';
  if(c==='reflectionOptions')return '<div class="card"><div class="row sel" style="color:var(--info)">Guided &middot; 3 questions</div><div class="row">Custom prompts</div><div class="row">Freeform</div></div>';
  if(c==='planCard')return '<div class="card"><div style="font-weight:600;margin-bottom:7px">Your plan</div><div class="row">10-minute wind-down &middot; 9:30 PM</div><div class="row">Evening reflection &middot; guided</div><div style="margin-top:10px"><span class="pill" style="background:var(--info-bg);color:var(--info)">Start plan</span></div></div>';
  return '<div style="font-size:12px;color:var(--faint)">No card, coach speaks only.</div>';
}

var drag=null;
function wireDrag(){
  document.querySelectorAll('.beat').forEach(function(el){
    el.addEventListener('dragstart',function(){drag=+el.dataset.id;el.classList.add('dragging');});
    el.addEventListener('dragend',function(){el.classList.remove('dragging');drag=null;});
    el.addEventListener('dragover',function(e){e.preventDefault();});
    el.addEventListener('drop',function(e){e.preventDefault();var to=+el.dataset.id;if(!drag||drag===to)return;
      var from=flow.findIndex(function(b){return b.id===drag;});var moved=flow.splice(from,1)[0];
      var at=flow.findIndex(function(b){return b.id===to;});flow.splice(at,0,moved);save();renderBeats();});
  });
}
function addBeat(){var b={id:nextId++,name:'New beat',coach:'',comp:'none',opts:['none','profile','photoTiles','goalChips','habitCard','scheduleCard','reflectionOptions','planCard','choiceTiles','listTiles','emojiTiles'],rule:'',tool:''};flow.push(b);sel=b.id;save();renderBeats();renderEditor();}
function removeBeat(){flow=flow.filter(function(b){return b.id!==sel;});sel=flow[0]?flow[0].id:null;save();renderBeats();renderEditor();}
function resetFlow(){if(confirm('Reset to the default flow?')){flow=JSON.parse(JSON.stringify(DEFAULT));sel=flow[0].id;save();renderBeats();renderEditor();}}
function exportFlow(){document.getElementById('expbody').textContent=JSON.stringify(flow.map(function(b){return {beat:b.name,coach:b.coach,component:b.comp,rule:b.rule,tool:b.tool};}),null,2);document.getElementById('exp').showModal();}
function copyExp(){navigator.clipboard.writeText(document.getElementById('expbody').textContent);}

renderBeats();renderEditor();
</script>
</body></html>
