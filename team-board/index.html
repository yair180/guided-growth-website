<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Issue Board · Guided Growth</title>
<style>
  :root{
    --bg:#13161d; --bg2:#10131a; --card:#1a1f2a; --card-hover:#1f2532; --colbg:#161b24;
    --border:#2b3340; --border-2:#363f4f; --border-strong:#475063;
    --text:#eef1f8; --text-2:#c2cad9; --muted:#8893a6; --faint:#525c6e;
    --accent:#7c5cff; --accent-2:#5b8cff;
    --feature:#5b8cff; --bug:#ff6b6b; --ai:#a98bff;
    --backlog:#6b7385; --colnext:#5b8cff; --doing:#f0a93f; --done:#2fc46f;
    --pri-high:#ff5470; --pri-med:#f0a93f; --pri-low:#6b7385;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  html.light{
    --bg:#f5f6f9; --bg2:#eef0f5; --card:#ffffff; --card-hover:#f7f8fc; --colbg:#eef0f5;
    --border:#e2e6ee; --border-2:#d6dbe6; --border-strong:#c2c9d8;
    --text:#171b24; --text-2:#444d5e; --muted:#6b7385; --faint:#9aa2b4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}

  .top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 90%,transparent);
    backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px);
    border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:29px;height:29px;border-radius:9px;background:linear-gradient(140deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .btxt{font-size:15px;font-weight:750;letter-spacing:-.01em}
  .bsub{font-size:10.5px;color:var(--muted);font-family:var(--mono)}
  .spacer{flex:1}
  .legend{display:flex;gap:11px;align-items:center;flex-wrap:wrap;font-size:11.5px;color:var(--muted)}
  .lg{display:inline-flex;align-items:center;gap:5px}
  .lg .sw{width:9px;height:9px;border-radius:3px}
  .syncind{font-size:11.5px;font-weight:600;border-radius:8px;padding:5px 10px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border-2);color:var(--muted)}
  .syncind .d{width:7px;height:7px;border-radius:50%;background:var(--muted)}
  .actbtn{font:inherit;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--border-2);border-radius:8px;padding:6px 11px;color:var(--text-2)}
  .actbtn:hover{border-color:var(--border-strong);color:var(--text)}

  .chips{display:flex;gap:7px;flex-wrap:wrap;padding:12px 22px 0;align-items:center}
  .flabel{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin-right:3px}
  .chip{font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 14px;color:var(--text-2);display:inline-flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip .n{font-family:var(--mono);font-size:11px;opacity:.8}

  main{padding:8px 22px 90px}
  .lane{margin-top:16px}
  .lane-head{display:flex;align-items:center;gap:10px;margin:0 0 9px;padding:5px 6px;border-radius:9px;cursor:pointer;user-select:none}
  .lane-head:hover{background:color-mix(in srgb,var(--accent) 7%,transparent)}
  .caret{font-size:11px;color:var(--muted);transition:transform .15s;transform:rotate(90deg)}
  .lane.collapsed .caret{transform:rotate(0deg)}
  .lane.collapsed .cols{display:none}
  .av{width:28px;height:28px;border-radius:8px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:750;color:#fff}
  .lname{font-size:15.5px;font-weight:700;letter-spacing:-.01em}
  .lcount{font-size:11.5px;color:var(--muted);font-family:var(--mono)}

  .cols{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .col{background:var(--colbg);border:1px solid var(--border);border-radius:11px;display:flex;flex-direction:column;min-height:70px}
  .col-head{display:flex;align-items:center;gap:7px;padding:9px 11px 7px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}
  .col-head .bar{width:16px;height:3px;border-radius:3px}
  .col-head .cn{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .col.c-backlog .bar{background:var(--backlog)} .col.c-next .bar{background:var(--colnext)}
  .col.c-doing .bar{background:var(--doing)} .col.c-done .bar{background:var(--done)}
  .col-body{display:flex;flex-direction:column;gap:7px;padding:0 8px 9px;max-height:62vh;overflow-y:auto;min-height:34px}
  .col-body.dragover{background:color-mix(in srgb,var(--accent) 9%,transparent);outline:1.5px dashed color-mix(in srgb,var(--accent) 45%,transparent);outline-offset:-3px;border-radius:8px}

  .card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:8px 9px;cursor:grab;position:relative}
  .card:hover{border-color:var(--border-strong);background:var(--card-hover)}
  .card.dragging{opacity:.4}
  .card .crow{display:flex;align-items:center;gap:6px;margin-bottom:5px}
  .chiptype{font-size:10px;font-weight:700;letter-spacing:.02em;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
  .t-feature{background:color-mix(in srgb,var(--feature) 18%,transparent);color:var(--feature)}
  .t-bug{background:color-mix(in srgb,var(--bug) 18%,transparent);color:var(--bug)}
  .t-ai{background:color-mix(in srgb,var(--ai) 20%,transparent);color:var(--ai)}
  .pri{width:8px;height:8px;border-radius:50%;flex:0 0 auto;margin-left:auto}
  .pri.high{background:var(--pri-high)} .pri.medium{background:var(--pri-med)} .pri.low{background:var(--pri-low)} .pri.unset{background:transparent;border:1px solid var(--border-2)}
  .ctitle{font-size:12.5px;line-height:1.4;color:var(--text);word-break:break-word}
  .thumb{display:block;width:100%;height:62px;object-fit:cover;border-radius:6px;margin-top:7px;border:1px solid var(--border);background:var(--bg2)}
  .card.done-card .ctitle{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border-strong)}
  .cmeta{display:flex;align-items:center;gap:7px;margin-top:6px}
  .iid{font-family:var(--mono);font-size:10px;color:var(--accent-2);border:1px solid color-mix(in srgb,var(--accent-2) 30%,transparent);border-radius:5px;padding:1px 5px}
  .iid:hover{background:color-mix(in srgb,var(--accent-2) 12%,transparent)}
  .screen{font-size:10px;color:var(--faint);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .movebtn{margin-left:auto;font:inherit;font-size:10px;font-weight:700;cursor:pointer;background:transparent;border:1px solid var(--border-2);border-radius:6px;padding:2px 7px;color:var(--muted);flex:0 0 auto}
  .movebtn:hover{border-color:var(--accent);color:var(--accent)}
  .empty{font-size:11px;color:var(--faint);font-style:italic;padding:8px 4px;text-align:center}

  .menu{position:fixed;z-index:100;background:var(--card);border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,.45);padding:5px;min-width:168px}
  .menu .mh{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);padding:5px 9px 4px}
  .menu .mi{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12.5px;color:var(--text-2)}
  .menu .mi:hover{background:var(--card-hover);color:var(--text)}
  .menu .av{width:20px;height:20px;border-radius:6px;font-size:10px}

  .ov{position:fixed;inset:0;background:rgba(8,10,14,.55);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:80;display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
  .sheet{background:var(--bg);border:1px solid var(--border-strong);border-radius:16px;max-width:680px;width:100%;box-shadow:0 24px 70px rgba(0,0,0,.5)}
  .sh-head{display:flex;align-items:flex-start;gap:10px;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
  .sh-title{font-size:16.5px;font-weight:750;line-height:1.35;letter-spacing:-.01em;flex:1}
  .sh-x{font:inherit;font-size:16px;line-height:1;cursor:pointer;background:transparent;border:0;color:var(--muted);padding:3px 7px;border-radius:7px}
  .sh-x:hover{background:var(--card-hover);color:var(--text)}
  .sh-body{padding:14px 18px 18px;max-height:60vh;overflow-y:auto}
  .sh-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px;align-items:center}
  .sh-shot{display:block;width:100%;max-height:300px;object-fit:contain;border-radius:9px;border:1px solid var(--border);background:var(--bg2);margin:4px 0 13px}
  .sh-desc{font-size:13px;line-height:1.6;color:var(--text-2);white-space:pre-wrap;word-break:break-word}
  .sh-sec{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);margin:16px 0 8px}
  .seg{display:inline-flex;gap:5px;flex-wrap:wrap}
  .segb{font:inherit;font-size:12px;font-weight:650;cursor:pointer;background:var(--card);border:1px solid var(--border-2);border-radius:8px;padding:5px 12px;color:var(--text-2)}
  .segb:hover{border-color:var(--accent)}
  .segb.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .sh-foot{display:flex;align-items:center;gap:10px;padding:12px 18px;border-top:1px solid var(--border);background:var(--colbg);border-radius:0 0 16px 16px}
  .sh-link{font:inherit;font-size:12.5px;font-weight:650;color:var(--accent-2)}
  .lblpill{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:5px;padding:2px 6px}
  .sh-titleinput{flex:1;font:inherit;font-size:16px;font-weight:750;color:var(--text);background:var(--card);border:1px solid var(--border-2);border-radius:8px;padding:6px 9px}
  .sh-edit{width:100%;font:inherit;font-size:13px;line-height:1.5;color:var(--text);background:var(--card);border:1px solid var(--border-2);border-radius:8px;padding:8px 10px;resize:vertical;min-height:130px}
  .sh-savebtn{margin-top:8px;font:inherit;font-size:12px;font-weight:700;cursor:pointer;background:var(--accent);border:1px solid var(--accent);border-radius:8px;padding:6px 13px;color:#fff}
  .sh-savebtn:hover{filter:brightness(1.08)}
  .sh-note{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 10px;margin-top:6px}
  .sh-notemeta{font-size:10px;color:var(--faint);font-family:var(--mono);margin-bottom:3px}
  .sh-notebody{font-size:12.5px;color:var(--text-2);white-space:pre-wrap;word-break:break-word}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(10px);background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff;font-size:13px;font-weight:600;padding:10px 17px;border-radius:11px;box-shadow:0 12px 34px rgba(0,0,0,.4);opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:90}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:760px){ .cols{grid-template-columns:1fr 1fr} .screen{display:none} }
</style></head>
<body>
  <header class="top">
    <div class="brand"><div class="logo">G</div><div><div class="btxt">Issue Board</div><div class="bsub">guided-growth · live from GitLab</div></div></div>
    <span class="spacer"></span>
    <div class="legend">
      <span class="lg"><span class="sw" style="background:var(--feature)"></span>Feature</span>
      <span class="lg"><span class="sw" style="background:var(--bug)"></span>Bug</span>
      <span class="lg"><span class="sw" style="background:var(--ai)"></span>AI-learning</span>
    </div>
    <button class="actbtn" id="collapsebtn" onclick="toggleAll()">Collapse all</button>
    <span class="syncind" id="syncind"><span class="d"></span>Loading</span>
    <button class="actbtn" id="themebtn" onclick="toggleTheme()">Theme</button>
  </header>
  <div class="chips" id="showchips"></div>
  <div class="chips" id="areachips"></div>
  <div class="chips" id="chips"></div>
  <main id="board"></main>
  <div class="toast" id="toast"></div>
  <div id="detail"></div>

<script>
  var API_GET='/internal/board/issues.json';
  var API_PUT='/internal/board/update';
  var API_ISSUE='/internal/board/issue';
  var API_EDIT='/internal/board/issue-edit';
  var API_NOTE='/internal/board/issue-note';
  var COLS=['backlog','next','doing','done'];
  var COL_LABEL={backlog:'Backlog',next:'Next',doing:'Doing',done:'Done'};
  var TYPE_LABEL={feature:'Feature',bug:'Bug',ai:'AI-learning'};
  var SHOW_ITEMS=[['all','All'],['qa','QA'],['product','Product'],['eng','Engineering']];
  var AREA_ITEMS=[['all','All areas'],['onboarding','Onboarding'],['in-app','In-app']];
  var AVCOLORS={Yonas:'linear-gradient(140deg,#ff7a59,#ff4d6d)',Mint:'linear-gradient(140deg,#2fc46f,#1fb6a0)',Timothy:'linear-gradient(140deg,#5b8cff,#7c5cff)',Yair:'linear-gradient(140deg,#7c5cff,#5b8cff)',Alejandro:'linear-gradient(140deg,#f0a93f,#ff7a59)',Unassigned:'linear-gradient(140deg,#8893a6,#5a6478)'};
  var BOARD=null, VIEW='all', SHOW='all', AREA='all', CURMENU=null;

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function avColor(n){return AVCOLORS[n]||'linear-gradient(140deg,#8893a6,#5a6478)';}
  function avInit(n){return (n||'?').slice(0,1).toUpperCase();}
  function laneByKey(k){return (BOARD.people||[]).filter(function(p){return p.key===k;})[0];}
  function rosterLabel(k){var r=(BOARD.roster||[]).filter(function(x){return x.key===k;})[0];return r?r.label:k;}
  function showMatch(it){if(SHOW==='all')return true;if(SHOW==='qa')return !!it.qa;if(SHOW==='product')return it.squad==='product';if(SHOW==='eng')return it.squad==='eng';return true;}
  function areaMatch(it){if(AREA==='all')return true;return (it.area||'in-app')===AREA;}

  /* ===== collapsed-lane state (persisted) ===== */
  var collapsed=new Set();
  try{(JSON.parse(localStorage.getItem('iboard-collapsed')||'[]')).forEach(function(k){collapsed.add(k);});}catch(_){}
  function saveCollapsed(){try{localStorage.setItem('iboard-collapsed',JSON.stringify([].slice.call(collapsed)));}catch(_){}}
  window.toggleLane=function(k){if(collapsed.has(k))collapsed.delete(k);else collapsed.add(k);saveCollapsed();render();};
  window.toggleAll=function(){
    var ppl=(BOARD&&BOARD.people||[]).filter(function(p){return VIEW==='all'||p.key===VIEW;});
    var anyOpen=ppl.some(function(p){return !collapsed.has(p.key);});
    ppl.forEach(function(p){if(anyOpen)collapsed.add(p.key);else collapsed.delete(p.key);});
    saveCollapsed();render();
  };

  function cardHtml(it,laneKey,col){
    var done=(col==='done');
    return '<div class="card'+(done?' done-card':'')+'" draggable="true" data-iid="'+it.iid+'" data-lane="'+esc(laneKey)+'" data-col="'+col+'" onclick="openDetail(event,'+it.iid+')">'
      +'<div class="crow"><span class="chiptype t-'+esc(it.type)+'">'+esc(TYPE_LABEL[it.type]||it.type)+'</span>'
        +'<span class="pri '+esc(it.priority||'unset')+'" title="priority: '+esc(it.priority||'unset')+'"></span></div>'
      +'<div class="ctitle">'+esc(it.title)+'</div>'
      +(it.thumb?'<img class="thumb" src="'+esc(it.thumb)+'" loading="lazy" alt="screenshot" ondragstart="return false" onerror="this.remove()">':'')
      +'<div class="cmeta"><a class="iid" href="'+esc(it.web_url)+'" target="_blank" rel="noopener" onmousedown="event.stopPropagation()" onclick="event.stopPropagation()" ondragstart="return false">#'+it.iid+'</a>'
        +(it.screen?'<span class="screen">'+esc(it.screen)+'</span>':'')
        +'<button class="movebtn" onmousedown="event.stopPropagation()" ondragstart="return false" onclick="openMove(event,'+it.iid+',\''+esc(laneKey)+'\',\''+col+'\')">Move</button></div>'
    +'</div>';
  }
  function laneHtml(p){
    var fcount=0;
    var cols=COLS.map(function(c){
      var list=(p.columns[c]||[]).filter(function(it){return showMatch(it)&&areaMatch(it);}); fcount+=list.length;
      var body=list.length?list.map(function(it){return cardHtml(it,p.key,c);}).join(''):'<div class="empty">empty</div>';
      return '<div class="col c-'+c+'"><div class="col-head"><span class="bar"></span>'+COL_LABEL[c]+'<span class="cn">'+list.length+'</span></div>'
        +'<div class="col-body" data-lane="'+esc(p.key)+'" data-col="'+c+'">'+body+'</div></div>';
    }).join('');
    var cnt=(SHOW==='all')?(p.count+' issues'):(fcount+' of '+p.count);
    return '<section class="lane'+(collapsed.has(p.key)?' collapsed':'')+'" data-lane="'+esc(p.key)+'">'
      +'<div class="lane-head" onclick="toggleLane(\''+esc(p.key)+'\')"><span class="caret">&#9656;</span>'
        +'<span class="av" style="background:'+avColor(p.label)+'">'+esc(avInit(p.label))+'</span>'
        +'<span class="lname">'+esc(p.label)+'</span><span class="lcount">'+cnt+'</span></div>'
      +'<div class="cols">'+cols+'</div></section>';
  }
  function showChipsHtml(){
    return '<span class="flabel">Show</span>'+SHOW_ITEMS.map(function(x){
      return '<button class="chip'+(SHOW===x[0]?' on':'')+'" onclick="setShow(\''+x[0]+'\')">'+esc(x[1])+'</button>';
    }).join('');
  }
  function chipsHtml(){
    if(!BOARD)return '';
    function chip(k,l,n){return '<button class="chip'+(VIEW===k?' on':'')+'" onclick="setView(\''+esc(k)+'\')">'+esc(l)+(n!=null?'<span class="n">'+n+'</span>':'')+'</button>';}
    var out='<span class="flabel">Who</span>'+chip('all','Everyone',null);
    (BOARD.people||[]).forEach(function(p){out+=chip(p.key,p.label,p.count);});
    return out;
  }
  function render(){
    closeMenu();
    document.getElementById('showchips').innerHTML=showChipsHtml();
    document.getElementById('areachips').innerHTML=areaChipsHtml();
    document.getElementById('chips').innerHTML=chipsHtml();
    if(!BOARD){document.getElementById('board').innerHTML='<p style="color:var(--muted);padding:50px 4px">Loading the board…</p>';return;}
    var ppl=(BOARD.people||[]).filter(function(p){return VIEW==='all'||p.key===VIEW;});
    document.getElementById('board').innerHTML=ppl.length?ppl.map(laneHtml).join(''):'<p style="color:var(--muted);padding:50px 4px">Nothing here.</p>';
    wireDrag();
  }

  /* ===== reassign menu (replaces cross-lane drag) ===== */
  window.openMove=function(ev,iid,fromLane,fromCol){
    ev.stopPropagation(); closeMenu();
    var roster=(BOARD.roster||[]).filter(function(r){return r.key!==fromLane;});
    var menu=document.createElement('div'); menu.className='menu';
    menu.innerHTML='<div class="mh">Move #'+iid+' to</div>'+roster.map(function(r){
      return '<div class="mi" onclick="doMove('+iid+',\''+esc(fromLane)+'\',\''+fromCol+'\',\''+esc(r.key)+'\')"><span class="av" style="background:'+avColor(r.label)+'">'+esc(avInit(r.label))+'</span>'+esc(r.label)+'</div>';
    }).join('');
    document.body.appendChild(menu);
    var rect=ev.target.getBoundingClientRect(), mw=180, mh=roster.length*34+30;
    menu.style.left=Math.max(8,Math.min(rect.left,window.innerWidth-mw-8))+'px';
    menu.style.top=((rect.bottom+mh>window.innerHeight)?Math.max(8,rect.top-mh):rect.bottom+6)+'px';
    CURMENU=menu;
    setTimeout(function(){document.addEventListener('mousedown',outsideMenu);},0);
  };
  function outsideMenu(e){if(CURMENU&&!CURMENU.contains(e.target))closeMenu();}
  function closeMenu(){if(CURMENU){CURMENU.remove();CURMENU=null;document.removeEventListener('mousedown',outsideMenu);}}
  window.doMove=function(iid,fromLane,fromCol,toLane){
    closeMenu();
    var fl=laneByKey(fromLane); if(!fl)return;
    var moved=null;
    COLS.forEach(function(c){var arr=fl.columns[c];var i=arr.findIndex(function(x){return x.iid===iid;});if(i>=0)moved=arr.splice(i,1)[0];});
    if(!moved)return;
    fl.count=Math.max(0,fl.count-1);
    var tl=laneByKey(toLane);
    if(!tl){tl={key:toLane,label:rosterLabel(toLane),columns:{backlog:[],next:[],doing:[],done:[]},count:0};BOARD.people.push(tl);}
    tl.columns[fromCol].unshift(moved); tl.count++;
    render();
    persist({op:'reassign',lane:toLane,col:fromCol,iid:iid,order:tl.columns[fromCol].map(function(x){return x.iid;})});
    toast('Moved #'+iid+' to '+rosterLabel(toLane));
  };

  /* ===== drag & drop: within a lane only (reorder + move across columns) ===== */
  var drag=null;
  function clearOver(){document.querySelectorAll('.col-body.dragover').forEach(function(x){x.classList.remove('dragover');});}
  function dropIndex(body,y){
    var cards=[].slice.call(body.querySelectorAll('.card:not(.dragging)'));
    for(var i=0;i<cards.length;i++){var r=cards[i].getBoundingClientRect();if(y < r.top+r.height/2)return i;}
    return cards.length;
  }
  function wireDrag(){
    document.querySelectorAll('.card').forEach(function(card){
      card.addEventListener('dragstart',function(e){drag={iid:+card.dataset.iid,lane:card.dataset.lane,col:card.dataset.col};card.classList.add('dragging');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',card.dataset.iid);}catch(_){}});
      card.addEventListener('dragend',function(){card.classList.remove('dragging');clearOver();drag=null;});
    });
    document.querySelectorAll('.col-body').forEach(function(body){
      body.addEventListener('dragover',function(e){
        if(!drag||body.dataset.lane!==drag.lane)return; // cross-lane drag disabled, use Move
        e.preventDefault();clearOver();body.classList.add('dragover');
      });
      body.addEventListener('dragleave',function(){body.classList.remove('dragover');});
      body.addEventListener('drop',function(e){
        if(!drag){clearOver();return;}
        var toLaneKey=body.dataset.lane, toCol=body.dataset.col;
        if(toLaneKey!==drag.lane){clearOver();drag=null;render();return;} // no cross-lane drag
        e.preventDefault();
        var lane=laneByKey(toLaneKey); if(!lane){clearOver();return;}
        var fromCol=drag.col, iid=drag.iid;
        var fromList=lane.columns[fromCol], idxFrom=fromList.findIndex(function(x){return x.iid===iid;});
        if(idxFrom<0){clearOver();return;}
        var moved=fromList[idxFrom], insertAt=dropIndex(body,e.clientY);
        fromList.splice(idxFrom,1);
        if(fromCol===toCol && idxFrom<insertAt)insertAt--;
        lane.columns[toCol].splice(insertAt,0,moved);
        clearOver();drag=null;render();
        var order=lane.columns[toCol].map(function(x){return x.iid;});
        if(fromCol===toCol) persist({op:'reorder',lane:toLaneKey,col:toCol,order:order});
        else persist({op:'place',lane:toLaneKey,col:toCol,iid:iid,order:order});
      });
    });
  }

  /* ===== persist ===== */
  function setSync(state){
    var el=document.getElementById('syncind');if(!el)return;
    var c={live:['var(--done)','Synced'],saving:['var(--accent)','Saving…'],err:['var(--bug)','Save failed'],load:['var(--muted)','Loading']}[state]||['var(--muted)','Offline'];
    el.innerHTML='<span class="d" style="background:'+c[0]+'"></span>'+c[1];
  }
  function persist(payload){
    setSync('saving');
    fetch(API_PUT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(){setSync('live');})
      .catch(function(){setSync('err');toast('Save failed — reloading from GitLab.');setTimeout(load,1200);});
  }

  /* ===== deep issue detail (click a card) ===== */
  var DET=null;
  window.openDetail=function(ev,iid){
    if(ev&&ev.target&&(ev.target.closest('.movebtn')||ev.target.closest('.iid')))return;
    var host=document.getElementById('detail');
    host.innerHTML='<div class="ov" onclick="if(event.target===this)closeDetail()"><div class="sheet"><div class="sh-body" style="padding:40px;text-align:center;color:var(--muted)">Loading #'+iid+'…</div></div></div>';
    fetch(API_ISSUE+'?iid='+iid,{cache:'no-store'})
      .then(function(r){return r.json();})
      .then(function(d){if(d.error)throw new Error(d.error);DET=d;renderDetail(d);})
      .catch(function(e){host.innerHTML='<div class="ov" onclick="if(event.target===this)closeDetail()"><div class="sheet"><div class="sh-body" style="padding:30px;color:var(--bug)">Could not load #'+iid+': '+esc(e.message)+'</div></div></div>';});
  };
  function renderDetail(d){
    var host=document.getElementById('detail');
    var pris=['high','medium','low'], types=[['bug','Bug'],['ai','AI-learning'],['feature','Feature']];
    var priSeg=pris.map(function(p){return '<button class="segb'+(d.priority===p?' on':'')+'" onclick="detailSet(\'priority\',\''+p+'\')">'+p.charAt(0).toUpperCase()+p.slice(1)+'</button>';}).join('');
    var typeSeg=types.map(function(t){return '<button class="segb'+(d.type===t[0]?' on':'')+'" onclick="detailSet(\'retype\',\''+t[0]+'\')">'+t[1]+'</button>';}).join('');
    var labelPills=(d.labels||[]).map(function(l){return '<span class="lblpill">'+esc(l)+'</span>';}).join(' ');
    var asg=(d.assignees&&d.assignees.length)?d.assignees.join(', '):'Unassigned';
    var notes=(d.notes||[]).map(function(n){return '<div class="sh-note"><div class="sh-notemeta">'+esc(n.author||'')+' · '+esc((n.created_at||'').slice(0,10))+'</div><div class="sh-notebody">'+esc(n.body||'')+'</div></div>';}).join('');
    host.innerHTML='<div class="ov" onclick="if(event.target===this)closeDetail()"><div class="sheet">'
      +'<div class="sh-head"><input id="sh-title-in" class="sh-titleinput" value="'+esc(d.title)+'"><button class="sh-x" onclick="closeDetail()">✕</button></div>'
      +'<div class="sh-body">'
        +'<div class="sh-meta"><span class="chiptype t-'+esc(d.type)+'">'+esc(TYPE_LABEL[d.type]||d.type)+'</span>'
          +'<span class="lblpill">#'+d.iid+'</span>'
          +(d.screen?'<span class="lblpill">'+esc(d.screen)+'</span>':'')
          +'<span class="lblpill">'+esc(d.state)+'</span>'
          +'<span class="lblpill">assignee: '+esc(asg)+'</span></div>'
        +(d.screenshot?'<img class="sh-shot" src="'+esc(d.screenshot)+'" alt="screenshot" onerror="this.remove()">':'')
        +'<div class="sh-sec">Description</div><textarea id="sh-desc-in" class="sh-edit">'+esc(d.description||'')+'</textarea>'
        +'<button class="sh-savebtn" onclick="saveEdits()">Save title + description</button>'
        +'<div class="sh-sec">Priority</div><div class="seg">'+priSeg+'</div>'
        +'<div class="sh-sec">Type</div><div class="seg">'+typeSeg+'</div>'
        +'<div class="sh-sec">Labels</div><div style="display:flex;flex-wrap:wrap;gap:5px">'+(labelPills||'<span style="color:var(--faint);font-size:12px">none</span>')+'</div>'
        +'<div class="sh-sec">Comments</div>'+(notes||'<div style="font-size:12px;color:var(--faint)">No comments yet.</div>')
        +'<textarea id="sh-comment-in" class="sh-edit" style="min-height:60px;margin-top:8px" placeholder="Add a comment..."></textarea>'
        +'<button class="sh-savebtn" onclick="postComment()">Comment</button>'
      +'</div>'
      +'<div class="sh-foot"><a class="sh-link" href="'+esc(d.web_url)+'" target="_blank" rel="noopener">Open in GitLab &#8599;</a><span class="spacer"></span><button class="actbtn" onclick="closeDetail()">Close</button></div>'
    +'</div></div>';
  }
  window.detailSet=function(op,val){
    if(!DET)return; var iid=DET.iid;
    var payload=(op==='priority')?{op:'priority',iid:iid,priority:val}:{op:'retype',iid:iid,itype:val};
    if(op==='priority')DET.priority=val; else DET.type=val;
    renderDetail(DET); setSync('saving');
    fetch(API_PUT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(){setSync('live');toast('Saved to GitLab');})
      .catch(function(){setSync('err');toast('Save failed');});
  };
  window.closeDetail=function(){document.getElementById('detail').innerHTML='';DET=null;load();};

  /* ===== theme + toast + boot ===== */
  function applyTheme(t){document.documentElement.classList.toggle('light',t==='light');var b=document.getElementById('themebtn');if(b)b.textContent=(t==='light'?'◑ Light':'◐ Dark');}
  var theme=localStorage.getItem('iboard-theme')||(location.search.match(/theme=(dark|light)/)||[])[1]||'light';
  window.toggleTheme=function(){theme=theme==='light'?'dark':'light';applyTheme(theme);try{localStorage.setItem('iboard-theme',theme);}catch(_){}};
  window.setView=function(k){VIEW=k;render();window.scrollTo(0,0);};
  window.setShow=function(k){SHOW=k;render();};
  function areaChipsHtml(){return '<span class="flabel">Area</span>'+AREA_ITEMS.map(function(x){return '<button class="chip'+(AREA===x[0]?' on':'')+'" onclick="setArea(\''+x[0]+'\')">'+esc(x[1])+'</button>';}).join('');}
  window.setArea=function(k){AREA=k;render();};
  var toastT=null;
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2400);}
  function load(){
    setSync('load');
    fetch(API_GET,{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error('http '+r.status);return r.json();})
      .then(function(b){if(b.error)throw new Error(b.error);BOARD=b;setSync('live');render();})
      .catch(function(e){document.getElementById('board').innerHTML='<p style="color:var(--bug);padding:50px 4px">Could not load the board: '+esc(e.message)+'</p>';setSync('err');});
  }
  applyTheme(theme);
  render();
  load();
</script>
</body></html>
