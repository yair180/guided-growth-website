<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're on the list — Guided Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .success-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }
    .success-page::before {
      content: '';
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 600px;
      background: radial-gradient(ellipse at center,
        rgba(56, 189, 248, 0.12) 0%, transparent 65%);
      pointer-events: none;
    }
    .success-inner {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }
    .success-check {
      font-size: 48px;
      margin-bottom: 24px;
      display: block;
    }
    .success-title {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.08;
      margin-bottom: 16px;
    }
    .success-sub {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <nav class="nav scrolled">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="logo.png" alt="Guided Growth OS" class="nav__logo-img" />
      </a>
    </div>
  </nav>

  <div class="success-page">
    <div class="success-inner">
      <span class="success-check">✓</span>
      <h1 class="success-title">You're on the list.</h1>
      <p class="success-sub">We'll reach out when early access opens. In the meantime — you might want to notice one habit you've been meaning to change.</p>
      <a href="/" class="btn btn--accent">Back to Home</a>
    </div>
  </div>
</body>
</html>
