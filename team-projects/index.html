<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Squad — Live Project Boards · Guided Growth</title>
<style>
  :root{
    --bg:#faf8f4;--surface:#fff;--surface-2:#f3efe7;--surface-3:#ece6da;--border:#e5dfd2;--border-strong:#d3cab8;
    --text:#1c1c1a;--text-2:#48443c;--muted:#6b665b;--accent:#2257a0;
    --now:#dd2b0e;--next:#c9610e;--later:#1f75cb;
    --done:#1f9d57;--prog:#e0922f;--todo:#b8b1a3;
    --qa:#16A085;--claude:#7c5cff;
  }
  @media (prefers-color-scheme:dark){:root{
    --bg:#16140f;--surface:#211e18;--surface-2:#2b271f;--surface-3:#36312a;--border:#39342b;--border-strong:#4a443a;
    --text:#f1ede3;--text-2:#cdc7ba;--muted:#9c968a;--accent:#8bb8ff;
    --done:#2fc46f;--prog:#f0a93f;--todo:#6b655a;--qa:#1ab5a0;--claude:#a98bff;
  }}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  main{max-width:1180px;margin:0 auto;padding:40px 24px 100px}
  .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:0 0 8px}
  h1{font-size:31px;margin:0 0 10px;letter-spacing:-.02em}
  .lede{color:var(--text-2);font-size:15.5px;margin:0 0 6px;max-width:74ch}
  .sub{color:var(--muted);font-size:13px;margin:0 0 26px;max-width:74ch}
  /* operating-model strip */
  .model{display:flex;gap:10px;flex-wrap:wrap;align-items:stretch;margin:0 0 10px}
  .loop{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;flex:1;min-width:240px}
  .loop .step-n{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
  .loop .t{font-weight:600;font-size:14px}
  .loop .d{font-size:12px;color:var(--muted)}
  .arrow{align-self:center;color:var(--muted);font-size:20px;flex:0 0 auto}
  .controls{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin:18px 0 6px;font-size:12.5px;color:var(--muted)}
  .legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .ld{width:11px;height:11px;border-radius:50%;display:inline-block}
  button.ghost{font:inherit;font-size:12px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:5px 12px;color:var(--text)}
  button.ghost:hover{border-color:var(--accent)}
  .hint{font-size:12px;color:var(--muted)}
  /* person */
  .person{margin-top:38px;border-top:1px solid var(--border);padding-top:22px}
  .phead{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px}
  .phead h2{font-size:21px;margin:0;letter-spacing:-.01em}
  .load{font-size:12px;font-weight:700;color:#fff;background:var(--claude);border-radius:20px;padding:3px 11px}
  .role{color:var(--text-2);font-size:13.5px;margin:2px 0 12px;max-width:88ch}
  .stretch{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--next);border-radius:9px;padding:11px 14px;margin:0 0 18px;font-size:13px;color:var(--text-2);max-width:92ch}
  .stretch b{color:var(--text)}
  /* project grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;align-items:start}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;display:flex;flex-direction:column}
  .card-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:5px;color:#fff}
  .pill.now{background:var(--now)}.pill.next{background:var(--next)}.pill.later{background:var(--later)}
  .cname{font-size:15.5px;font-weight:650;margin:0 0 5px;letter-spacing:-.01em}
  .one{font-size:12.5px;color:var(--text-2);margin:0 0 9px}
  .claude{display:inline-flex;align-items:center;gap:6px;font-family:ui-monospace,"SF Mono",Menlo,monospace;font-size:11px;color:var(--claude);background:color-mix(in srgb,var(--claude) 12%,transparent);border:1px solid color-mix(in srgb,var(--claude) 30%,transparent);border-radius:6px;padding:3px 8px;margin-bottom:11px;align-self:flex-start}
  details.why{margin:0 0 11px}
  details.why summary{font-size:11.5px;color:var(--muted);cursor:pointer;list-style:none}
  details.why summary::-webkit-details-marker{display:none}
  details.why summary:hover{color:var(--accent)}
  details.why p{font-size:12px;color:var(--text-2);margin:7px 0 0;padding-left:2px;border-left:2px solid var(--border);padding:6px 0 6px 10px}
  .steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:2px}
  .stp{display:flex;align-items:flex-start;gap:9px;padding:7px 8px;border-radius:8px;cursor:grab;border:1px solid transparent}
  .stp:hover{background:var(--surface-2);border-color:var(--border)}
  .stp.dragging{opacity:.4}
  .stp.drag-over{border-top:2px solid var(--accent)}
  .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;margin-top:2px;cursor:pointer;border:2px solid var(--todo);background:transparent;position:relative}
  .dot.done{background:var(--done);border-color:var(--done)}
  .dot.done::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:800;top:-1px}
  .dot.in-progress{background:var(--prog);border-color:var(--prog)}
  .stp .body{flex:1;min-width:0}
  .stp .txt{font-size:12.5px;line-height:1.4}
  .stp.done .txt{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border-strong)}
  .stp .meta{display:flex;align-items:center;gap:8px;margin-top:2px}
  .iss{font-size:10.5px;font-family:ui-monospace,Menlo,monospace;color:var(--accent);text-decoration:none}
  .iss:hover{text-decoration:underline}
  .cbtn{font-size:10.5px;color:var(--muted);cursor:pointer;background:none;border:none;padding:0;font-family:inherit}
  .cbtn:hover{color:var(--accent)}
  .cmt{font-size:11.5px;color:var(--text-2);background:color-mix(in srgb,var(--accent) 9%,transparent);border-left:2px solid var(--accent);border-radius:0 5px 5px 0;padding:4px 8px;margin-top:4px;white-space:pre-wrap}
  /* sync state bar */
  .syncbar{display:flex;align-items:center;gap:9px;font-size:13px;border-radius:10px;padding:9px 14px;margin:0 0 16px;border:1px solid var(--border)}
  .syncbar .sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .syncbar.live{background:color-mix(in srgb,var(--done) 10%,transparent);border-color:color-mix(in srgb,var(--done) 35%,transparent);color:var(--text-2)}
  .syncbar.live .sdot{background:var(--done);box-shadow:0 0 0 3px color-mix(in srgb,var(--done) 22%,transparent)}
  .syncbar.off{background:color-mix(in srgb,var(--next) 10%,transparent);border-color:color-mix(in srgb,var(--next) 38%,transparent);color:var(--text-2)}
  .syncbar.off .sdot{background:var(--next)}
  .syncbar a{color:var(--accent);font-weight:600}
  .syncmsg{display:inline-block;font-size:12px;font-weight:700;color:var(--done);margin:-8px 0 14px;height:14px;opacity:0;transition:opacity .15s}
  .syncmsg.ok{opacity:1}
  /* session label + status badge + editable field values */
  .sess{margin-left:auto;font-size:10.5px;font-weight:700;color:var(--claude);background:color-mix(in srgb,var(--claude) 12%,transparent);border-radius:5px;padding:2px 8px;letter-spacing:.02em}
  .sbadge{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 7px;border-radius:5px;color:#fff}
  .sbadge.todo{background:var(--todo)}.sbadge.in-progress{background:var(--prog)}.sbadge.done{background:var(--done)}
  .tval{font-size:11.5px;color:var(--text-2);background:var(--surface-2);border-radius:6px;padding:4px 8px;margin-top:4px;line-height:1.4}
  .glchip{font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:5px;border:1px solid var(--border);color:var(--muted);background:var(--surface-2)}
  .glchip.gl-in_progress{color:var(--prog);border-color:color-mix(in srgb,var(--prog) 45%,transparent)}
  .glchip.gl-in_testing{color:var(--later);border-color:color-mix(in srgb,var(--later) 45%,transparent)}
  .glchip.gl-done{color:var(--done);border-color:color-mix(in srgb,var(--done) 45%,transparent)}
  .pres{display:flex;align-items:center;gap:7px;font-size:11.5px;margin:0 0 11px;padding:5px 9px;border-radius:7px}
  .pres .pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .pres.live{background:color-mix(in srgb,var(--done) 11%,transparent);color:var(--done)}.pres.live .pdot{background:var(--done);box-shadow:0 0 0 3px color-mix(in srgb,var(--done) 22%,transparent)}
  .pres.idle{background:var(--surface-2);color:var(--muted)}.pres.idle .pdot{background:var(--todo)}
  .grip{color:var(--border-strong);font-size:12px;margin-top:1px;flex-shrink:0;cursor:grab}
  footer{margin-top:54px;border-top:1px solid var(--border);padding-top:16px;color:var(--muted);font-size:12px}
  footer a{color:var(--accent);text-decoration:none}
  .draft{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--next);border:1px solid var(--next);border-radius:5px;padding:2px 7px;vertical-align:middle;margin-left:8px}
  /* ---- top-level view tabs ---- */
  .tabs{display:flex;gap:4px;margin:6px 0 24px;border-bottom:1px solid var(--border)}
  .tabs button{font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;padding:9px 15px;color:var(--muted);margin-bottom:-1px}
  .tabs button.active{color:var(--text);border-bottom-color:var(--accent)}
  /* ---- How it connects ---- */
  .cintro{font-size:14.5px;color:var(--text-2);max-width:82ch;margin:0 0 18px}
  .who-tabs{display:flex;gap:8px;margin:0 0 18px;flex-wrap:wrap}
  .who-tabs button{font:inherit;font-size:13px;font-weight:600;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text-2)}
  .who-tabs button.active{background:var(--claude);border-color:var(--claude);color:#fff}
  .demo-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin:26px 0 10px}
  /* Claude desktop window */
  .cwrap{display:grid;grid-template-columns:236px 1fr;background:#1d1d1b;border:1px solid #000;border-radius:12px;overflow:hidden;box-shadow:0 12px 44px rgba(0,0,0,.4);min-height:440px}
  .csidebar{background:#191917;border-right:1px solid #2a2a27;padding:14px 9px;overflow:hidden}
  .csb-head{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:#8d877b;font-weight:600;padding:2px 8px 12px}
  .csb-item{display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:7px;font-size:12.5px;color:#b8b2a6;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .csb-item.active{background:#2e2d2a;color:#f5f1e8}
  .csb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#d9a441}
  .csb-dot.idle{background:transparent;border:1.5px solid #6a655b}
  .cmain{display:flex;flex-direction:column;background:#212120;min-width:0}
  .cmain-head{padding:11px 16px;border-bottom:1px solid #2a2a27;font-size:12.5px;color:#8d877b;display:flex;align-items:center;gap:8px}
  .cmsgs{padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:16px;flex:1}
  .cmsg{display:flex;gap:11px;font-size:13px;line-height:1.58}
  .cav{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .cmsg.user .cav{background:#3a6df0}.cmsg.ai .cav{background:#d97757}
  .cmsg .c{color:#e7e3d9;min-width:0}
  .cmsg .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px;background:#15130f;color:#e6b450;border-radius:4px;padding:1px 5px}
  .cmsg .ok{color:#46c47a;font-family:ui-monospace,Menlo,monospace;font-weight:600}
  .cinput{margin:6px 14px 14px;border:1px solid #34332f;background:#191917;border-radius:10px;padding:11px 13px;color:#6a655b;font-size:12.5px;display:flex;justify-content:space-between;align-items:center}
  /* terminals */
  .terms{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .term{background:#0d0d0c;border:1px solid #000;border-radius:9px;overflow:hidden;box-shadow:0 6px 22px rgba(0,0,0,.32)}
  .term-head{display:flex;align-items:center;gap:7px;background:#1b1b19;padding:8px 11px;border-bottom:1px solid #000}
  .tdot{width:11px;height:11px;border-radius:50%}.tdot.r{background:#ff5f57}.tdot.y{background:#febc2e}.tdot.g{background:#28c840}
  .term-title{margin-left:6px;font-size:11.5px;color:#9c968a;font-family:ui-monospace,Menlo,monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .term-body{padding:12px 13px;font-family:ui-monospace,Menlo,monospace;font-size:11.5px;line-height:1.7;color:#cfcabf;min-height:118px}
  .term-body .p{color:#46c47a}.term-body .dim{color:#6a655b}.term-body .y{color:#e0922f}
  /* control flow */
  .flow{display:flex;align-items:stretch;gap:10px;flex-wrap:wrap;margin:6px 0 20px}
  .fnode{flex:1;min-width:200px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 15px}
  .fnode .ft{font-weight:650;font-size:13.5px;margin-bottom:3px}
  .fnode .fd{font-size:12px;color:var(--muted)}
  .farrow{align-self:center;color:var(--muted);font-size:22px}
  .sim{background:var(--surface-2);border:1px solid var(--border);border-radius:11px;padding:15px 16px;max-width:540px}
  .sim h4{margin:0 0 4px;font-size:13.5px}.sim .shint{font-size:12px;color:var(--muted);margin:0 0 12px}
  .simrow{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:7px;cursor:grab;font-size:12.5px}
  .simrow.dragging{opacity:.4}.simrow.drag-over{border-top:2px solid var(--claude)}
  .simrow .rank{font-weight:800;color:var(--claude);font-variant-numeric:tabular-nums;width:14px}
  .simrow .grip{color:var(--border-strong)}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--claude);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:10px;box-shadow:0 10px 34px rgba(0,0,0,.35);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:50;max-width:90vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:720px){.terms{grid-template-columns:1fr}.cwrap{grid-template-columns:1fr}.csidebar{display:none}}

  /* overview/detail board */
  .topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:30px 0 14px}
  .tbtitle{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .pchip{font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 14px;color:var(--text-2)}
  .pchip:hover{border-color:var(--accent)}
  .pchip.on{background:var(--claude);border-color:var(--claude);color:#fff}
  .bgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;align-items:start;margin-bottom:10px}
  .bcard{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px 16px;display:flex;flex-direction:column}
  .bcard-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .bdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;margin-left:auto}
  .bdot.live{background:var(--done);box-shadow:0 0 0 3px color-mix(in srgb,var(--done) 22%,transparent)}
  .bname{font-size:16px;font-weight:650;letter-spacing:-.01em;margin:0 0 5px}
  .bone{font-size:12.5px;color:var(--text-2);line-height:1.4;margin:0 0 11px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .bact{font-size:11px;color:var(--done);margin:-6px 0 9px}
  .bbar{height:5px;background:var(--surface-2);border-radius:4px;overflow:hidden;margin:0 0 9px}.bbar span{display:block;height:100%;background:var(--done);border-radius:4px;transition:width .3s}
  .bfoot{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .bcount{font-size:11.5px;color:var(--muted)}
  .bopen{font:inherit;font-size:12px;font-weight:600;cursor:pointer;background:var(--claude);border:none;border-radius:7px;padding:5px 13px;color:#fff}
  .bopen:hover{filter:brightness(1.06)}
  .detail{max-width:780px}
  .dback{font:inherit;font-size:12.5px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 13px;color:var(--text-2);margin-bottom:16px}
  .dback:hover{border-color:var(--accent)}
  .dhead{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .dtitle{font-size:21px;margin:0 0 4px;letter-spacing:-.01em}
  .dsub{color:var(--text-2);font-size:13.5px;margin:0 0 12px;max-width:70ch}
</style></head>

  var GL_BASE = 'https://gitlab.com/guidedgrowth-group/guided-growth-mvp/-/issues/';
  var API_GET = '/internal/yair-os/team-board.json';
  var API_PUT = '/internal/yair-os/team-board-update';
  var LOGIN_URL = '/internal/yair-os/preview/login?next=' + encodeURIComponent('/team-projects/');
  var LS_KEY = 'gg-team-boards-v2';
  var STATES = ['todo','in-progress','done'];

  var BOARD = null;       // {version, people:[{person,projects:[{claude_topic,steps:[{id,state,comment,...}]}]}]}
  var MODE = 'loading';   // 'live' (persists to the worker/Sheet) | 'local' (localStorage only)

  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
  function saveLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(BOARD)); }catch(e){} }
  function loadLocal(){ try{ var v=localStorage.getItem(LS_KEY); return v?JSON.parse(v):null; }catch(e){ return null; } }

  // Give the offline fallback the same shape as the backend (stable step ids + comment field).
  function normalize(raw){
    var sid=0, people=raw.map(function(p){
      return { person:p.person, username:p.username, concurrent_load:p.concurrent_load, role_summary:p.role_summary, stretch_note:p.stretch_note,
        projects:p.projects.map(function(pr){
          return { name:pr.name, status:pr.status, claude_topic:pr.claude_topic, one_liner:pr.one_liner, why:pr.why,
            steps:pr.steps.map(function(st){ sid++; return { id:'s'+sid, title:st.title, state:st.state||'todo', issue:st.issue||'', comment:st.comment||'' }; }) };
        }) };
    });
    return { version:1, people:people };
  }

  function bucketByTopic(topic){
    if(!BOARD) return null;
    for(var i=0;i<BOARD.people.length;i++){ var pr=BOARD.people[i].projects; for(var j=0;j<pr.length;j++){ if(pr[j].claude_topic===topic) return pr[j]; } }
    return null;
  }

  var STATE_LABEL = {'todo':'Not yet','in-progress':'In progress','done':'Done'};
  var GL_LABEL = {'todo':'To do','in_progress':'In progress','in_testing':'In testing','done':'Done'};
  var FIELD_LABEL = {'prompt':'Prompt','update':'Update','next':'Next steps'};

  function syncBarHtml(){
    if(MODE==='live') return '<div class="syncbar live"><span class="sdot"></span>Synced. Drag steps, click a dot, edit the prompt / update / next steps — every change saves to the shared board.</div>';
    if(MODE==='signedout') return '<div class="syncbar off"><span class="sdot"></span>Not signed in, so your changes will not save yet. <a href="'+LOGIN_URL+'">Sign in to edit</a> (one click, then it sticks).</div>';
    return '<div class="syncbar off"><span class="sdot"></span>Offline — showing a local copy. Changes are kept on this device only.</div>';
  }
  function flashSaved(){ var b=document.getElementById('syncmsg'); if(b){ b.textContent='✓ saved'; b.classList.add('ok'); clearTimeout(b._t); b._t=setTimeout(function(){ b.classList.remove('ok'); b.textContent=''; },1600); } }

  function presenceHtml(proj){
    if(!proj.session_active_at) return '';
    var t=Date.parse(proj.session_active_at); if(isNaN(t)) return '';
    var mins=(Date.now()-t)/60000;
    if(mins<10){ return '<div class="pres live"><span class="pdot"></span>session live'+(proj.session_last_action?' · '+esc(proj.session_last_action):'')+'</div>'; }
    var ago = mins<60 ? Math.round(mins)+'m' : Math.round(mins/60)+'h';
    return '<div class="pres idle"><span class="pdot"></span>session idle · last seen '+ago+' ago</div>';
  }
  function fieldBlock(topic, st, field, label){
    var v = st[field] || '';
    var body = v ? '<div class="tval">'+esc(v).replace(/\n/g,'<br>')+'</div>' : '';
    var btn = '<button class="cbtn" onclick="editField(\''+esc(topic)+'\',\''+esc(st.id)+'\',\''+field+'\')">'+(v?'edit '+label.toLowerCase():'+ '+label.toLowerCase())+'</button>';
    return {body:body, btn:btn};
  }

  var VIEW = { person:'all', open:null };  // open = claude_topic of the zoomed bucket, or null
  function isLive(proj){ if(!proj.session_active_at) return false; var t=Date.parse(proj.session_active_at); return !isNaN(t) && (Date.now()-t)<600000; }
  function counts(steps){ var c={todo:0,'in-progress':0,done:0}; (steps||[]).forEach(function(s){c[s.state]=(c[s.state]||0)+1;}); return c; }
  function pct(steps){ if(!steps||!steps.length) return 0; return Math.round(counts(steps).done/steps.length*100); }

  window.setPerson = function(k){ VIEW.person=k; VIEW.open=null; render(); window.scrollTo(0,0); };
  window.openBucket = function(t){ VIEW.open=t; render(); window.scrollTo(0,0); };
  window.backToOverview = function(){ VIEW.open=null; render(); window.scrollTo(0,0); };

  function chipsHtml(){
    var ppl=(BOARD.people||[]).map(function(p){return p.person;});
    function chip(k,l){ return '<button class="pchip'+(VIEW.person===k?' on':'')+'" onclick="setPerson(\''+esc(k)+'\')">'+esc(l)+'</button>'; }
    return '<div class="chips">'+chip('all','All')+ppl.map(function(n){return chip(n,n);}).join('')+'</div>';
  }

  function stepHtml(topic, st){
    var iss = st.issue ? '<a class="iss" href="'+GL_BASE+st.issue.replace('#','')+'" target="_blank" rel="noopener">'+esc(st.issue)+'</a>' : '';
    var prompt = fieldBlock(topic, st, 'prompt', 'Prompt');
    var upd = fieldBlock(topic, st, 'update', 'Update');
    var nxt = fieldBlock(topic, st, 'next', 'Next steps');
    var badge = '<span class="sbadge '+esc(st.state)+'">'+esc(STATE_LABEL[st.state]||st.state)+'</span>';
    var glchip='';
    if(st.issue && BOARD.gitlab_status){ var gs=BOARD.gitlab_status[String(st.issue).replace('#','')]; if(gs){ glchip='<span class="glchip gl-'+esc(gs)+'" title="Live status in GitLab">GitLab: '+esc(GL_LABEL[gs]||gs)+'</span>'; } }
    return '<li class="stp '+esc(st.state)+'" draggable="true" data-topic="'+esc(topic)+'" data-sid="'+esc(st.id)+'">'
      + '<span class="grip">&#8942;&#8942;</span>'
      + '<span class="dot '+esc(st.state)+'" title="click: Not yet -> In progress -> Done" onclick="cycleState(\''+esc(topic)+'\',\''+esc(st.id)+'\')"></span>'
      + '<span class="body"><span class="txt">'+esc(st.title)+'</span>'
      + '<span class="meta">'+badge+glchip+iss+prompt.btn+upd.btn+nxt.btn+'</span>'
      + prompt.body + upd.body + nxt.body
      + '</span></li>';
  }

  function bucketCard(proj, ci){
    var ct=counts(proj.steps); var parts=[];
    if(ct['in-progress']) parts.push(ct['in-progress']+' doing');
    if(ct.done) parts.push(ct.done+' done');
    if(ct.todo) parts.push(ct.todo+' to do');
    var live=isLive(proj);
    var act = (live && proj.session_last_action) ? '<div class="bact">session live &middot; '+esc(proj.session_last_action)+'</div>' : '';
    return '<div class="bcard">'
      + '<div class="bcard-top"><span class="pill '+esc(proj.status)+'">'+esc(proj.status)+'</span><span class="sess">Claude session '+(ci+1)+'</span>'+(live?'<span class="bdot live" title="session live"></span>':'')+'</div>'
      + '<div class="bname">'+esc(proj.topic||proj.name)+'</div>'
      + '<div class="bone">'+esc(proj.one_liner||'')+'</div>'
      + act
      + '<div class="bbar"><span style="width:'+pct(proj.steps)+'%"></span></div>'
      + '<div class="bfoot"><span class="bcount">'+(parts.join(' &middot; ')||(proj.steps?proj.steps.length+' steps':'no steps'))+'</span>'
      + '<button class="bopen" onclick="openBucket(\''+esc(proj.claude_topic)+'\')">Expand &#9656;</button></div>'
      + '</div>';
  }

  function renderOverview(){
    var ppl=BOARD.people.filter(function(p){ return VIEW.person==='all' || p.person===VIEW.person; });
    if(!ppl.length) return '<p class="hint">No one to show.</p>';
    return ppl.map(function(person){
      var cards=person.projects.map(function(proj,ci){ return bucketCard(proj,ci); }).join('');
      return '<section class="person"><div class="phead"><h2>'+esc(person.person)+'</h2>'
        + '<span class="load">'+person.projects.length+' sessions</span></div>'
        + (person.stretch_note?'<div class="stretch"><b>Is it a stretch?</b> '+person.stretch_note+'</div>':'')
        + '<div class="bgrid">'+cards+'</div></section>';
    }).join('');
  }

  function renderDetail(topic){
    var person=null, proj=null, ci=0;
    BOARD.people.forEach(function(p){ p.projects.forEach(function(pr,i){ if(pr.claude_topic===topic){person=p;proj=pr;ci=i;} }); });
    if(!proj) return '<button class="dback" onclick="backToOverview()">&#9666; back</button><p class="hint">Bucket not found.</p>';
    var stepsHtml=proj.steps.map(function(st){ return stepHtml(topic, st); }).join('');
    return '<div class="detail">'
      + '<button class="dback" onclick="backToOverview()">&#9666; back to all sessions</button>'
      + '<div class="dhead"><span class="pill '+esc(proj.status)+'">'+esc(proj.status)+'</span><span class="sess">Claude session '+(ci+1)+'</span>'+(isLive(proj)?'<span class="bdot live"></span>':'')+'</div>'
      + '<h2 class="dtitle">'+esc(person.person)+' &middot; '+esc(proj.topic||proj.name)+'</h2>'
      + '<div class="dsub">'+esc(proj.one_liner||'')+'</div>'
      + '<span class="claude">&#9671; claude: '+esc(proj.claude_topic)+'</span>'
      + presenceHtml(proj)
      + '<details class="why"><summary>Why this matters</summary><p>'+esc(proj.why||'')+'</p></details>'
      + '<ul class="steps" data-topic="'+esc(topic)+'">'+stepsHtml+'</ul>'
      + '</div>';
  }

  function render(){
    var root=document.getElementById('board');
    if(!root) return;
    if(!BOARD || !BOARD.people){ root.innerHTML='<p class="hint" style="padding:40px 0">Loading the team board&hellip;</p>'; return; }
    var body = VIEW.open ? renderDetail(VIEW.open) : renderOverview();
    root.innerHTML = '<div class="topbar"><span class="tbtitle">Team</span>'+chipsHtml()+'</div>'
      + syncBarHtml() + '<span id="syncmsg" class="syncmsg"></span>' + body;
    if(VIEW.open) wireDrag();  // step drag only inside a zoomed bucket
  }

  // Push a patch to the backend. Optimistic: BOARD is already updated + rendered by the caller.
  function persist(payload){
    saveLocal();
    if(MODE!=='live'){ showToast('Sign in to save changes to the shared board.'); return; }
    fetch(API_PUT, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)})
      .then(function(r){
        if(r.status===401){ MODE='signedout'; render(); showToast('Your session expired — sign in again to save.'); return; }
        if(!r.ok) throw new Error('HTTP '+r.status);
        flashSaved();
      })
      .catch(function(){ showToast('Save failed — check your connection and try again.'); });
  }

  window.cycleState = function(topic, sid){
    var b = bucketByTopic(topic); if(!b) return;
    var st = b.steps.filter(function(s){return s.id===sid;})[0]; if(!st) return;
    st.state = STATES[(STATES.indexOf(st.state)+1) % STATES.length];
    render();
    persist({op:'state', topic:topic, step_id:sid, state:st.state});
  };
  window.editField = function(topic, sid, field){
    var b = bucketByTopic(topic); if(!b) return;
    var st = b.steps.filter(function(s){return s.id===sid;})[0]; if(!st) return;
    var hint = field==='prompt' ? 'The actual prompt you would give this Claude session:'
      : field==='update' ? 'Status update (waiting on X / working on X / done: outcome):'
      : 'Next steps:';
    var v = window.prompt(hint, st[field]||'');
    if(v===null) return;
    st[field] = v.trim();
    render();
    persist({op:'set', topic:topic, step_id:sid, field:field, value:st[field]});
  };
  window.resetBoard = function(){
    if(!window.confirm('Reload the board from the server, discarding local-only changes?')) return;
    try{ localStorage.removeItem(LS_KEY); }catch(e){}
    load();
  };

  // ---- drag to reorder steps within a bucket ----
  var dragEl = null;
  function wireDrag(){
    document.querySelectorAll('.stp').forEach(function(el){
      el.addEventListener('dragstart', function(e){ dragEl = el; el.classList.add('dragging'); try{e.dataTransfer.effectAllowed='move';}catch(_){} });
      el.addEventListener('dragend', function(){ el.classList.remove('dragging'); document.querySelectorAll('.stp.drag-over').forEach(function(x){x.classList.remove('drag-over');}); });
      el.addEventListener('dragover', function(e){
        e.preventDefault();
        if (!dragEl || dragEl===el) return;
        if (el.dataset.topic!==dragEl.dataset.topic) return; // same bucket only
        el.classList.add('drag-over');
      });
      el.addEventListener('dragleave', function(){ el.classList.remove('drag-over'); });
      el.addEventListener('drop', function(e){
        e.preventDefault(); el.classList.remove('drag-over');
        if (!dragEl || dragEl===el) return;
        var topic = el.dataset.topic;
        if (topic!==dragEl.dataset.topic) return;
        var b = bucketByTopic(topic); if(!b) return;
        var ids = b.steps.map(function(s){return s.id;});
        var from = ids.indexOf(dragEl.dataset.sid);
        var to = ids.indexOf(el.dataset.sid);
        if (from<0||to<0) return;
        var moved = b.steps.splice(from,1)[0];
        b.steps.splice(to,0,moved);
        render();
        persist({op:'reorder', topic:topic, order:b.steps.map(function(s){return s.id;})});
      });
    });
  }

  // Load the live board; fall back to local copy or the embedded fallback if offline.
  function load(){
    fetch(API_GET, {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(function(b){ if(!b || !b.people || !b.people.length) throw new Error('empty'); BOARD=b; MODE = b.authed ? 'live' : 'signedout'; render(); })
      .catch(function(){
        var local = loadLocal();
        BOARD = local || normalize(FALLBACK_RAW);
        MODE = 'local';
        render();
        showToast('Showing a local copy (backend unreachable).');
      });
  }

  var toastT=null;
  function showToast(msg){ var t=document.getElementById("toast"); if(!t)return; t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},2800); }

  load();
</script>
</body></html>
