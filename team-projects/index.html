<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mission Control · Guided Growth Team Board</title>
<style>
  /* ===== palette (dark default, .light overrides) ===== */
  :root{
    --bg:#13161d; --bg2:#10131a; --card:#1a1f2a; --card-hover:#1f2532; --open:#1e2330;
    --border:#2b3340; --border-2:#363f4f; --border-strong:#475063;
    --text:#eef1f8; --text-2:#c2cad9; --muted:#8893a6; --faint:#525c6e;
    --accent:#7c5cff; --accent-2:#5b8cff;
    --todo:#5a6478; --prog:#f0a93f; --done:#2fc46f; --blocked:#ff5470; --live:#2fc46f;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
    --rowh:48px;
  }
  html.light{
    --bg:#f5f6f9; --bg2:#eef0f5; --card:#ffffff; --card-hover:#f7f8fc; --open:#f7f8fb;
    --border:#e2e6ee; --border-2:#d6dbe6; --border-strong:#c2c9d8;
    --text:#171b24; --text-2:#444d5e; --muted:#6b7385; --faint:#9aa2b4;
    --todo:#9aa2b4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px;border:2px solid transparent;background-clip:padding-box}

  /* ===== top bar ===== */
  .top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 88%,transparent);
    backdrop-filter:saturate(140%) blur(12px);-webkit-backdrop-filter:saturate(140%) blur(12px);
    border-bottom:1px solid var(--border);padding:13px 26px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:30px;height:30px;border-radius:9px;background:linear-gradient(140deg,var(--accent),var(--accent-2));
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;color:#fff}
  .btxt{font-size:15.5px;font-weight:750;letter-spacing:-.01em}
  .bsub{font-size:10.5px;color:var(--muted);font-family:var(--mono)}
  .spacer{flex:1}
  .ribbon{display:flex;align-items:center;gap:13px;flex-wrap:wrap}
  .rc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-2);font-variant-numeric:tabular-nums}
  .rc .n{font-size:14px;font-weight:750;color:var(--text);font-family:var(--mono)}
  .rc .d{width:8px;height:8px;border-radius:50%}
  .d.live{background:var(--live);box-shadow:0 0 0 3px color-mix(in srgb,var(--live) 22%,transparent)}
  .d.prog{background:var(--prog)} .d.blocked{background:var(--blocked)} .d.done{background:var(--done)}
  .themebtn{font:inherit;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--border-2);
    border-radius:8px;padding:6px 12px;color:var(--text-2)}
  .themebtn:hover{border-color:var(--border-strong);color:var(--text)}

  /* ===== person filter chips ===== */
  .chips{display:flex;gap:7px;flex-wrap:wrap;padding:16px 26px 4px;max-width:1080px;margin:0 auto}
  .chip{font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;background:var(--card);border:1px solid var(--border);
    border-radius:20px;padding:6px 15px;color:var(--text-2);display:inline-flex;align-items:center;gap:7px}
  .chip:hover{border-color:var(--accent)}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip .cd{width:7px;height:7px;border-radius:50%}

  /* ===== layout ===== */
  main{max-width:1080px;margin:0 auto;padding:10px 26px 100px}
  .person{margin-top:26px}
  .phead{display:flex;align-items:center;gap:11px;margin:0 0 11px;padding:0 2px}
  .pav{width:30px;height:30px;border-radius:9px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:750;color:#fff}
  .pname{font-size:16px;font-weight:700;letter-spacing:-.01em}
  .pmeta{margin-left:auto;display:flex;align-items:center;gap:11px;font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums}
  .pmeta .mc{display:inline-flex;align-items:center;gap:5px}
  .pmeta .mc .d{width:7px;height:7px;border-radius:50%}
  .ppill{font-size:10.5px;font-weight:700;color:#fff;background:linear-gradient(140deg,var(--accent),var(--accent-2));border-radius:20px;padding:3px 11px}

  /* ===== thin bucket rows + accordion ===== */
  .blist{display:flex;flex-direction:column;gap:7px}
  .bucket{background:var(--card);border:1px solid var(--border);border-radius:11px;overflow:hidden;position:relative;transition:border-color .12s}
  .bucket:hover{border-color:var(--border-strong)}
  .bucket.is-live{border-color:color-mix(in srgb,var(--live) 40%,var(--border))}
  .bucket.bdragging{opacity:.4}
  .bucket.drop-before::before,.bucket.drop-after::after{content:"";position:absolute;left:8px;right:8px;height:3px;border-radius:3px;
    background:var(--accent);box-shadow:0 0 12px var(--accent);z-index:5}
  .bucket.drop-before::before{top:-5px} .bucket.drop-after::after{bottom:-5px}

  .brow{display:flex;align-items:center;gap:11px;min-height:var(--rowh);padding:0 14px;cursor:pointer;user-select:none}
  .brow:hover{background:var(--card-hover)}
  .bucket.open .brow{background:var(--open);border-bottom:1px solid var(--border)}
  .grab{flex:0 0 auto;color:var(--faint);font-size:14px;cursor:grab;line-height:1;letter-spacing:-1px}
  .brow:hover .grab{color:var(--muted)}
  .bdot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;background:var(--todo)}
  .bdot.active,.bdot.live{background:var(--live);box-shadow:0 0 0 3px color-mix(in srgb,var(--live) 20%,transparent)}
  .bdot.idle{background:var(--idle,var(--todo))}
  .bdot.paused{background:var(--prog)}
  .sess{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--accent);
    background:color-mix(in srgb,var(--accent) 13%,transparent);border:1px solid color-mix(in srgb,var(--accent) 26%,transparent);
    border-radius:6px;padding:2px 6px;flex:0 0 auto}
  .bname{font-size:14px;font-weight:650;letter-spacing:-.01em;flex:0 0 auto;white-space:nowrap;max-width:30ch;overflow:hidden;text-overflow:ellipsis}
  .bone{font-size:12.5px;color:var(--muted);flex:1 1 auto;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bmini{display:flex;align-items:center;gap:8px;flex:0 0 auto}
  .minibar{display:flex;width:56px;height:6px;gap:2px;border-radius:4px;overflow:hidden}
  .minibar i{display:block;height:100%}
  .minibar i.done{background:var(--done)} .minibar i.prog{background:var(--prog)}
  .minibar i.blocked{background:var(--blocked)} .minibar i.todo{background:var(--border-2)}
  .bcount{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:30px;text-align:right}
  .bstatus{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:20px;flex:0 0 auto}
  .bstatus.active{color:var(--live);background:color-mix(in srgb,var(--live) 13%,transparent)}
  .bstatus.idle{color:var(--muted);background:color-mix(in srgb,var(--muted) 12%,transparent)}
  .bstatus.paused{color:var(--prog);background:color-mix(in srgb,var(--prog) 13%,transparent)}
  .chev{flex:0 0 auto;color:var(--muted);font-size:11px;transition:transform .18s;width:14px;text-align:center}
  .bucket.open .chev{transform:rotate(90deg);color:var(--accent)}

  /* expanded detail */
  .bdetail{padding:11px 14px 13px 14px;background:var(--open)}
  .pres{display:inline-flex;align-items:center;gap:8px;font-size:11.5px;font-family:var(--mono);border-radius:8px;padding:5px 10px;margin-bottom:9px}
  .pres .pd{width:7px;height:7px;border-radius:50%}
  .pres.live{background:color-mix(in srgb,var(--live) 11%,transparent);color:var(--live)} .pres.live .pd{background:var(--live);box-shadow:0 0 0 3px color-mix(in srgb,var(--live) 22%,transparent)}
  .pres.idle{background:color-mix(in srgb,var(--muted) 10%,transparent);color:var(--muted)} .pres.idle .pd{background:var(--muted)}
  .why{margin:0 0 10px}
  .why summary{font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;list-style:none}
  .why summary::-webkit-details-marker{display:none}
  .why summary:hover{color:var(--accent)}
  .why p{font-size:12px;color:var(--text-2);margin:7px 0 0;padding:8px 11px;background:var(--card);border-left:2px solid var(--accent);border-radius:0 8px 8px 0;line-height:1.5}

  /* steps: each is its OWN thin collapsible row, left pull-down arrow, drag to reorder */
  .steps{display:flex;flex-direction:column;gap:6px}
  .step{background:var(--card);border:1px solid var(--border);border-radius:9px;overflow:hidden}
  .step:hover{border-color:var(--border-2)}
  .step.sdragging{opacity:.4}
  .step.sdrop{box-shadow:0 -3px 0 -1px var(--accent),inset 0 2px 0 -1px var(--accent)}
  .step.blocked{border-left:2px solid var(--blocked)}
  .srow{display:flex;align-items:center;gap:9px;min-height:42px;padding:0 12px;cursor:pointer;user-select:none}
  .srow:hover{background:var(--card-hover)}
  .step.sopen .srow{background:var(--open);border-bottom:1px solid var(--border)}
  .schev{flex:0 0 auto;color:var(--muted);font-size:10px;width:12px;text-align:center;transition:transform .18s}
  .step.sopen .schev{transform:rotate(90deg);color:var(--accent)}
  .sgrab{flex:0 0 auto;color:var(--faint);font-size:12px;cursor:grab;line-height:1;letter-spacing:-1px}
  .srow:hover .sgrab{color:var(--muted)}
  .statctl{flex:0 0 auto;font:inherit;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;
    color:#fff;border:none;border-radius:6px;padding:5px 9px;min-width:98px;text-align:center}
  .statctl:hover{filter:brightness(1.1)}
  .statctl.s-todo{background:var(--todo)} .statctl.s-in-progress{background:var(--prog);color:#1a1205}
  .statctl.s-done{background:var(--done);color:#04220f} .statctl.s-blocked{background:var(--blocked)}
  .stitle{font-size:13px;font-weight:600;line-height:1.35;flex:1 1 auto;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .step.sopen .stitle{white-space:normal}
  .step.done .stitle{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--border-strong)}
  .iss{flex:0 0 auto;font-family:var(--mono);font-size:10.5px;color:var(--accent-2);text-decoration:none;border:1px solid color-mix(in srgb,var(--accent-2) 30%,transparent);border-radius:5px;padding:2px 6px}
  .glchip{flex:0 0 auto;font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;border:1px solid var(--border-2);color:var(--muted)}
  .glchip.gl-in_progress{color:var(--prog);border-color:color-mix(in srgb,var(--prog) 42%,transparent)}
  .glchip.gl-in_testing{color:var(--accent-2);border-color:color-mix(in srgb,var(--accent-2) 42%,transparent)}
  .glchip.gl-done{color:var(--done);border-color:color-mix(in srgb,var(--done) 42%,transparent)}
  /* expanded step detail: the three fields, each individually expandable */
  .sdetail{padding:11px 14px 14px 36px;display:flex;flex-direction:column;gap:8px}
  .field{display:grid;grid-template-columns:62px 1fr auto;gap:10px;align-items:start;font-size:12.5px}
  .flabel{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);padding-top:7px}
  .fvalwrap{min-width:0;cursor:pointer}
  .fval{display:block;color:var(--text-2);line-height:1.45;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fvalwrap:hover .fval{border-color:var(--border-2)}
  .fval.empty{color:var(--faint);font-style:italic;background:transparent;border:1px dashed var(--border-2)}
  .fx{flex:0 0 auto;font:inherit;font-size:11px;cursor:pointer;background:none;border:1px solid var(--border-2);color:var(--muted);padding:3px 7px;border-radius:6px;line-height:1}
  .fx:hover{color:var(--accent);border-color:var(--accent)}
  .field.exp{grid-template-columns:62px 1fr}
  .field.exp .flabel{display:flex;align-items:center;justify-content:space-between;gap:6px;padding-top:0}
  .fta{width:100%;min-height:124px;resize:vertical;background:var(--bg2);border:1px solid var(--border-2);border-radius:8px;color:var(--text);
    font:inherit;font-size:12.5px;line-height:1.55;padding:9px 11px}
  .fta:focus{outline:none;border-color:var(--accent)}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);
    background:linear-gradient(140deg,var(--accent),var(--accent-2));color:#fff;font-size:13px;font-weight:600;
    padding:11px 18px;border-radius:11px;box-shadow:0 12px 38px rgba(0,0,0,.4);opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;z-index:90}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media(max-width:620px){
    .bname{max-width:16ch} .bone{display:none} .minibar{width:40px}
    .field{grid-template-columns:1fr} .flabel{padding-top:0}
  }
</style></head>
<body>
  <header class="top">
    <div class="brand"><div class="logo">G</div><div><div class="btxt">Mission Control <span id="metag" style="display:none;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:color-mix(in srgb,var(--accent) 16%,transparent);border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);border-radius:5px;padding:1px 6px;vertical-align:middle">private</span></div><div class="bsub">guided-growth/team</div></div></div>
    <span class="spacer"></span>
    <div class="ribbon" id="ribbon"></div>
    <a class="syncind" id="syncind"></a>
    <a id="boardswitch" href="#" style="font-size:11.5px;font-weight:600;color:var(--accent);text-decoration:none;white-space:nowrap;flex-shrink:0;display:inline-flex;align-items:center;gap:5px;background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-radius:8px;padding:5px 10px"></a>

  </header>
  <div class="chips" id="chips"></div>
  <main id="board"></main>
  <div class="toast" id="toast"></div>

<script>
  var FALLBACK_RAW = [
    {"person":"Yonas","username":"yonaSisay","concurrent_load":4,"role_summary":"Owns the voice backend, Vapi integration, and backend stability. ~42 open issues cluster into four lanes: the callLLM + Vapi wiring epic (the heart of the voice product), the launch-blocking high-priority bugs, the qa-stability backlog, and web-to-mobile feature sync. Day-to-day under the new model: write tight requirements per issue, hand the build to a Claude session, verify the fix on device or in Supabase before closing.","stretch_note":"<b>4 is a genuine stretch right now.</b> Three of the four lanes all touch the same backend surface (Vapi sessions, habit persistence, tool-calling all run through callLLM / Supabase), so a fix in one often unblocks or regresses another. Recommended starting load: <b>3 active</b>, opening web-to-mobile sync once the launch bugs are closed and the context builder passes QA.","projects":[
      {"name":"Launch-blocking backend bugs","status":"active","claude_topic":"launch-blocking-backend-bugs","one_liner":"Four high-priority backend crashes / data-loss bugs fixed and verified before the demo.","why":"The only now-phase, high-priority backend issues: voice-created habits don't persist (#161), reflection edits get stuck (#163), mic permission is broken for existing users (#162), voice + typing broken on iOS (#88). None can appear in a demo or founding session.","steps":[

      {"name":"Vapi callLLM backbone + context builder","status":"idle","claude_topic":"vapi-callllm-backbone","one_liner":"The unified callLLM() entry point, shared context builder, and Vapi wiring built and tested; the session leak closed.","why":"Every voice feature routes through this layer. Without it, tool-calling is unverifiable, assistantOverrides can't be tested, and the session leak keeps burning Vapi credits (incident 2026-05-15). Foundation for personalization, feedback sessions, and the auto-fill bugs.","steps":[

        {"title":"Claude fixes gender/referral buttons not auto-filled via chat","state":"todo","issue":"#192"},
        {"title":"Verify full onboarding voice flow on device: context injected, session closes, tool calls fill fields","state":"todo","issue":"#101"}]},
      {"name":"QA stability backlog — next-release bugs","status":"idle","claude_topic":"qa-stability-next-bugs","one_liner":"The ~12 medium-priority stability bugs triaged, batch-fixed by Claude, and verified — a clean tracker for the founding cohort.","why":"These are visible to founding users: wrong habit cadence (#196), Vapi reset mid-conversation (#195), keyboard pushes the nav bar (#194), no habit-creation confirmation (#176), mic missing from Settings (#172). Small individually, together they make the app feel unfinished.","steps":[

        {"title":"Claude fixes UI/layout bugs: keyboard-nav (#194), save behind nav (#165), stray mic (#167,#164), confirmations (#171,#169), Settings mic (#172)","state":"todo","issue":"#194"},
        {"title":"Claude builds POST /api/qa-reset endpoint for MobAI autonomous resets","state":"todo","issue":"#158"},
        {"title":"Run a MobAI smoke test across fixed screens to verify no regressions before closing","state":"todo","issue":""}]},

    {"person":"Mint","username":"jamymarcoss47","concurrent_load":4,"role_summary":"Owns the AI intelligence layer: the voice/tool-calling backend, the LLM hooks for non-voice paths, async reflection state, and the QA hard gates. ~33 open issues across 6 epics — the deepest technical owner on the team. Under the new model: define requirements, review Claude-built implementations, and sign off on the hard gates rather than typing every line.","stretch_note":"<b>4 concurrent is a stretch.</b> The voice-infra track (#145,#144,#143,#142,#140) is dense and interdependent — it needs close attention before Claude can build without drift. The QA track can run nearly autonomously once Mint writes the scenario specs. Recommendation: treat <b>voice as the primary daily driver</b>, time-box the other three (~1 focused hour each/day). 4 works only if Mint truly delegates the build step.","projects":[

      {"name":"Onboarding + home screen wiring","status":"idle","claude_topic":"onboarding-home-wiring","one_liner":"All 9 onboarding screens and the 4 HOME variants wired to the live backend so the journey runs without stubs.","why":"The onboarding shell + HOME-FIRST/MORNING/EVENING/RETURN variants are the first thing every user sees. Without real session_log writes and screen connections, the product can't be demoed end-to-end or QA'd by Timothy.","steps":[

  window.toggleBucket=function(t){OPEN[t]=!OPEN[t];render();};
  window.cycleState=function(topic,sid){var b=bucketByTopic(topic);if(!b)return;var st=b.steps.filter(function(s){return s.id===sid;})[0];if(!st)return;st.state=STATES[(STATES.indexOf(st.state)+1)%STATES.length];render();persist({op:'state',topic:topic,step_id:sid,state:st.state});};
  window.toggleStep=function(skey){SOPEN[skey]=!SOPEN[skey];render();};
  window.toggleField=function(k){FEXP[k]=!FEXP[k];render();};
  window.setField=function(topic,sid,field,val){var b=bucketByTopic(topic);if(!b)return;var st=b.steps.filter(function(s){return s.id===sid;})[0];if(st)st[field]=val;};
  window.saveField=function(topic,sid,field){var b=bucketByTopic(topic);if(!b)return;var st=b.steps.filter(function(s){return s.id===sid;})[0];if(!st)return;persist({op:'set',topic:topic,step_id:sid,field:field,value:st[field]||''});};

  /* ===== persist to backend + sign-in indicator ===== */
  function flashSaved(){var el=document.getElementById('syncind');if(!el||MODE!=='live')return;el.innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 0 3px color-mix(in srgb,var(--live) 22%,transparent)"></span>Saved';clearTimeout(el._t);el._t=setTimeout(renderStatus,1300);}
  function persist(payload,quiet){
    saveLocal();
    if(MODE!=='live'){ if(!quiet)toast('Sign in (top right) to save changes to the shared board.'); return; }
    fetch(API_PUT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
      .then(function(r){
        if(r.status===401){MODE='signedout';renderStatus();if(!quiet)toast('Your session expired. Sign in again to save.');return;}
        if(!r.ok){if(!quiet)toast('Save failed. Check your connection and try again.');return;}
        flashSaved();
      })
      .catch(function(){if(!quiet)toast('Save failed. Check your connection and try again.');});
  }
  function renderStatus(){
    var el=document.getElementById('syncind');if(!el)return;
    var base='font-size:11.5px;font-weight:600;border-radius:8px;padding:6px 11px;text-decoration:none;display:inline-flex;align-items:center;gap:7px;border:1px solid;';
    var dot='<span style="width:7px;height:7px;border-radius:50%;flex:0 0 auto;';
    if(MODE==='live'){el.style.cssText=base+'color:var(--live);border-color:color-mix(in srgb,var(--live) 38%,transparent);background:color-mix(in srgb,var(--live) 11%,transparent)';el.innerHTML=dot+'background:var(--live);box-shadow:0 0 0 3px color-mix(in srgb,var(--live) 22%,transparent)"></span>Synced';el.removeAttribute('href');}
    else if(MODE==='signedout'){el.style.cssText=base+'color:var(--prog);border-color:color-mix(in srgb,var(--prog) 42%,transparent);background:color-mix(in srgb,var(--prog) 11%,transparent)';el.innerHTML=dot+'background:var(--prog)"></span>Sign in to save';el.setAttribute('href',LOGIN_URL);}
    else if(MODE==='loading'){el.style.cssText=base+'color:var(--muted);border-color:var(--border-2);background:var(--card)';el.innerHTML=dot+'background:var(--muted)"></span>Loading';el.removeAttribute('href');}
    else{el.style.cssText=base+'color:var(--muted);border-color:var(--border-2);background:var(--card)';el.innerHTML=dot+'background:var(--muted)"></span>Offline copy';el.removeAttribute('href');}
  }

  function clearMarks(){document.querySelectorAll('.drop-before,.drop-after').forEach(function(x){x.classList.remove('drop-before','drop-after');});}
  var bDrag=null;
  function wireBucketDrag(){
    document.querySelectorAll('.brow').forEach(function(row){
      row.addEventListener('dragstart',function(e){bDrag=row.closest('.bucket');bDrag.classList.add('bdragging');try{e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',bDrag.dataset.topic);}catch(_){}});
      row.addEventListener('dragend',function(){if(bDrag)bDrag.classList.remove('bdragging');clearMarks();bDrag=null;});
      row.addEventListener('dragover',function(e){if(!bDrag)return;var over=row.closest('.bucket');if(over===bDrag||over.dataset.person!==bDrag.dataset.person)return;e.preventDefault();clearMarks();var r=over.getBoundingClientRect();over.classList.add((e.clientY-r.top)>r.height/2?'drop-after':'drop-before');});
      row.addEventListener('dragleave',function(){row.closest('.bucket').classList.remove('drop-before','drop-after');});
      row.addEventListener('drop',function(e){
        e.preventDefault();if(!bDrag)return;var over=row.closest('.bucket');
        if(over.dataset.person!==bDrag.dataset.person){clearMarks();return;}
        var person=BOARD.people.filter(function(p){return p.person===bDrag.dataset.person;})[0];if(!person){clearMarks();return;}
        var movedT=bDrag.dataset.topic,targetT=over.dataset.topic;
        var from=person.projects.findIndex(function(pr){return pr.claude_topic===movedT;});if(from<0){clearMarks();return;}
        var r=over.getBoundingClientRect(),after=(e.clientY-r.top)>r.height/2;
        var moved=person.projects.splice(from,1)[0];
        var idx=person.projects.findIndex(function(pr){return pr.claude_topic===targetT;});if(idx<0)idx=person.projects.length-1;
        person.projects.splice(after?idx+1:idx,0,moved);
        clearMarks();render();toast('Reordered '+esc(person.person));
        persist({op:'reorder_buckets',person:person.person,order:person.projects.map(function(pr){return pr.claude_topic;})},true);
      });
    });
  }
  var sDrag=null;
  function wireStepDrag(){
    document.querySelectorAll('.srow').forEach(function(row){
      row.addEventListener('dragstart',function(e){e.stopPropagation();sDrag=row.closest('.step');sDrag.classList.add('sdragging');try{e.dataTransfer.effectAllowed='move';}catch(_){}});
      row.addEventListener('dragend',function(e){e.stopPropagation();if(sDrag)sDrag.classList.remove('sdragging');document.querySelectorAll('.step.sdrop').forEach(function(x){x.classList.remove('sdrop');});sDrag=null;});
      row.addEventListener('dragover',function(e){if(!sDrag)return;var over=row.closest('.step');if(over===sDrag||over.dataset.topic!==sDrag.dataset.topic)return;e.preventDefault();e.stopPropagation();document.querySelectorAll('.step.sdrop').forEach(function(x){x.classList.remove('sdrop');});over.classList.add('sdrop');});
      row.addEventListener('drop',function(e){
        e.preventDefault();e.stopPropagation();var over=row.closest('.step');if(over)over.classList.remove('sdrop');
        if(!sDrag||sDrag===over)return;var topic=over.dataset.topic;if(topic!==sDrag.dataset.topic)return;
        var b=bucketByTopic(topic);if(!b)return;var ids=b.steps.map(function(s){return s.id;});
        var from=ids.indexOf(sDrag.dataset.sid),to=ids.indexOf(over.dataset.sid);if(from<0||to<0)return;
        var moved=b.steps.splice(from,1)[0];b.steps.splice(to,0,moved);render();
        persist({op:'reorder',topic:topic,order:b.steps.map(function(s){return s.id;})});
      });
    });
  }

  /* ===== theme + toast ===== */
  function applyTheme(t){document.documentElement.classList.toggle('light',t==='light');document.getElementById('themebtn').textContent=(t==='light'?'○ Light':'● Dark');}
  var theme=(location.search.match(/theme=(dark|light)/)||[])[1]||'dark';
  window.toggleTheme=function(){theme=theme==='light'?'dark':'light';applyTheme(theme);};
  var toastT=null;
  function toast(m){var t=document.getElementById('toast');t.innerHTML=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show');},2200);}

  /* ===== boot ===== */
  function guardShape(b){
    (b.people||[]).forEach(function(p){(p.projects||[]).forEach(function(pr){
      if(!pr.name&&pr.topic)pr.name=pr.topic;
      if(!pr.steps)pr.steps=[];
      pr.steps.forEach(function(s){if(s.state==null)s.state='todo';});
    });});
    return b;
  }
  function afterLoad(){
    var mt=document.getElementById('metag');if(mt)mt.style.display=IS_ME?'':'none';
    var sw=document.getElementById('boardswitch');
    if(sw){sw.textContent=IS_ME?'↗ Team board':'↗ My private board';sw.setAttribute('href',IS_ME?'/team-projects/':'/team-projects/?board=me');}
    render();
  }
  function load(){
    fetch(API_GET,{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(b){if(!b||!Array.isArray(b.people))throw new Error('bad shape');BOARD=guardShape(b);MODE=b.authed?'live':'signedout';afterLoad();})
      .catch(function(){BOARD=loadLocal()||normalize(FALLBACK_RAW);MODE='local';afterLoad();toast('Showing a local copy (backend unreachable).');});
  }
  window.resetBoard=function(){try{localStorage.removeItem(LS_KEY);}catch(e){}MODE='loading';render();load();};
  applyTheme(theme);
  render();   // loading shell
  load();
</script>
</body></html>
